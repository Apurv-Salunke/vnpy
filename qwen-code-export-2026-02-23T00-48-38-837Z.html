                "type": "content",

                  "type": "text",
                  "text": "# VeighNa - By Traders, For Traders, AI-Powered.\n\n\u003cp align=\"center\"\u003e\n  \u003cimg src =\"https://vnpy.oss-cn-shanghai.aliyuncs.com/veighna-logo.png\"/\u003e\n\u003c/p\u003e\n\n💬 Want to read this in **english** ? Go [**here**](README_ENG.md)\n\n\u003cp align=\"center\"\u003e\n    \u003cimg src =\"https://img.shields.io/badge/version-4.3.0-blueviolet.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/badge/platform-windows|linux|macos-yellow.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/badge/python-3.10|3.11|3.12|3.13-blue.svg\" /\u003e\n    \u003cimg src =\"https://img.shields.io/github/actions/workflow/status/vnpy/vnpy/pythonapp.yml?branch=master\"/\u003e\n    \u003cimg src =\"https://img.shields.io/github/license/vnpy/vnpy.svg?color=orange\"/\u003e\n\u003c/p\u003e\n\nVeighNa是一套基于Python的开源量化交易系统开发框架，在开源社区持续不断的贡献下一步步成长为多功能量化交易平台，自发布以来已经积累了众多来自金融机构或相关领域的用户，包括私募基金、证券公司、期货公司等。\n\n在使用VeighNa进行二次开发（策略、模块等）的过程中有任何疑问，请查看[**VeighNa项目文档**](https://www.vnpy.com/docs/cn/index.html)，如果无法解决请前往[**官方社区论坛**](https://www.vnpy.com/forum/)的【提问求助】板块寻求帮助，也欢迎在【经验分享】板块分享你的使用心得！\n\n**想要获取更多关于VeighNa的资讯信息？** 请扫描下方二维码添加小助手加入【VeighNa社区交流微信群】：\n\n\u003cp align=\"center\"\u003e\n  \u003cimg src =\"https://vnpy.oss-cn-shanghai.aliyuncs.com/github_wx.png\"/, width=250\u003e\n\u003c/p\u003e\n\n\n## AI-Powered\n\n\nVeighNa发布十周年之际正式推出4.0版本，重磅新增面向AI量化策略的[vnpy.alpha](./vnpy/alpha)模块，为专业量化交易员提供**一站式多因子机器学习（ML）策略开发、投研和实盘交易解决方案**：\n\n\u003cp align=\"center\"\u003e\n  \u003cimg src =\"https://vnpy.oss-cn-shanghai.aliyuncs.com/alpha_demo.jpg\"/, width=500\u003e\n\u003c/p\u003e\n\n* :bar_chart: **[dataset](./vnpy/alpha/dataset)**：因子特征工程\n\n    * 专为ML算法训练优化设计，支持高效批量特征计算与处理\n    * 内置丰富的因子特征表达式计算引擎，实现快速一键生成训练数据\n    * [Alpha 158](./vnpy/alpha/dataset/datasets/alpha_158.py)：源于微软Qlib项目的股票市场特征集合，涵盖K线形态、价格趋势、时序波动等多维度量化因子\n\n* :bulb: **[model](./vnpy/alpha/model)**：预测模型训练\n\n    * 提供标准化的ML模型开发模板，大幅简化模型构建与训练流程\n    * 统一API接口设计，支持无缝切换不同算法进行性能对比测试\n    * 集成多种主流机器学习算法：\n        * [Lasso](./vnpy/alpha/model/models/lasso_model.py)：经典Lasso回归模型，通过L1正则化实现特征选择\n        * [LightGBM](./vnpy/alpha/model/models/lgb_model.py)：高效梯度提升决策树，针对大规模数据集优化的训练引擎\n        * [MLP](./vnpy/alpha/model/models/mlp_model.py)：多层感知机神经网络，适用于复杂非线性关系建模\n\n* :robot: **[strategy](./vnpy/alpha/strategy)**：策略投研开发\n\n    * 基于ML信号预测模型快速构建量化交易策略\n    * 支持截面多标的和时序单标的两种策略类型\n\n* :microscope: **[lab](./vnpy/alpha/lab.py)**：投研流程管理\n\n    * 集成数据管理、模型训练、信号生成和策略回测等完整工作流程\n    * 简洁API设计，内置可视化分析工具，直观评估策略表现和模型效果\n\n* :book: **[notebook](./examples/alpha_research)**：量化投研Demo\n\n    * [download_data_rq](./examples/alpha_research/download_data_rq.ipynb)：基于RQData下载A股指数成分股数据，包含指数成分变化跟踪及历史行情获取\n    * [download_data_xt](./examples/alpha_research/download_data_xt.ipynb)：基于迅投研数据服务，下载获取A股指数成分历史变化和股票K线数据\n    * [research_workflow_lasso](./examples/alpha_research/research_workflow_lasso.ipynb)：基于Lasso回归模型的量化投研工作流，展示线性模型特征选择与预测能力\n    * [research_workflow_lgb](./examples/alpha_research/research_workflow_lgb.ipynb)：基于LightGBM梯度提升树的量化投研工作流，利用高效集成学习方法进行预测\n    * [research_workflow_mlp](./examples/alpha_research/research_workflow_mlp.ipynb)：基于多层感知机神经网络的量化投研工作流，展示深度学习在量化交易中的应用\n\nvnpy.alpha模块的设计理念受到[Qlib](https://github.com/microsoft/qlib)项目的启发，在保持易用性的同时提供强大的AI量化能力，特此向Qlib开发团队致以诚挚感谢！\n\n\n## 功能特点\n\n带有 :arrow_up: 的模块代表已经完成4.0版本的升级适配测试，同时4.0核心框架采用了优先保证兼容性的升级方式，因此大多数模块也都可以直接使用（涉及到C++ API封装的接口必须升级后才能使用）。\n\n1. :arrow_up: 多功能量化交易平台（trader），整合了多种交易接口，并针对具体策略算法和功能开发提供了简洁易用的API，用于快速构建交易员所需的量化交易应用。\n\n2. 覆盖国内外所拥有的下述交易品种的交易接口（gateway）：\n\n    * 国内市场\n\n        * :arrow_up: CTP（[ctp](https://www.github.com/vnpy/vnpy_ctp)）：国内期货、期权\n\n        * :arrow_up: CTP Mini（[mini](https://www.github.com/vnpy/vnpy_mini)）：国内期货、期权\n\n        * :arrow_up: CTP证券（[sopt](https://www.github.com/vnpy/vnpy_sopt)）：ETF期权\n\n        * :arrow_up: 飞马（[femas](https://www.github.com/vnpy/vnpy_femas)）：国内期货\n\n        * :arrow_up: 恒生UFT（[uft](https://www.github.com/vnpy/vnpy_uft)）：国内期货、ETF期权\n\n        * :arrow_up: 易盛（[esunny](https://www.github.com/vnpy/vnpy_esunny)）：国内期货、黄金TD\n\n        * :arrow_up: 顶点HTS（[hts](https://www.github.com/vnpy/vnpy_hts)）：ETF期权\n\n        * :arrow_up: 顶点飞创（[sec](https://www.github.com/vnpy/vnpy_sec)）：ETF期权\n\n        * :arrow_up: 中泰XTP（[xtp](https://www.github.com/vnpy/vnpy_xtp)）：国内证券（A股）、ETF期权\n\n        * :arrow_up: 华鑫奇点（[tora](https://www.github.com/vnpy/vnpy_tora)）：国内证券（A股）、ETF期权\n\n        * 东证OST（[ost](https://www.github.com/vnpy/vnpy_ost)）：国内证券（A股）\n\n        * 东方财富EMT（[emt](https://www.github.com/vnpy/vnpy_emt)）：国内证券（A股）\n\n        * 飞鼠（[sgit](https://www.github.com/vnpy/vnpy_sgit)）：黄金TD、国内期货\n\n        * :arrow_up: 金仕达黄金（[ksgold](https://www.github.com/vnpy/vnpy_ksgold)）：黄金TD\n\n        * :arrow_up: 利星资管（[lstar](https://www.github.com/vnpy/vnpy_lstar)）：期货资管\n\n        * :arrow_up: 融航（[rohon](https://www.github.com/vnpy/vnpy_rohon)）：期货资管\n\n        * :arrow_up: 杰宜斯（[jees](https://www.github.com/vnpy/vnpy_jees)）：期货资管\n\n        * 中汇亿达（[comstar](https://www.github.com/vnpy/vnpy_comstar)）：银行间市场\n\n        * :arrow_up: TTS（[tts](https://www.github.com/vnpy/vnpy_tts)）：国内期货（仿真）\n\n    * 海外市场\n\n        * :arrow_up: Interactive Brokers（[ib](https://www.github.com/vnpy/vnpy_ib)）：海外证券、期货、期权、贵金属等\n\n        * :arrow_up: 易盛9.0外盘（[tap](https://www.github.com/vnpy/vnpy_tap)）：海外期货\n\n        * :arrow_up: 直达期货（[da](https://www.github.com/vnpy/vnpy_da)）：海外期货\n\n    * 特殊应用\n\n        * :arrow_up: RQData行情（[rqdata](https://www.github.com/vnpy/vnpy_rqdata)）：跨市场（股票、指数、ETF、期货）实时行情\n\n        * :arrow_up: 迅投研行情（[xt](https://www.github.com/vnpy/vnpy_xt)）：跨市场（股票、指数、可转债、ETF、期货、期权）实时行情\n\n        * :arrow_up: RPC服务（[rpc](https://www.github.com/vnpy/vnpy_rpcservice)）：跨进程通讯接口，用于分布式架构\n\n3. 覆盖下述各类量化策略的交易应用（app）：\n\n    * :arrow_up: [cta_strategy](https://www.github.com/vnpy/vnpy_ctastrategy)：CTA策略引擎模块，在保持易用性的同时，允许用户针对CTA类策略运行过程中委托的报撤行为进行细粒度控制（降低交易滑点、实现高频策略）\n\n    * :arrow_up: [cta_backtester](https://www.github.com/vnpy/vnpy_ctabacktester)：CTA策略回测模块，无需使用Jupyter Notebook，直接使用图形界面进行策略回测分析、参数优化等相关工作\n\n    * :arrow_up: [spread_trading](https://www.github.com/vnpy/vnpy_spreadtrading)：价差交易模块，支持自定义价差，实时计算价差行情和持仓，支持价差算法交易以及自动价差策略两种模式\n\n    * :arrow_up: [option_master](https://www.github.com/vnpy/vnpy_optionmaster)：期权交易模块，针对国内期权市场设计，支持多种期权定价模型、隐含波动率曲面计算、希腊值风险跟踪等功能\n\n    * :arrow_up: [portfolio_strategy](https://www.github.com/vnpy/vnpy_portfoliostrategy)：组合策略模块，面向同时交易多合约的量化策略（Alpha、期权套利等），提供历史数据回测和实盘自动交易功能\n\n    * :arrow_up: [algo_trading](https://www.github.com/vnpy/vnpy_algotrading)：算法交易模块，提供多种常用的智能交易算法：TWAP、Sniper、Iceberg、BestLimit等\n\n    * :arrow_up: [script_trader](https://www.github.com/vnpy/vnpy_scripttrader)：脚本策略模块，面向多标的类量化策略和计算任务设计，同时也可以在命令行中实现REPL指令形式的交易，不支持回测功能\n\n    * :arrow_up: [paper_account](https://www.github.com/vnpy/vnpy_paperaccount)：本地仿真模块，纯本地化实现的仿真模拟交易功能，基于交易接口获取的实时行情进行委托撮合，提供委托成交推送以及持仓记录\n\n    * :arrow_up: [chart_wizard](https://www.github.com/vnpy/vnpy_chartwizard)：K线图表模块，基于RQData数据服务（期货）或者交易接口获取历史数据，并结合Tick推送显示实时行情变化\n\n    * :arrow_up: [portfolio_manager](https://www.github.com/vnpy/vnpy_portfoliomanager)：交易组合管理模块，以独立的策略交易组合（子账户）为基础，提供委托成交记录管理、交易仓位自动跟踪以及每日盈亏实时统计功能\n\n    * :arrow_up: [rpc_service](https://www.github.com/vnpy/vnpy_rpcservice)：RPC服务模块，允许将某一进程启动为服务端，作为统一的行情和交易路由通道，允许多客户端同时连接，实现多进程分布式系统\n\n    * :arrow_up: [data_manager](https://www.github.com/vnpy/vnpy_datamanager)：历史数据管理模块，通过树形目录查看数据库中已有的数据概况，选择任意时间段数据查看字段细节，支持CSV文件的数据导入和导出\n\n    * :arrow_up: [data_recorder](https://www.github.com/vnpy/vnpy_datarecorder)：行情记录模块，基于图形界面进行配置，根据需求实时录制Tick或者K线行情到数据库中，用于策略回测或者实盘初始化\n\n    * :arrow_up: [excel_rtd](https://www.github.com/vnpy/vnpy_excelrtd)：Excel RTD（Real Time Data）实时数据服务，基于pyxll模块实现在Excel中获取各类数据（行情、合约、持仓等）的实时推送更新\n\n    * :arrow_up: [risk_manager](https://www.github.com/vnpy/vnpy_riskmanager)：风险管理模块，提供包括交易流控、下单数量、活动委托、撤单总数等规则的统计和限制，有效实现前端风控功能\n\n    * :arrow_up: [web_trader](https://www.github.com/vnpy/vnpy_webtrader)：Web服务模块，针对B-S架构需求设计，实现了提供主动函数调用（REST）和被动数据推送（Websocket）的Web服务器\n\n4. Python交易API接口封装（api），提供上述交易接口的底层对接实现。\n\n    * :arrow_up: REST Client（[rest](https://www.github.com/vnpy/vnpy_rest)）：基于协程异步IO的高性能REST API客户端，采用事件消息循环的编程模型，支持高并发实时交易请求发送\n\n    * :arrow_up: Websocket Client（[websocket](https://www.github.com/vnpy/vnpy_websocket)）：基于协程异步IO的高性能Websocket API客户端，支持和REST Client共用事件循环并发运行\n\n5. :arrow_up: 简洁易用的事件驱动引擎（event），作为事件驱动型交易程序的核心。\n\n6. 对接各类数据库的适配器接口（database）：\n\n    * SQL类\n\n        * :arrow_up: SQLite（[sqlite](https://www.github.com/vnpy/vnpy_sqlite)）：轻量级单文件数据库，无需安装和配置数据服务程序，VeighNa的默认选项，适合入门新手用户\n\n        * :arrow_up: MySQL（[mysql](https://www.github.com/vnpy/vnpy_mysql)）：主流的开源关系型数据库，文档资料极为丰富，且可替换其他NewSQL兼容实现（如TiDB）\n\n        * :arrow_up: PostgreSQL（[postgresql](https://www.github.com/vnpy/vnpy_postgresql)）：特性更为丰富的开源关系型数据库，支持通过扩展插件来新增功能，只推荐熟手使用\n\n    * NoSQL类\n\n        * DolphinDB（[dolphindb](https://www.github.com/vnpy/vnpy_dolphindb)）：一款高性能分布式时序数据库，适用于对速度要求极高的低延时或实时性任务\n\n        * :arrow_up: TDengine（[taos](https://www.github.com/vnpy/vnpy_taos)）：分布式、高性能、支持SQL的时序数据库，带有内建的缓存、流式计算、数据订阅等系统功能，能大幅减少研发和运维的复杂度\n\n        * :arrow_up: MongoDB（[mongodb](https://www.github.com/vnpy/vnpy_mongodb)）：基于分布式文件储存（bson格式）的文档式数据库，内置的热数据内存缓存提供更快读写速度\n\n7. 对接下述各类数据服务的适配器接口（datafeed）：\n\n    * :arrow_up: 迅投研（[xt](https://www.github.com/vnpy/vnpy_xt)）：股票、期货、期权、基金、债券\n\n    * :arrow_up: 米筐RQData（[rqdata](https://www.github.com/vnpy/vnpy_rqdata)）：股票、期货、期权、基金、债券、黄金TD\n\n    * :arrow_up: MultiCharts（[mcdata](https://www.github.com/vnpy/vnpy_mcdata)）：期货、期货期权\n\n    * :arrow_up: TuShare（[tushare](https://www.github.com/vnpy/vnpy_tushare)）：股票、期货、期权、基金\n\n    * :arrow_up: 万得Wind（[wind](https://www.github.com/vnpy/vnpy_wind)）：股票、期货、基金、债券\n\n    * :arrow_up: 同花顺iFinD（[ifind](https://www.github.com/vnpy/vnpy_ifind)）：股票、期货、基金、债券\n\n    * :arrow_up: 天勤TQSDK（[tqsdk](https://www.github.com/vnpy/vnpy_tqsdk)）：期货\n\n    * :arrow_up: 掘金（[gm](https://www.github.com/vnpy/vnpy_gm)）：股票\n\n    * :arrow_up: polygon（[polygon](https://www.github.com/vnpy/vnpy_polygon)）：股票、期货、期权\n\n8. :arrow_up: 跨进程通讯标准组件（rpc），用于实现分布式部署的复杂交易系统。\n\n9. :arrow_up: Python高性能K线图表（chart），支持大数据量图表显示以及实时数据更新功能。\n\n10. [社区论坛](http://www.vnpy.com/forum)和[知乎专栏](http://zhuanlan.zhihu.com/vn-py)，内容包括VeighNa项目的开发教程和Python在量化交易领域的应用研究等内容。\n\n11. 官方交流群262656087（QQ），管理严格（定期清除长期潜水的成员），入群费将捐赠给VeighNa社区基金。\n\n注：以上关于功能特点的说明为根据说明文档发布时情况罗列，后续可能存在更新或调整。若功能描述同实际存在出入，欢迎通过Issue联系进行调整。\n\n## 环境准备\n\n* 推荐使用VeighNa团队为量化交易专门打造的Python发行版[VeighNa Studio-4.3.0](https://download.vnpy.com/veighna_studio-4.3.0.exe)，集成内置了VeighNa框架以及VeighNa Station量化管理平台，无需手动安装\n* 支持的系统版本：Windows 11以上 / Windows Server 2022以上 / Ubuntu 22.04 LTS以上\n* 支持的Python版本：Python 3.10以上（64位），**推荐使用Python 3.13**\n\n## 安装步骤\n\n在[这里](https://github.com/vnpy/vnpy/releases)下载Release发布版本，解压后运行以下命令安装：\n\n**Windows**\n\n```\ninstall.bat\n```\n\n**Ubuntu**\n\n```\nbash install.sh\n```\n\n**Macos**\n\n```\nbash install_osx.sh\n```\n\n## 使用指南\n\n1. 在[SimNow](http://www.simnow.com.cn/)注册CTP仿真账号，并在[该页面](http://www.simnow.com.cn/product.action)获取经纪商代码以及交易行情服务器地址。\n\n2. 在[VeighNa社区论坛](https://www.vnpy.com/forum/)注册获得VeighNa Station账号密码（论坛账号密码即是）\n\n3. 启动VeighNa Station（安装VeighNa Studio后会在桌面自动创建快捷方式），输入上一步的账号密码登录\n\n4. 点击底部的**VeighNa Trader**按钮，开始你的交易！！！\n\n注意：\n\n* 在VeighNa Trader的运行过程中请勿关闭VeighNa Station（会自动退出）\n\n## 脚本运行\n\n除了基于VeighNa Station的图形化启动方式外，也可以在任意目录下创建run.py，写入以下示例代码：\n\n```Python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\n\n\ndef main():\n    \"\"\"Start VeighNa Trader\"\"\"\n    qapp = create_qapp()\n\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n\n    main_engine.add_gateway(CtpGateway)\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n\n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n\n    qapp.exec()\n\n\nif __name__ == \"__main__\":\n    main()\n```\n\n在该目录下打开CMD（按住Shift-\u003e点击鼠标右键-\u003e在此处打开命令窗口/PowerShell）后运行下列命令启动VeighNa Trader：\n\n    python run.py\n\n## 贡献代码\n\nVeighNa使用Github托管其源代码，如果希望贡献代码请使用github的PR（Pull Request）的流程:\n\n1. [创建 Issue](https://github.com/vnpy/vnpy/issues/new) - 对于较大的改动（如新功能，大型重构等）建议先开issue讨论一下，较小的improvement（如文档改进，bugfix等）直接发PR即可\n\n2. Fork [VeighNa](https://github.com/vnpy/vnpy) - 点击右上角**Fork**按钮\n\n3. Clone你自己的fork: ```git clone https://github.com/$userid/vnpy.git```\n\t* 如果你的fork已经过时，需要手动sync：[同步方法](https://help.github.com/articles/syncing-a-fork/)\n\n4. 从**dev**创建你自己的feature branch: ```git checkout -b $my_feature_branch dev```\n\n5. 在$my_feature_branch上修改并将修改push到你的fork上\n\n6. 创建从你的fork的$my_feature_branch分支到主项目的**dev**分支的[Pull Request] -  [在此](https://github.com/vnpy/vnpy/compare?expand=1)点击**compare across forks**，选择需要的fork和branch创建PR\n\n7. 等待review, 需要继续改进，或者被Merge!\n\n在提交代码的时候，请遵守以下规则，以提高代码质量：\n\n  * 使用[ruff](https://github.com/astral-sh/ruff)检查你的代码样式，确保没有error和warning。在项目根目录下运行```ruff check .```即可。\n  * 使用[mypy](https://github.com/python/mypy)进行静态类型检查，确保类型注解正确。在项目根目录下运行```mypy vnpy```即可。\n\n## 其他内容\n\n* [获取帮助](https://github.com/vnpy/vnpy/blob/dev/.github/SUPPORT.md)\n* [社区行为准则](https://github.com/vnpy/vnpy/blob/dev/.github/CODE_OF_CONDUCT.md)\n* [Issue模板](https://github.com/vnpy/vnpy/blob/dev/.github/ISSUE_TEMPLATE.md)\n* [PR模板](https://github.com/vnpy/vnpy/blob/dev/.github/PULL_REQUEST_TEMPLATE.md)\n\n## 版权说明\n\nMIT\n"

                  "type": "text",
                  "text": "\"\"\"\nEvent-driven framework of VeighNa framework.\n\"\"\"\n\nfrom collections import defaultdict\nfrom collections.abc import Callable\nfrom queue import Empty, Queue\nfrom threading import Thread\nfrom time import sleep\nfrom typing import Any\n\n\nEVENT_TIMER = \"eTimer\"\n\n\nclass Event:\n    \"\"\"\n    Event object consists of a type string which is used\n    by event engine for distributing event, and a data\n    object which contains the real data.\n    \"\"\"\n\n    def __init__(self, type: str, data: Any = None) -\u003e None:\n        \"\"\"\"\"\"\n        self.type: str = type\n        self.data: Any = data\n\n\n# Defines handler function to be used in event engine.\nHandlerType = Callable[[Event], None]\n\n\nclass EventEngine:\n    \"\"\"\n    Event engine distributes event object based on its type\n    to those handlers registered.\n\n    It also generates timer event by every interval seconds,\n    which can be used for timing purpose.\n    \"\"\"\n\n    def __init__(self, interval: int = 1) -\u003e None:\n        \"\"\"\n        Timer event is generated every 1 second by default, if\n        interval not specified.\n        \"\"\"\n        self._interval: int = interval\n        self._queue: Queue = Queue()\n        self._active: bool = False\n        self._thread: Thread = Thread(target=self._run)\n        self._timer: Thread = Thread(target=self._run_timer)\n        self._handlers: defaultdict = defaultdict(list)\n        self._general_handlers: list = []\n\n    def _run(self) -\u003e None:\n        \"\"\"\n        Get event from queue and then process it.\n        \"\"\"\n        while self._active:\n            try:\n                event: Event = self._queue.get(block=True, timeout=1)\n                self._process(event)\n            except Empty:\n                pass\n\n    def _process(self, event: Event) -\u003e None:\n        \"\"\"\n        First distribute event to those handlers registered listening\n        to this type.\n\n        Then distribute event to those general handlers which listens\n        to all types.\n        \"\"\"\n        if event.type in self._handlers:\n            [handler(event) for handler in self._handlers[event.type]]\n\n        if self._general_handlers:\n            [handler(event) for handler in self._general_handlers]\n\n    def _run_timer(self) -\u003e None:\n        \"\"\"\n        Sleep by interval second(s) and then generate a timer event.\n        \"\"\"\n        while self._active:\n            sleep(self._interval)\n            event: Event = Event(EVENT_TIMER)\n            self.put(event)\n\n    def start(self) -\u003e None:\n        \"\"\"\n        Start event engine to process events and generate timer events.\n        \"\"\"\n        self._active = True\n        self._thread.start()\n        self._timer.start()\n\n    def stop(self) -\u003e None:\n        \"\"\"\n        Stop event engine.\n        \"\"\"\n        self._active = False\n        self._timer.join()\n        self._thread.join()\n\n    def put(self, event: Event) -\u003e None:\n        \"\"\"\n        Put an event object into event queue.\n        \"\"\"\n        self._queue.put(event)\n\n    def register(self, type: str, handler: HandlerType) -\u003e None:\n        \"\"\"\n        Register a new handler function for a specific event type. Every\n        function can only be registered once for each event type.\n        \"\"\"\n        handler_list: list = self._handlers[type]\n        if handler not in handler_list:\n            handler_list.append(handler)\n\n    def unregister(self, type: str, handler: HandlerType) -\u003e None:\n        \"\"\"\n        Unregister an existing handler function from event engine.\n        \"\"\"\n        handler_list: list = self._handlers[type]\n\n        if handler in handler_list:\n            handler_list.remove(handler)\n\n        if not handler_list:\n            self._handlers.pop(type)\n\n    def register_general(self, handler: HandlerType) -\u003e None:\n        \"\"\"\n        Register a new handler function for all event types. Every\n        function can only be registered once for each event type.\n        \"\"\"\n        if handler not in self._general_handlers:\n            self._general_handlers.append(handler)\n\n    def unregister_general(self, handler: HandlerType) -\u003e None:\n        \"\"\"\n        Unregister an existing general handler function.\n        \"\"\"\n        if handler in self._general_handlers:\n            self._general_handlers.remove(handler)\n"

                  "type": "text",
                  "text": "import smtplib\nimport os\nimport traceback\nfrom abc import ABC, abstractmethod\nfrom email.message import EmailMessage\nfrom queue import Empty, Queue\nfrom threading import Thread\nfrom typing import TypeVar\nfrom collections.abc import Callable\n\nfrom vnpy.event import Event, EventEngine\nfrom .app import BaseApp\nfrom .event import (\n    EVENT_TICK,\n    EVENT_ORDER,\n    EVENT_TRADE,\n    EVENT_POSITION,\n    EVENT_ACCOUNT,\n    EVENT_CONTRACT,\n    EVENT_LOG,\n    EVENT_QUOTE\n)\nfrom .gateway import BaseGateway\nfrom .object import (\n    CancelRequest,\n    LogData,\n    OrderRequest,\n    QuoteData,\n    QuoteRequest,\n    SubscribeRequest,\n    HistoryRequest,\n    OrderData,\n    BarData,\n    TickData,\n    TradeData,\n    PositionData,\n    AccountData,\n    ContractData,\n    Exchange\n)\nfrom .setting import SETTINGS\nfrom .utility import TRADER_DIR\nfrom .converter import OffsetConverter\nfrom .logger import logger, DEBUG, INFO, WARNING, ERROR, CRITICAL\nfrom .locale import _\n\n\nEngineType = TypeVar(\"EngineType\", bound=\"BaseEngine\")\n\n\nclass BaseEngine(ABC):\n    \"\"\"\n    Abstract class for implementing a function engine.\n    \"\"\"\n\n    @abstractmethod\n    def __init__(\n        self,\n        main_engine: \"MainEngine\",\n        event_engine: EventEngine,\n        engine_name: str,\n    ) -\u003e None:\n        \"\"\"\"\"\"\n        self.main_engine: MainEngine = main_engine\n        self.event_engine: EventEngine = event_engine\n        self.engine_name: str = engine_name\n\n    def close(self) -\u003e None:\n        \"\"\"\"\"\"\n        return\n\n\nclass MainEngine:\n    \"\"\"\n    Acts as the core of the trading platform.\n    \"\"\"\n\n    def __init__(self, event_engine: EventEngine | None = None) -\u003e None:\n        \"\"\"\"\"\"\n        if event_engine:\n            self.event_engine: EventEngine = event_engine\n        else:\n            self.event_engine = EventEngine()\n        self.event_engine.start()\n\n        self.gateways: dict[str, BaseGateway] = {}\n        self.engines: dict[str, BaseEngine] = {}\n        self.apps: dict[str, BaseApp] = {}\n        self.exchanges: list[Exchange] = []\n\n        os.chdir(TRADER_DIR)    # Change working directory\n        self.init_engines()     # Initialize function engines\n\n    def add_engine(self, engine_class: type[EngineType]) -\u003e EngineType:\n        \"\"\"\n        Add function engine.\n        \"\"\"\n        engine: EngineType = engine_class(self, self.event_engine)      # type: ignore\n        self.engines[engine.engine_name] = engine\n        return engine\n\n    def add_gateway(self, gateway_class: type[BaseGateway], gateway_name: str = \"\") -\u003e BaseGateway:\n        \"\"\"\n        Add gateway.\n        \"\"\"\n        # Use default name if gateway_name not passed\n        if not gateway_name:\n            gateway_name = gateway_class.default_name\n\n        gateway: BaseGateway = gateway_class(self.event_engine, gateway_name)\n        self.gateways[gateway_name] = gateway\n\n        # Add gateway supported exchanges into engine\n        for exchange in gateway.exchanges:\n            if exchange not in self.exchanges:\n                self.exchanges.append(exchange)\n\n        return gateway\n\n    def add_app(self, app_class: type[BaseApp]) -\u003e BaseEngine:\n        \"\"\"\n        Add app.\n        \"\"\"\n        app: BaseApp = app_class()\n        self.apps[app.app_name] = app\n\n        engine: BaseEngine = self.add_engine(app.engine_class)\n        return engine\n\n    def init_engines(self) -\u003e None:\n        \"\"\"\n        Init all engines.\n        \"\"\"\n        self.add_engine(LogEngine)\n\n        oms_engine: OmsEngine = self.add_engine(OmsEngine)\n        self.get_tick: Callable[[str], TickData | None] = oms_engine.get_tick\n        self.get_order: Callable[[str], OrderData | None] = oms_engine.get_order\n        self.get_trade: Callable[[str], TradeData | None] = oms_engine.get_trade\n        self.get_position: Callable[[str], PositionData | None] = oms_engine.get_position\n        self.get_account: Callable[[str], AccountData | None] = oms_engine.get_account\n        self.get_contract: Callable[[str], ContractData | None] = oms_engine.get_contract\n        self.get_quote: Callable[[str], QuoteData | None] = oms_engine.get_quote\n        self.get_all_ticks: Callable[[], list[TickData]] = oms_engine.get_all_ticks\n        self.get_all_orders: Callable[[], list[OrderData]] = oms_engine.get_all_orders\n        self.get_all_trades: Callable[[], list[TradeData]] = oms_engine.get_all_trades\n        self.get_all_positions: Callable[[], list[PositionData]] = oms_engine.get_all_positions\n        self.get_all_accounts: Callable[[], list[AccountData]] = oms_engine.get_all_accounts\n        self.get_all_contracts: Callable[[], list[ContractData]] = oms_engine.get_all_contracts\n        self.get_all_quotes: Callable[[], list[QuoteData]] = oms_engine.get_all_quotes\n        self.get_all_active_orders: Callable[[], list[OrderData]] = oms_engine.get_all_active_orders\n        self.get_all_active_quotes: Callable[[], list[QuoteData]] = oms_engine.get_all_active_quotes\n        self.update_order_request: Callable[[OrderRequest, str, str], None] = oms_engine.update_order_request\n        self.convert_order_request: Callable[[OrderRequest, str, bool, bool], list[OrderRequest]] = oms_engine.convert_order_request\n        self.get_converter: Callable[[str], OffsetConverter | None] = oms_engine.get_converter\n\n        email_engine: EmailEngine = self.add_engine(EmailEngine)\n        self.send_email: Callable[[str, str, str | None], None] = email_engine.send_email\n\n    def write_log(self, msg: str, source: str = \"MainEngine\") -\u003e None:\n        \"\"\"\n        Put log event with specific message.\n        \"\"\"\n        log: LogData = LogData(msg=msg, gateway_name=source)\n        event: Event = Event(EVENT_LOG, log)\n        self.event_engine.put(event)\n\n    def get_gateway(self, gateway_name: str) -\u003e BaseGateway | None:\n        \"\"\"\n        Return gateway object by name.\n        \"\"\"\n        gateway: BaseGateway | None = self.gateways.get(gateway_name, None)\n        if not gateway:\n            self.write_log(_(\"找不到底层接口：{}\").format(gateway_name))\n        return gateway\n\n    def get_engine(self, engine_name: str) -\u003e BaseEngine | None:\n        \"\"\"\n        Return engine object by name.\n        \"\"\"\n        engine: BaseEngine | None = self.engines.get(engine_name, None)\n        if not engine:\n            self.write_log(_(\"找不到引擎：{}\").format(engine_name))\n        return engine\n\n    def get_default_setting(self, gateway_name: str) -\u003e dict[str, str | bool | int | float] | None:\n        \"\"\"\n        Get default setting dict of a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            return gateway.get_default_setting()\n        return None\n\n    def get_all_gateway_names(self) -\u003e list[str]:\n        \"\"\"\n        Get all names of gateway added in main engine.\n        \"\"\"\n        return list(self.gateways.keys())\n\n    def get_all_apps(self) -\u003e list[BaseApp]:\n        \"\"\"\n        Get all app objects.\n        \"\"\"\n        return list(self.apps.values())\n\n    def get_all_exchanges(self) -\u003e list[Exchange]:\n        \"\"\"\n        Get all exchanges.\n        \"\"\"\n        return self.exchanges\n\n    def connect(self, setting: dict, gateway_name: str) -\u003e None:\n        \"\"\"\n        Start connection of a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"连接登录 -\u003e {}\").format(gateway_name))\n\n            gateway.connect(setting)\n\n    def subscribe(self, req: SubscribeRequest, gateway_name: str) -\u003e None:\n        \"\"\"\n        Subscribe tick data update of a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"订阅行情 -\u003e {}：{}\").format(gateway_name, req))\n\n            gateway.subscribe(req)\n\n    def send_order(self, req: OrderRequest, gateway_name: str) -\u003e str:\n        \"\"\"\n        Send new order request to a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"委托下单 -\u003e {}：{}\").format(gateway_name, req))\n\n            return gateway.send_order(req)\n        else:\n            return \"\"\n\n    def cancel_order(self, req: CancelRequest, gateway_name: str) -\u003e None:\n        \"\"\"\n        Send cancel order request to a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"委托撤单 -\u003e {}：{}\").format(gateway_name, req))\n\n            gateway.cancel_order(req)\n\n    def send_quote(self, req: QuoteRequest, gateway_name: str) -\u003e str:\n        \"\"\"\n        Send new quote request to a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"报价下单 -\u003e {}：{}\").format(gateway_name, req))\n\n            return gateway.send_quote(req)\n        else:\n            return \"\"\n\n    def cancel_quote(self, req: CancelRequest, gateway_name: str) -\u003e None:\n        \"\"\"\n        Send cancel quote request to a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"报价撤单 -\u003e {}：{}\").format(gateway_name, req))\n\n            gateway.cancel_quote(req)\n\n    def query_history(self, req: HistoryRequest, gateway_name: str) -\u003e list[BarData]:\n        \"\"\"\n        Query bar history data from a specific gateway.\n        \"\"\"\n        gateway: BaseGateway | None = self.get_gateway(gateway_name)\n        if gateway:\n            self.write_log(_(\"查询K线 -\u003e {}：{}\").format(gateway_name, req))\n\n            return gateway.query_history(req)\n        else:\n            return []\n\n    def close(self) -\u003e None:\n        \"\"\"\n        Make sure every gateway and app is closed properly before\n        programme exit.\n        \"\"\"\n        # Stop event engine first to prevent new timer event.\n        self.event_engine.stop()\n\n        for engine in self.engines.values():\n            engine.close()\n\n        for gateway in self.gateways.values():\n            gateway.close()\n\n\nclass LogEngine(BaseEngine):\n    \"\"\"\n    Provides log event output function.\n    \"\"\"\n\n    level_map: dict[int, str] = {\n        DEBUG: \"DEBUG\",\n        INFO: \"INFO\",\n        WARNING: \"WARNING\",\n        ERROR: \"ERROR\",\n        CRITICAL: \"CRITICAL\",\n    }\n\n    def __init__(self, main_engine: MainEngine, event_engine: EventEngine) -\u003e None:\n        \"\"\"\"\"\"\n        super().__init__(main_engine, event_engine, \"log\")\n\n        self.active = SETTINGS[\"log.active\"]\n\n        self.register_log(EVENT_LOG)\n\n    def process_log_event(self, event: Event) -\u003e None:\n        \"\"\"Process log event\"\"\"\n        if not self.active:\n            return\n\n        log: LogData = event.data\n        level: str | int = self.level_map.get(log.level, log.level)\n        logger.bind(gateway_name=log.gateway_name).log(level, log.msg)\n\n    def register_log(self, event_type: str) -\u003e None:\n        \"\"\"Register log event handler\"\"\"\n        self.event_engine.register(event_type, self.process_log_event)\n\n\nclass OmsEngine(BaseEngine):\n    \"\"\"\n    Provides order management system function.\n    \"\"\"\n\n    def __init__(self, main_engine: MainEngine, event_engine: EventEngine) -\u003e None:\n        \"\"\"\"\"\"\n        super().__init__(main_engine, event_engine, \"oms\")\n\n        self.ticks: dict[str, TickData] = {}\n        self.orders: dict[str, OrderData] = {}\n        self.trades: dict[str, TradeData] = {}\n        self.positions: dict[str, PositionData] = {}\n        self.accounts: dict[str, AccountData] = {}\n        self.contracts: dict[str, ContractData] = {}\n        self.quotes: dict[str, QuoteData] = {}\n\n        self.active_orders: dict[str, OrderData] = {}\n        self.active_quotes: dict[str, QuoteData] = {}\n\n        self.offset_converters: dict[str, OffsetConverter] = {}\n\n        self.register_event()\n\n    def register_event(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.event_engine.register(EVENT_TICK, self.process_tick_event)\n        self.event_engine.register(EVENT_ORDER, self.process_order_event)\n        self.event_engine.register(EVENT_TRADE, self.process_trade_event)\n        self.event_engine.register(EVENT_POSITION, self.process_position_event)\n        self.event_engine.register(EVENT_ACCOUNT, self.process_account_event)\n        self.event_engine.register(EVENT_CONTRACT, self.process_contract_event)\n        self.event_engine.register(EVENT_QUOTE, self.process_quote_event)\n\n    def process_tick_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        tick: TickData = event.data\n        self.ticks[tick.vt_symbol] = tick\n\n    def process_order_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        order: OrderData = event.data\n        self.orders[order.vt_orderid] = order\n\n        # If order is active, then update data in dict.\n        if order.is_active():\n            self.active_orders[order.vt_orderid] = order\n        # Otherwise, pop inactive order from in dict\n        elif order.vt_orderid in self.active_orders:\n            self.active_orders.pop(order.vt_orderid)\n\n        # Update to offset converter\n        converter: OffsetConverter | None = self.offset_converters.get(order.gateway_name, None)\n        if converter:\n            converter.update_order(order)\n\n    def process_trade_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        trade: TradeData = event.data\n        self.trades[trade.vt_tradeid] = trade\n\n        # Update to offset converter\n        converter: OffsetConverter | None = self.offset_converters.get(trade.gateway_name, None)\n        if converter:\n            converter.update_trade(trade)\n\n    def process_position_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        position: PositionData = event.data\n        self.positions[position.vt_positionid] = position\n\n        # Update to offset converter\n        converter: OffsetConverter | None = self.offset_converters.get(position.gateway_name, None)\n        if converter:\n            converter.update_position(position)\n\n    def process_account_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        account: AccountData = event.data\n        self.accounts[account.vt_accountid] = account\n\n    def process_contract_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        contract: ContractData = event.data\n        self.contracts[contract.vt_symbol] = contract\n\n        # Initialize offset converter for each gateway\n        if contract.gateway_name not in self.offset_converters:\n            self.offset_converters[contract.gateway_name] = OffsetConverter(self)\n\n    def process_quote_event(self, event: Event) -\u003e None:\n        \"\"\"\"\"\"\n        quote: QuoteData = event.data\n        self.quotes[quote.vt_quoteid] = quote\n\n        # If quote is active, then update data in dict.\n        if quote.is_active():\n            self.active_quotes[quote.vt_quoteid] = quote\n        # Otherwise, pop inactive quote from in dict\n        elif quote.vt_quoteid in self.active_quotes:\n            self.active_quotes.pop(quote.vt_quoteid)\n\n    def get_tick \"\n        return list(self.positions.values())\n\n    def get_all_accounts(self) -\u003e list[AccountData]:\n        \"\"\"\n        Get all account data.\n        \"\"\"\n        return list(self.accounts.values())\n\n    def get_all_contracts(self) -\u003e list[ContractData]:\n        \"\"\"\n        Get all contract data.\n        \"\"\"\n        return list(self.contracts.values())\n\n    def get_all_quotes(self) -\u003e list[QuoteData]:\n        \"\"\"\n        Get all quote data.\n        \"\"\"\n        return list(self.quotes.values())\n\n    def get_all_active_orders(self) -\u003e list[OrderData]:\n        \"\"\"\n        Get all active orders.\n        \"\"\"\n        return list(self.active_orders.values())\n\n    def get_all_active_quotes(self) -\u003e list[QuoteData]:\n        \"\"\"\n        Get all active quotes.\n        \"\"\"\n        return list(self.active_quotes.values())\n\n    def update_order_request(self, req: OrderRequest, vt_orderid: str, gateway_name: str) -\u003e None:\n        \"\"\"\n        Update order request to offset converter.\n        \"\"\"\n        converter: OffsetConverter | None = self.offset_converters.get(gateway_name, None)\n        if converter:\n            converter.update_order_request(req, vt_orderid)\n\n    def convert_order_request(\n        self,\n        req: OrderRequest,\n        gateway_name: str,\n        lock: bool,\n        net: bool = False\n    ) -\u003e list[OrderRequest]:\n        \"\"\"\n        Convert original order request according to given mode.\n        \"\"\"\n        converter: OffsetConverter | None = self.offset_converters.get(gateway_name, None)\n        if not converter:\n            return [req]\n\n        reqs: list[OrderRequest] = converter.convert_order_request(req, lock, net)\n        return reqs\n\n    def get_converter(self, gateway_name: str) -\u003e OffsetConverter | None:\n        \"\"\"\n        Get offset converter object of specific gateway.\n        \"\"\"\n        return self.offset_converters.get(gateway_name, None)\n\n\nclass EmailEngine(BaseEngine):\n    \"\"\"\n    Provides email sending function.\n    \"\"\"\n\n    def __init__(self, main_engine: MainEngine, event_engine: EventEngine) -\u003e None:\n        \"\"\"\"\"\"\n        super().__init__(main_engine, event_engine, \"email\")\n\n        self.thread: Thread = Thread(target=self.run)\n        self.queue: Queue = Queue()\n        self.active: bool = False\n\n    def send_email(self, subject: str, content: str, receiver: str | None = None) -\u003e None:\n        \"\"\"\"\"\"\n        # Start email engine when sending first email.\n        if not self.active:\n            self.start()\n\n        # Use default receiver if not specified.\n        if not receiver:\n            receiver = SETTINGS[\"email.receiver\"]\n\n        msg: EmailMessage = EmailMessage()\n        msg[\"From\"] = SETTINGS[\"email.sender\"]\n        msg[\"To\"] = receiver\n        msg[\"Subject\"] = subject\n        msg.set_content(content)\n\n        self.queue.put(msg)\n\n    def run(self) -\u003e None:\n        \"\"\"\"\"\"\n        server: str = SETTINGS[\"email.server\"]\n        port: int = SETTINGS[\"email.port\"]\n        username: str = SETTINGS[\"email.username\"]\n        password: str = SETTINGS[\"email.password\"]\n\n        while self.active:\n            try:\n                msg: EmailMessage = self.queue.get(block=True, timeout=1)\n\n                try:\n                    with smtplib.SMTP_SSL(server, port) as smtp:\n                        smtp.login(username, password)\n                        smtp.send_message(msg)\n                        smtp.close()\n                except Exception:\n                    log_msg: str = _(\"邮件发送失败: {}\").format(traceback.format_exc())\n                    self.main_engine.write_log(log_msg, \"EmailEngine\")\n            except Empty:\n                pass\n\n    def start(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.active = True\n        self.thread.start()\n\n    def close(self) -\u003e None:\n        \"\"\"\"\"\"\n        if not self.active:\n            return\n\n        self.active = False\n        self.thread.join()\n"

                "content": {
                  "type": "text",
                  "text": "\"\"\"\nBasic data structure used for general trading function in the trading platform.\n\"\"\"\n\nfrom dataclasses import dataclass, field\nfrom datetime import datetime as Datetime\n\nfrom .constant import Direction, Exchange, Interval, Offset, Status, Product, OptionType, OrderType\n\n\nINFO: int = 20\n\n\nACTIVE_STATUSES = set([Status.SUBMITTING, Status.NOTTRADED, Status.PARTTRADED])\n\n\n@dataclass\nclass BaseData:\n    \"\"\"\n    Any data object needs a gateway_name as source\n    and should inherit base data.\n    \"\"\"\n\n    gateway_name: str\n\n    extra: dict | None = field(default=None, init=False)\n\n\n@dataclass\nclass TickData(BaseData):\n    \"\"\"\n    Tick data contains information about:\n        * last trade in market\n        * orderbook snapshot\n        * intraday market statistics.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    datetime: Datetime\n\n    name: str = \"\"\n    volume: float = 0\n    turnover: float = 0\n    open_interest: float = 0\n    last_price: float = 0\n    last_volume: float = 0\n    limit_up: float = 0\n    limit_down: float = 0\n\n    open_price: float = 0\n    high_price: float = 0\n    low_price: float = 0\n    pre_close: float = 0\n\n    bid_price_1: float = 0\n    bid_price_2: float = 0\n    bid_price_3: float = 0\n    bid_price_4: float = 0\n    bid_price_5: float = 0\n\n    ask_price_1: float = 0\n    ask_price_2: float = 0\n    ask_price_3: float = 0\n    ask_price_4: float = 0\n    ask_price_5: float = 0\n\n    bid_volume_1: float = 0\n    bid_volume_2: float = 0\n    bid_volume_3: float = 0\n    bid_volume_4: float = 0\n    bid_volume_5: float = 0\n\n    ask_volume_1: float = 0\n    ask_volume_2: float = 0\n    ask_volume_3: float = 0\n    ask_volume_4: float = 0\n    ask_volume_5: float = 0\n\n    localtime: Datetime | None = None\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n\n\n@dataclass\nclass BarData(BaseData):\n    \"\"\"\n    Candlestick bar data of a certain trading period.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    datetime: Datetime\n\n    interval: Interval | None = None\n    volume: float = 0\n    turnover: float = 0\n    open_interest: float = 0\n    open_price: float = 0\n    high_price: float = 0\n    low_price: float = 0\n    close_price: float = 0\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n\n\n@dataclass\nclass OrderData(BaseData):\n    \"\"\"\n    Order data contains information for tracking lastest status\n    of a specific order.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    orderid: str\n\n    type: OrderType = OrderType.LIMIT\n    direction: Direction | None = None\n    offset: Offset = Offset.NONE\n    price: float = 0\n    volume: float = 0\n    traded: float = 0\n    status: Status = Status.SUBMITTING\n    datetime: Datetime | None = None\n    reference: str = \"\"\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n        self.vt_orderid: str = f\"{self.gateway_name}.{self.orderid}\"\n\n    def is_active(self) -\u003e bool:\n        \"\"\"\n        Check if the order is active.\n        \"\"\"\n        return self.status in ACTIVE_STATUSES\n\n    def create_cancel_request(self) -\u003e \"CancelRequest\":\n        \"\"\"\n        Create cancel request object from order.\n        \"\"\"\n        req: CancelRequest = CancelRequest(\n            orderid=self.orderid, symbol=self.symbol, exchange=self.exchange\n        )\n        return req\n\n\n@dataclass\nclass TradeData(BaseData):\n    \"\"\"\n    Trade data contains information of a fill of an order. One order\n    can have several trade fills.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    orderid: str\n    tradeid: str\n    direction: Direction | None = None\n\n    offset: Offset = Offset.NONE\n    price: float = 0\n    volume: float = 0\n    datetime: Datetime | None = None\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n        self.vt_orderid: str = f\"{self.gateway_name}.{self.orderid}\"\n        self.vt_tradeid: str = f\"{self.gateway_name}.{self.tradeid}\"\n\n\n@dataclass\nclass PositionData(BaseData):\n    \"\"\"\n    Position data is used for tracking each individual position holding.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    direction: Direction\n\n    volume: float = 0\n    frozen: float = 0\n    price: float = 0\n    pnl: float = 0\n    yd_volume: float = 0\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n        self.vt_positionid: str = f\"{self.gateway_name}.{self.vt_symbol}.{self.direction.value}\"\n\n\n@dataclass\nclass AccountData(BaseData):\n    \"\"\"\n    Account data contains information about balance, frozen and\n    available.\n    \"\"\"\n\n    accountid: str\n\n    balance: float = 0\n    frozen: float = 0\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.available: float = self.balance - self.frozen\n        self.vt_accountid: str = f\"{self.gateway_name}.{self.accountid}\"\n\n\n@dataclass\nclass LogData(BaseData):\n    \"\"\"\n    Log data is used for recording log messages on GUI or in log files.\n    \"\"\"\n\n    msg: str\n    level: int = INFO\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.time: Datetime = Datetime.now()\n\n\n@dataclass\nclass ContractData(BaseData):\n    \"\"\"\n    Contract data contains basic information about each contract traded.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    name: str\n    product: Product\n    size: float\n    pricetick: float\n\n    min_volume: float = 1                   # minimum order volume\n    max_volume: float | None = None         # maximum order volume\n    stop_supported: bool = False            # whether server supports stop order\n    net_position: bool = False              # whether gateway uses net position volume\n    history_data: bool = False              # whether gateway provides bar history data\n\n    option_strike: float | None = None\n    option_underlying: str | None = None     # vt_symbol of underlying contract\n    option_type: OptionType | None = None\n    option_listed: Datetime | None = None\n    option_expiry: Datetime | None = None\n    option_portfolio: str | None = None\n    option_index: str | None = None          # for identifying options with same strike price\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n\n\n@dataclass\nclass QuoteData(BaseData):\n    \"\"\"\n    Quote data contains information for tracking lastest status\n    of a specific quote.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    quoteid: str\n\n    bid_price: float = 0.0\n    bid_volume: int = 0\n    ask_price: float = 0.0\n    ask_volume: int = 0\n    bid_offset: Offset = Offset.NONE\n    ask_offset: Offset = Offset.NONE\n    status: Status = Status.SUBMITTING\n    datetime: Datetime | None = None\n    reference: str = \"\"\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n        self.vt_quoteid: str = f\"{self.gateway_name}.{self.quoteid}\"\n\n    def is_active(self) -\u003e bool:\n        \"\"\"\n        Check if the quote is active.\n        \"\"\"\n        return self.status in ACTIVE_STATUSES\n\n    def create_cancel_request(self) -\u003e \"CancelRequest\":\n        \"\"\"\n        Create cancel request object from quote.\n        \"\"\"\n        req: CancelRequest = CancelRequest(\n            orderid=self.quoteid, symbol=self.symbol, exchange=self.exchange\n        )\n        return req\n\n\n@dataclass\nclass SubscribeRequest:\n    \"\"\"\n    Request sending to specific gateway for subscribing tick data update.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n\n\n@dataclass\nclass OrderRequest:\n    \"\"\"\n    Request sending to specific gateway for creating a new order.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    direction: Direction\n    type: OrderType\n    volume: float\n    price: float = 0\n    offset: Offset = Offset.NONE\n    reference: str = \"\"\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n\n    def create_order_data(self, orderid: str, gateway_name: str) -\u003e OrderData:\n        \"\"\"\n        Create order data from request.\n        \"\"\"\n        order: OrderData = OrderData(\n            symbol=self.symbol,\n            exchange=self.exchange,\n            orderid=orderid,\n            type=self.type,\n            direction=self.direction,\n            offset=self.offset,\n            price=self.price,\n            volume=self.volume,\n            reference=self.reference,\n            gateway_name=gateway_name,\n        )\n        return order\n\n\n@dataclass\nclass CancelRequest:\n    \"\"\"\n    Request sending to specific gateway for canceling an existing order.\n    \"\"\"\n\n    orderid: str\n    symbol: str\n    exchange: Exchange\n\n    def __post_init__(self) -\u003e None:\n        \"\"\"\"\"\"\n        self.vt_symbol: str = f\"{self.symbol}.{self.exchange.value}\"\n\n\n@dataclass\nclass HistoryRequest:\n    \"\"\"\n    Request sending to specific gateway for querying history data.\n    \"\"\"\n\n    symbol: str\n    exchange: Exchange\n    start: Datetime\n    end: Datetime | None = Non               "content": "# VeighNa Project Context\n\n## Project Overview\n\n**VeighNa** (formerly vnpy) is an open-source Python-based quantitative trading system framework, designed \"By Traders, For Traders, AI-Powered.\" It has evolved into a multi-functional quantitative trading platform used by financial institutions including hedge funds, securities firms, and futures companies.\n\n**Current Version:** 4.3.0\n\n### Core Architecture\n\nVeighNa follows an **event-driven architecture** with the following key components:\n\n```\nvnpy/\n├── event/          # Event-driven engine core\n├── trader/         # Trading engine, UI, and core abstractions\n├── alpha/          # AI/ML quantitative strategies (v4.0+)\n├── chart/          # High-performance K-line charts\n└── rpc/            # Cross-process communication\n```\n\n### Key Modules\n\n| Module | Description |\n|--------|-------------|\n| **EventEngine** | Core event-driven engine with timer support |\n| **MainEngine** | Central hub integrating gateways, engines, and apps |\n| **OmsEngine** | Order Management System (positions, orders, accounts) |\n| **LogEngine** | Centralized logging system |\n| **EmailEngine** | Email notification system |\n| **Alpha** | ML-based strategy framework (Lasso, LightGBM, MLP) |\n\n### Data Abstractions\n\nCore data classes in `vnpy/trader/object.py`:\n- `TickData` - Real-time market tick data\n- `BarData` - OHLCV candlestick data\n- `OrderData` / `OrderRequest` - Order management\n- `TradeData` - Trade fill records\n- `PositionData` - Position holdings\n- `AccountData` - Account balance info\n- `ContractData` - Contract/instrument metadata\n\n## Building and Running\n\n### Environment Requirements\n\n- **Python:** 3.10+ (64-bit), **recommended: Python 3.13**\n- **OS:** Windows 11+ / Windows Server 2022+ / Ubuntu 22.04 LTS+ / macOS\n- **Recommended:** Use [VeighNa Studio](https://download.vnpy.com/veighna_studio-4.3.0.exe) - pre-built distribution with VeighNa Station\n\n### Installation\n\n**Standard Installation:**\n```bash\n# Windows\ninstall.bat\n\n# Ubuntu/Linux\nbash install.sh\n\n# macOS\nbash install_osx.sh\n```\n\n**Manual Installation:**\n```bash\npip install -e .\n\n# With AI/ML features\npip install -e \".[alpha]\"\n\n# For development\npip install -e \".[dev]\"\n```\n\n### Running VeighNa Trader\n\n**Via VeighNa Station:**\n1. Launch VeighNa Station\n2. Login with forum credentials\n3. Click \"VeighNa Trader\" button\n\n**Via Script:**\n```python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\n\ndef main():\n    qapp = create_qapp()\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    \n    main_engine.add_gateway(CtpGateway)\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n    \n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n    qapp.exec()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n## Development Conventions\n\n### Code Quality Tools\n\n**Linting (ruff):**\n```bash\nruff check .\n```\n\n**Type Checking (mypy):**\n```bash\nmypy vnpy\n```\n\n### Configuration\n\n**pyproject.toml** defines:\n- Ruff linting rules (B, E, F, UP, W codes)\n- MyPy strict type checking settings\n- Package build configuration (hatchling)\n\n### Project Structure\n\n```\nvnpy/\n├── vnpy/                   # Core framework\n│   ├── event/              # Event engine\n│   ├── trader/             # Trading core\n│   │   ├── engine.py       # MainEngine, OmsEngine, LogEngine\n│   │   ├── object.py       # Data classes\n│   │   ├── constant.py     # Enum constants\n│   │   ├── ui/             # Qt-based GUI\n│   │   └── locale/         # i18n translations\n│   ├── alpha/              # AI/ML strategies\n│   │   ├── dataset/        # Feature engineering\n│   │   ├── model/          # ML models\n│   │   ├── strategy/       # Strategy base classes\n│   │   └── lab.py          # Research workflow\n│   ├── chart/              # K-line visualization\n│   └── rpc/                # RPC components\n├── examples/               # Usage examples\n│   ├── alpha_research/     # ML research notebooks\n│   ├── cta_backtesting/    # CTA strategy backtesting\n│   └── veighna_trader/     # Trader startup example\n├── tests/                  # Test suite\n├── docs/                   # Documentation (Sphinx)\n└── pyproject.toml          # Project configuration\n```\n\n### Key Design Patterns\n\n1. **Event-Driven:** All components communicate via `EventEngine` using pub/sub pattern\n2. **Gateway Abstraction:** Trading interfaces implement `BaseGateway` for uniform access\n3. **Data Classes:** All data objects use `@dataclass` with typed fields\n4. **Type Hints:** Full type annotations throughout the codebase\n\n### Testing\n\nLimited test coverage in the repository. Main test file:\n- `tests/test_alpha101.py` - Alpha factor testing\n\n### External Dependencies\n\n**Core:**\n- `PySide6` - Qt6 bindings for GUI\n- `numpy`, `pandas` - Data processing\n- `ta-lib` - Technical analysis\n- `pyqtgraph` - Charting\n- `loguru` - Logging\n\n**AI/ML (optional):**\n- `polars` - Fast DataFrame\n- `scikit-learn`, `lightgbm`, `torch` - Machine learning\n- `scipy` - Scientific computing\n\n## Gateway and App Ecosystem\n\nVeighNa uses a plugin architecture. Core functionality is extended via external packages:\n\n**Gateways (Trading Interfaces):**\n- `vnpy_ctp` - CTP (domestic futures/options)\n- `vnpy_ib` - Interactive Brokers\n- `vnpy_xtp` - XTP (A-shares, ETF options)\n- And 20+ other gateways\n\n**Apps (Trading Applications):**\n- `vnpy_ctastrategy` - CTA strategy engine\n- `vnpy_ctabacktester` - CTA backtesting\n- `vnpy_spreadtrading` - Spread trading\n- `vnpy_portfoliostrategy` - Portfolio strategies\n\n## Alpha Module (AI/ML)\n\nThe v4.0+ `vnpy.alpha` module provides:\n\n```python\nfrom vnpy.alpha import AlphaLab, AlphaDataset, AlphaModel, AlphaStrategy\n\n# Workflow\nlab = AlphaLab()\ndataset = AlphaDataset()\nmodel = AlphaModel()\nstrategy = AlphaStrategy()\n```\n\n**Components:**\n- `dataset` - Feature engineering (Alpha158, custom factors)\n- `model` - ML models (Lasso, LightGBM, MLP)\n- `strategy` - Strategy templates (cross-sectional, time-series)\n- `lab` - Research workflow management\n\n## Useful Commands\n\n```bash\n# Install with all dependencies\npip install -e \".[alpha,dev]\"\n\n# Run linting\nruff check .\n\n# Run type checking\nmypy vnpy\n\n# Run tests\npytest tests/\n```\n\n## Resources\n\n- **Documentation:** https://www.vnpy.com/docs\n- **Forum:** https://www.vnpy.com/forum\n- **GitHub:** https://github.com/vnpy/vnpy\n- **Examples:** See `examples/` directory for usage patterns\n"

                "newText": "# VeighNa Project Context\n\n## Project Overview\n\n**VeighNa** (formerly vnpy) is an open-source Python-based quantitative trading system framework, designed \"By Traders, For Traders, AI-Powered.\" It has evolved into a multi-functional quantitative trading platform used by financial institutions including hedge funds, securities firms, and futures companies.\n\n**Current Version:** 4.3.0\n\n### Core Architecture\n\nVeighNa follows an **event-driven architecture** with the following key components:\n\n```\nvnpy/\n├── event/          # Event-driven engine core\n├── trader/         # Trading engine, UI, and core abstractions\n├── alpha/          # AI/ML quantitative strategies (v4.0+)\n├── chart/          # High-performance K-line charts\n└── rpc/            # Cross-process communication\n```\n\n### Key Modules\n\n| Module | Description |\n|--------|-------------|\n| **EventEngine** | Core event-driven engine with timer support |\n| **MainEngine** | Central hub integrating gateways, engines, and apps |\n| **OmsEngine** | Order Management System (positions, orders, accounts) |\n| **LogEngine** | Centralized logging system |\n| **EmailEngine** | Email notification system |\n| **Alpha** | ML-based strategy framework (Lasso, LightGBM, MLP) |\n\n### Data Abstractions\n\nCore data classes in `vnpy/trader/object.py`:\n- `TickData` - Real-time market tick data\n- `BarData` - OHLCV candlestick data\n- `OrderData` / `OrderRequest` - Order management\n- `TradeData` - Trade fill records\n- `PositionData` - Position holdings\n- `AccountData` - Account balance info\n- `ContractData` - Contract/instrument metadata\n\n## Building and Running\n\n### Environment Requirements\n\n- **Python:** 3.10+ (64-bit), **recommended: Python 3.13**\n- **OS:** Windows 11+ / Windows Server 2022+ / Ubuntu 22.04 LTS+ / macOS\n- **Recommended:** Use [VeighNa Studio](https://download.vnpy.com/veighna_studio-4.3.0.exe) - pre-built distribution with VeighNa Station\n\n### Installation\n\n**Standard Installation:**\n```bash\n# Windows\ninstall.bat\n\n# Ubuntu/Linux\nbash install.sh\n\n# macOS\nbash install_osx.sh\n```\n\n**Manual Installation:**\n```bash\npip install -e .\n\n# With AI/ML features\npip install -e \".[alpha]\"\n\n# For development\npip install -e \".[dev]\"\n```\n\n### Running VeighNa Trader\n\n**Via VeighNa Station:**\n1. Launch VeighNa Station\n2. Login with forum credentials\n3. Click \"VeighNa Trader\" button\n\n**Via Script:**\n```python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\n\ndef main():\n    qapp = create_qapp()\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    \n    main_engine.add_gateway(CtpGateway)\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n    \n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n    qapp.exec()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n## Development Conventions\n\n### Code Quality Tools\n\n**Linting (ruff):**\n```bash\nruff check .\n```\n\n**Type Checking (mypy):**\n```bash\nmypy vnpy\n```\n\n### Configuration\n\n**pyproject.toml** defines:\n- Ruff linting rules (B, E, F, UP, W codes)\n- MyPy strict type checking settings\n- Package build configuration (hatchling)\n\n### Project Structure\n\n```\nvnpy/\n├── vnpy/                   # Core framework\n│   ├── event/              # Event engine\n│   ├── trader/             # Trading core\n│   │   ├── engine.py       # MainEngine, OmsEngine, LogEngine\n│   │   ├── object.py       # Data classes\n│   │   ├── constant.py     # Enum constants\n│   │   ├── ui/             # Qt-based GUI\n│   │   └── locale/         # i18n translations\n│   ├── alpha/              # AI/ML strategies\n│   │   ├── dataset/        # Feature engineering\n│   │   ├── model/          # ML models\n│   │   ├── strategy/       # Strategy base classes\n│   │   └── lab.py          # Research workflow\n│   ├── chart/              # K-line visualization\n│   └── rpc/                # RPC components\n├── examples/               # Usage examples\n│   ├── alpha_research/     # ML research notebooks\n│   ├── cta_backtesting/    # CTA strategy backtesting\n│   └── veighna_trader/     # Trader startup example\n├── tests/                  # Test suite\n├── docs/                   # Documentation (Sphinx)\n└── pyproject.toml          # Project configuration\n```\n\n### Key Design Patterns\n\n1. **Event-Driven:** All components communicate via `EventEngine` using pub/sub pattern\n2. **Gateway Abstraction:** Trading interfaces implement `BaseGateway` for uniform access\n3. **Data Classes:** All data objects use `@dataclass` with typed fields\n4. **Type Hints:** Full type annotations throughout the codebase\n\n### Testing\n\nLimited test coverage in the repository. Main test file:\n- `tests/test_alpha101.py` - Alpha factor testing\n\n### External Dependencies\n\n**Core:**\n- `PySide6` - Qt6 bindings for GUI\n- `numpy`, `pandas` - Data processing\n- `ta-lib` - Technical analysis\n- `pyqtgraph` - Charting\n- `loguru` - Logging\n\n**AI/ML (optional):**\n- `polars` - Fast DataFrame\n- `scikit-learn`, `lightgbm`, `torch` - Machine learning\n- `scipy` - Scientific computing\n\n## Gateway and App Ecosystem\n\nVeighNa uses a plugin architecture. Core functionality is extended via external packages:\n\n**Gateways (Trading Interfaces):**\n- `vnpy_ctp` - CTP (domestic futures/options)\n- `vnpy_ib` - Interactive Brokers\n- `vnpy_xtp` - XTP (A-shares, ETF options)\n- And 20+ other gateways\n\n**Apps (Trading Applications):**\n- `vnpy_ctastrategy` - CTA strategy engine\n- `vnpy_ctabacktester` - CTA backtesting\n- `vnpy_spreadtrading` - Spread trading\n- `vnpy_portfoliostrategy` - Portfolio strategies\n\n## Alpha Module (AI/ML)\n\nThe v4.0+ `vnpy.alpha` module provides:\n\n```python\nfrom vnpy.alpha import AlphaLab, AlphaDataset, AlphaModel, AlphaStrategy\n\n# Workflow\nlab = AlphaLab()\ndataset = AlphaDataset()\nmodel = AlphaModel()\nstrategy = AlphaStrategy()\n```\n\n**Components:**\n- `dataset` - Feature engineering (Alpha158, custom factors)\n- `model` - ML models (Lasso, LightGBM, MLP)\n- `strategy` - Strategy templates (cross-sectional, time-series)\n- `lab` - Research workflow management\n\n## Useful Commands\n\n```bash\n# Install with all dependencies\npip install -e \".[alpha,dev]\"\n\n# Run linting\nruff check .\n\n# Run type checking\nmypy vnpy\n\n# Run tests\npytest tests/\n```\n\n## Resources\n\n- **Documentation:** https://www.vnpy.com/docs\n- **Forum:** https://www.vnpy.com/forum\n- **GitHub:** https://github.com/vnpy/vnpy\n- **Examples:** See `examples/` directory for usage patterns\n"

                  "type": "text",
                  "text": "Based on the content from the vnpy GitHub page, here are all the repositories/packages organized by category:\n\n## **Gateway (交易接口)**\n\n### Domestic Market (国内市场)\n- **ctp** - CTP (国内期货、期权)\n- **mini** - CTP Mini (国内期货、期权)\n- **sopt** - CTP证券 (ETF期权)\n- **femas** - 飞马 (国内期货)\n- **uft** - 恒生UFT (国内期货、ETF期权)\n- **esunny** - 易盛 (国内期货、黄金TD)\n- **hts** - 顶点HTS (ETF期权)\n- **sec** - 顶点飞创 (ETF期权)\n- **xtp** - 中泰XTP (国内证券A股、ETF期权)\n- **tora** - 华鑫奇点 (国内证券A股、ETF期权)\n- **ost** - 东证OST (国内证券A股)\n- **emt** - 东方财富EMT (国内证券A股)\n- **sgit** - 飞鼠 (黄金TD、国内期货)\n- **ksgold** - 金仕达黄金 (黄金TD)\n- **lstar** - 利星资管 (期货资管)\n- **rohon** - 融航 (期货资管)\n- **jees** - 杰宜斯 (期货资管)\n- **comstar** - 中汇亿达 (银行间市场)\n- **tts** - TTS (国内期货仿真)\n\n### Overseas Market (海外市场)\n- **ib** - Interactive Brokers (海外证券、期货、期权、贵金属等)\n- **tap** - 易盛9.0外盘 (海外期货)\n- **da** - 直达期货 (海外期货)\n\n### Special Applications (特殊应用)\n- **rqdata** - RQData行情 (跨市场实时行情)\n- **xt** - 迅投研行情 (跨市场实时行情)\n- **rpc** - RPC服务 (跨进程通讯接口)\n\n---\n\n## **App (交易应用)**\n\n- **cta_strategy** - CTA策略引擎模块\n- **cta_backtester** - CTA策略回测模块\n- **spread_trading** - 价差交易模块\n- **option_master** - 期权交易模块\n- **portfolio_strategy** - 组合策略模块\n- **algo_trading** - 算法交易模块 (TWAP、Sniper、Iceberg、BestLimit等)\n- **script_trader** - 脚本策略模块\n- **paper_account** - 本地仿真模块\n- **chart_wizard** - K线图表模块\n- **portfolio_manager** - 交易组合管理模块\n- **rpc_service** - RPC服务模块\n- **data_manager** - 历史数据管理模块\n- **data_recorder** - 行情记录模块\n- **excel_rtd** - Excel RTD实时数据服务\n- **risk_manager** - 风险管理模块\n- **web_trader** - Web服务模块\n\n---\n\n## **Database (数据库适配器)**\n\n### SQL类\n- **sqlite** - SQLite (轻量级单文件数据库)\n- **mysql** - MySQL (关系型数据库)\n- **postgresql** - PostgreSQL (关系型数据库)\n\n### NoSQL类\n- **dolphindb** - DolphinDB (高性能分布式时序数据库)\n- **taos** - TDengine (分布式时序数据库)\n- **mongodb** - MongoDB (文档式数据库)\n\n---\n\n## **Datafeed (数据服务适配器)**\n\n- **xt** - 迅投研 (股票、期货、期权、基金、债券)\n- **rqdata** - 米筐RQData (股票、期货、期权、基金、债券、黄金TD)\n- **mcdata** - MultiCharts (期货、期货期权)\n- **tushare** - TuShare (股票、期货、期权、基金)\n- **wind** - 万得Wind (股票、期货、基金、债券)\n- **ifind** - 同花顺iFinD (股票、期货、基金、债券)\n- **tqsdk** - 天勤TQSDK (期货)\n- **gm** - 掘金 (股票)\n- **polygon** - polygon (股票、期货、期权)\n\n---\n\n## **API/Core (核心组件)**\n\n- **rest** - REST Client (REST API客户端)\n- **websocket** - Websocket Client (Websocket API客户端)\n- **event** - 事件驱动引擎\n- **rpc** - 跨进程通讯标准组件\n- **chart** - Python高性能K线图表\n- **vnpy.alpha** - AI量化策略模块 (dataset, model, strategy, lab, notebook)\n\n---\n\n## **Main Repository**\n\n- **vnpy** - 主框架 (基于Python的开源量化交易平台开发框架)"

om/vnpy/vnpy_rqdata)）：跨市场（股票、指数、ETF、期货）实时行情\n\n        * :arrow_up: 迅投研行情（[xt](https://www.github.com/vnpy/vnpy_xt)）：跨市场（股票、指数、可转债、ETF、期货、期权）实时行情\n\n        * :arrow_up: RPC服务（[rpc](https://www.github.com/vnpy/vnpy_rpcservice)）：跨进程通讯接口，用于分布式架构\n\n3. 覆盖下述各类量化策略的交易应用（app）：\n\n    * :arrow_up: [cta_strategy](https://www.github.com/vnpy/vnpy_ctastrategy)：CTA策略引擎模块，在保持易用性的同时，允许用户针对CTA类策略运行过程中委托的报撤行为进行细粒度控制（降低交易滑点、实现高频策略）\n\n    * :arrow_up: [cta_backtester](https://www.github.com/vnpy/vnpy_ctabacktester)：CTA策略回测模块，无需使用Jupyter Notebook，直接使用图形界面进行策略回测分析、参数优化等相关工作\n\n    * :arrow_up: [spread_trading](https://www.github.com/vnpy/vnpy_spreadtrading)：价差交易模块，支持自定义价差，实时计算价差行情和持仓，支持价差算法交易以及自动价差策略两种模式\n\n    * :arrow_up: [option_master](https://www.github.com/vnpy/vnpy_optionmaster)：期权交易模块，针对国内期权市场设计，支持多种期权定价模型、隐含波动率曲面计算、希腊值风险跟踪等功能\n\n    * :arrow_up: [portfolio_strategy](https://www.github.com/vnpy/vnpy_portfoliostrategy)：组合策略模块，面向同时交易多合约的量化策略（Alpha、期权套利等），提供历史数据回测和实盘自动交易功能\n\n    * :arrow_up: [algo_trading](https://www.github.com/vnpy/vnpy_algotrading)：算法交易模块，提供多种常用的智能交易算法：TWAP、Sniper、Iceberg、BestLimit等\n\n    * :arrow_up: [script_trader](https://www.github.com/vnpy/vnpy_scripttrader)：脚本策略模块，面向多标的类量化策略和计算任务设计，同时也可以在命令行中实现REPL指令形式的交易，不支持回测功能\n\n    * :arrow_up: [paper_account](https://www.github.com/vnpy/vnpy_paperaccount)：本地仿真模块，纯本地化实现的仿真模拟交易功能，基于交易接口获取的实时行情进行委托撮合，提供委托成交推送以及持仓记录\n\n    * :arrow_up: [chart_wizard](https://www.github.com/vnpy/vnpy_chartwizard)：K线图表模块，基于RQData数据服务（期货）或者交易接口获取历史数据，并结合Tick推送显示实时行情变化\n\n    * :arrow_up: [portfolio_manager](https://www.github.com/vnpy/vnpy_portfoliomanager)：交易组合管理模块，以独立的策略交易组合（子账户）为基础，提供委托成交记录管理、交易仓位自动跟踪以及每日盈亏实时统计功能\n\n    * :arrow_up: [rpc_service](https://www.github.com/vnpy/vnpy_rpcservice)：RPC服务模块，允许将某一进程启动为服务端，作为统一的行情和交易路由通道，允许多客户端同时连接，实现多进程分布式系统\n\n    * :arrow_up: [data_manager](https://www.github.com/vnpy/vnpy_datamanager)：历史数据管理模块，通过树形目录查看数据库中已有的数据概况，选择任意时间段数据查看字段细节，支持CSV文件的数据导入和导出\n\n    * :arrow_up: [data_recorder](https://www.github.com/vnpy/vnpy_datarecorder)：行情记录模块，基于图形界面进行配置，根据需求实时录制Tick或者K线行情到数据库中，用于策略回测或者实盘初始化\n\n    * :arrow_up: [excel_rtd](https://www.github.com/vnpy/vnpy_excelrtd)：Excel RTD（Real Time Data）实时数据服务，基于pyxll模块实现在Excel中获取各类数据（行情、合约、持仓等）的实时推送更新\n\n    * :arrow_up: [risk_manager](https://www.github.com/vnpy/vnpy_riskmanager)：风险管理模块，提供包括交易流控、下单数量、活动委托、撤单总数等规则的统计和限制，有效实现前端风控功能\n\n    * :arrow_up: [web_trader](https://www.github.com/vnpy/vnpy_webtrader)：Web服务模块，针对B-S架构需求设计，实现了提供主动函数调用（REST）和被动数据推送（Websocket）的Web服务器\n\n4. Python交易API接口封装（api），提供上述交易接口的底层对接实现。\n\n    * :arrow_up: REST Client（[rest](https://www.github.com/vnpy/vnpy_rest)）：基于协程异步IO的高性能REST API客户端，采用事件消息循环的编程模型，支持高并发实时交易请求发送\n\n    * :arrow_up: Websocket Client（[websocket](https://www.github.com/vnpy/vnpy_websocket)）：基于协程异步IO的高性能Websocket API客户端，支持和REST Client共用事件循环并发运行\n\n5. :arrow_up: 简洁易用的事件驱动引擎（event），作为事件驱动型交易程序的核心。\n\n6. 对接各类数据库的适配器接口（database）：\n\n    * SQL类\n\n        * :arrow_up: SQLite（[sqlite](https://www.github.com/vnpy/vnpy_sqlite)）：轻量级单文件数据库，无需安装和配置数据服务程序，VeighNa的默认选项，适合入门新手用户\n\n        * :arrow_up: MySQL（[mysql](https://www.github.com/vnpy/vnpy_mysql)）：主流的开源关系型数据库，文档资料极为丰富，且可替换其他NewSQL兼容实现（如TiDB）\n\n        * :arrow_up: PostgreSQL（[postgresql](https://www.github.com/vnpy/vnpy_postgresql)）：特性更为丰富的开源关系型数据库，支持通过扩展插件来新增功能，只推荐熟手使用\n\n    * NoSQL类\n\n        * DolphinDB（[dolphindb](https://www.github.com/vnpy/vnpy_dolphindb)）：一款高性能分布式时序数据库，适用于对速度要求极高的低延时或实时性任务\n\n        * :arrow_up: TDengine（[taos](https://www.github.com/vnpy/vnpy_taos)）：分布式、高性能、支持SQL的时序数据库，带有内建的缓存、流式计算、数据订阅等系统功能，能大幅减少研发和运维的复杂度\n\n        * :arrow_up: MongoDB（[mongodb](https://www.github.com/vnpy/vnpy_mongodb)）：基于分布式文件储存（bson格式）的文档式数据库，内置的热数据内存缓存提供更快读写速度\n\n7. 对接下述各类数据服务的适配器接口（datafeed）：\n\n    * :arrow_up: 迅投研（[xt](https://www.github.com/vnpy/vnpy_xt)）：股票、期货、期权、基金、债券\n\n    * :arrow_up: 米筐RQData（[rqdata](https://www.github.com/vnpy/vnpy_rqdata)）：股票、期货、期权、基金、债券、黄金TD\n\n    * :arrow_up: MultiCharts（[mcdata](https://www.github.com/vnpy/vnpy_mcdata)）：期货、期货期权\n\n    * :arrow_up: TuShare（[tushare](https://www.github.com/vnpy/vnpy_tushare)）：股票、期货、期权、基金\n\n    * :arrow_up: 万得Wind（[wind](https://www.github.com/vnpy/vnpy_wind)）：股票、期货、基金、债券\n\n    * :arrow_up: 同花顺iFinD（[ifind](https://www.github.com/vnpy/vnpy_ifind)）：股票、期货、基金、债券\n\n    * :arrow_up: 天勤TQSDK（[tqsdk](https://www.github.com/vnpy/vnpy_tqsdk)）：期货\n\n    * :arrow_up: 掘金（[gm](https://www.github.com/vnpy/vnpy_gm)）：股票\n\n    * :arrow_up: polygon（[polygon](https://www.github.com/vnpy/vnpy_polygon)）：股票、期货、期权\n\n8. :arrow_up: 跨进程通讯标准组件（rpc），用于实现分布式部署的复杂交易系统。\n\n9. :arrow_up: Python高性能K线图表（chart），支持大数据量图表显示以及实时数据更新功能。\n\n10. [社区论坛](http://www.vnpy.com/forum)和[知乎专栏](http://zhuanlan.zhihu.com/vn-py)，内容包括VeighNa项目的开发教程和Python在量化交易领域的应用研究等内容。\n\n11. 官方交流群262656087（QQ），管理严格（定期清除长期潜水的成员），入群费将捐赠给VeighNa社区基金。\n\n注：以上关于功能特点的说明为根据说明文档发布时情况罗列，后续可能存在更新或调整。若功能描述同实际存在出入，欢迎通过Issue联系进行调整。\n\n## 环境准备\n\n* 推荐使用VeighNa团队为量化交易专门打造的Python发行版[VeighNa Studio-4.3.0](https://download.vnpy.com/veighna_studio-4.3.0.exe)，集成内置了VeighNa框架以及VeighNa Station量化管理平台，无需手动安装\n* 支持的系统版本：Windows 11以上 / Windows Server 2022以上 / Ubuntu 22.04 LTS以上"

_spreadtrading](https://github.com/vnpy/vnpy_spreadtrading) | Spread Trading | 价差交易模块，支持自定义价差和自动价差策略 | :arrow_up: |\n| [vnpy_portfoliostrategy](https://github.com/vnpy/vnpy_portfoliostrategy) | Portfolio Strategy | 组合策略模块，面向多合约量化策略（Alpha、期权套利） | :arrow_up: |\n| [vnpy_algotrading](https://github.com/vnpy/vnpy_algotrading) | Algo Trading | 算法交易模块（TWAP、Sniper、Iceberg、BestLimit） | :arrow_up: |\n| [vnpy_scripttrader](https://github.com/vnpy/vnpy_scripttrader) | Script Trader | 脚本策略模块，支持多标的类量化策略和REPL交易 | :arrow_up: |\n\n### Backtesting (回测)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctabacktester](https://github.com/vnpy/vnpy_ctabacktester) | CTA Backtester | CTA策略回测模块，图形界面回测分析 | :arrow_up: |\n\n### Options Trading (期权交易)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_optionmaster](https://github.com/vnpy/vnpy_optionmaster) | Option Master | 期权交易模块，支持定价模型、隐含波动率曲面、希腊值跟踪 | :arrow_up: |\n\n### Simulation (仿真)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_paperaccount](https://github.com/vnpy/vnpy_paperaccount) | Paper Account | 本地仿真模块，基于实时行情的模拟交易 | :arrow_up: |\n\n### Portfolio Management (组合管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_portfoliomanager](https://github.com/vnpy/vnpy_portfoliomanager) | Portfolio Manager | 交易组合管理模块，子账户委托成交管理和盈亏统计 | :arrow_up: |\n\n### Data Management (数据管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_datamanager](https://github.com/vnpy/vnpy_datamanager) | Data Manager | 历史数据管理模块，树形目录查看和CSV导入导出 | :arrow_up: |\n| [vnpy_datarecorder](https://github.com/vnpy/vnpy_datarecorder) | Data Recorder | 行情记录模块，实时录制Tick/K线行情到数据库 | :arrow_up: |\n\n### Charting \u0026 Visualization (图表)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_chartwizard](https://github.com/vnpy/vnpy_chartwizard) | Chart Wizard | K线图表模块，历史数据+实时Tick推送显示 | :arrow_up: |\n\n### Risk Management (风险管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_riskmanager](https://github.com/vnpy/vnpy_riskmanager) | Risk Manager | 风险管理模块，交易流控、下单数量、活动委托限制 | :arrow_up: |\n\n### Web \u0026 Integration (Web与集成)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_webtrader](https://github.com/vnpy/vnpy_webtrader) | Web Trader | Web服务模块，REST API + Websocket推送的B-S架构 | :arrow_up: |\n| [vnpy_excelrtd](https://github.com/vnpy/vnpy_excelrtd) | Excel RTD | Excel实时数据服务，基于pyxll模块 | :arrow_up: |\n\n---\n\n## Database Extensions (数据库适配器)\n\nDatabase adapters provide persistence for market data, orders, positions, and trades.\n\n### SQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_sqlite](https://github.com/vnpy/vnpy_sqlite) | SQLite | 轻量级单文件数据库，默认选项，适合新手 | :arrow_up: |\n| [vnpy_mysql](https://github.com/vnpy/vnpy_mysql) | MySQL | 主流开源关系型数据库，支持TiDB等NewSQL兼容实现 | :arrow_up: |\n| [vnpy_postgresql](https://github.com/vnpy/vnpy_postgresql) | PostgreSQL | 特性丰富的开源关系型数据库，支持扩展插件 | :arrow_up: |\n\n### NoSQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_mongodb](https://github.com/vnpy/vnpy_mongodb) | MongoDB | 文档式数据库，bson格式，内置热数据内存缓存 | :arrow_up: |\n| [vnpy_taos](https://github.com/vnpy/vnpy_taos) | TDengine | 分布式时序数据库，内置缓存、流计算、数据订阅 | :arrow_up: |\n| [vnpy_dolphindb](https://github.com/vnpy/vnpy_dolphindb) | DolphinDB | 高性能分布式时序数据库，适合低延时实时任务 | - |\n\n---\n\n## Datafeed Extensions (数据服务适配器)\n\nDatafeed adapters provide historical market data for backtesting and research.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_xt](https://github.com/vnpy/vnpy_xt) | 迅投研 | 股票、期货、期权、基金、债券 | :arrow_up: |\n| [vnpy_rqdata](https://github.com/vnpy/vnpy_rqdata) | 米筐RQData | 股票、期货、期权、基金、债券、黄金TD | :arrow_up: |\n| [vnpy_mcdata](https://github.com/vnpy/vnpy_mcdata) | MultiCharts | 期货、期货期权 | :arrow_up: |\n| [vnpy_tushare](https://github.com/vnpy/vnpy_tushare) | TuShare | 股票、期货、期权、基金 | :arrow_up: |\n| [vnpy_wind](https://github.com/vnpy/vnpy_wind) | 万得Wind | 股票、期货、基金、债券 | :arrow_up: |\n| [vnpy_ifind](https://github.com/vnpy/vnpy_ifind) | 同花顺iFinD | 股票、期货、基金、债券 | :arrow_up: |\n| [vnpy_tqsdk](https://github.com/vnpy/vnpy_tqsdk) | 天勤TQSDK | 期货 | :arrow_up: |\n| [vnpy_gm](https://github.com/vnpy/vnpy_gm) | 掘金 | 股票 | :arrow_up: |\n| [vnpy_polygon](https://github.com/vnpy/vnpy_polygon) | polygon | 股票、期货、期权 (US markets) | :arrow_up: |\n\n---\n\n## Core API Extensions (核心组件)\n\nCore infrastructure components for building trading systems.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_rest](https://github.com/vnpy/vnpy_rest) | REST Client | 基于协程异步IO的高性能REST API客户端 | :arrow_up: |\n| [vnpy_websocket](https://github.com/vnpy/vnpy_websocket) | Websocket Client | 基于协程异步IO的高性能Websocket客户端 | :arrow_up: |\n\n---\n\n## AI/ML Module (AI量化模块)\n\nBuilt-in module for AI-powered quantitative strategies (included in main vnpy package since v4.0).\n\n| Module | Description |\n|--------|-------------|\n| `vnpy.alpha.dataset` | 因子特征工程，支持Alpha158等特征集合 |\n| `vnpy.alpha.model` | ML模型训练（Lasso、LightGBM、MLP） |\n| `vnpy.alpha.strategy` | 策略开发（截面多标的、时序单标的） |\n| `vnpy.alpha.lab` | 投研流程管理，可视化分析工具 |\n\n---\n\n## Installation\n\n### Install Main Framework\n```bash\npip install vnpy\n```\n\n### Install with AI/ML Features\n```bash\npip install \"vnpy[alpha]\"\n```\n\n### Install Extensions\n```bash\n# Example: Install CTP gateway and CTA strategy\npip install vnpy-ctp vnpy-ctastrategy vnpy-ctabacktester\n\n# Example: Install database adapter\npip install vnpy-sqlite\n\n# Example: Install datafeed\npip install vnpy-rqdata\n```\n\n### Install from Source\n```bash\ngit clone https://github.com/vnpy/vnpy_\u003cpackage\u003e.git\ncd vnpy_\u003cpackage\u003e\npip install .\n```\n\n---\n\n## Usage Example\n\n```python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\n# Import gateway and apps\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\nfrom vnpy_sqlite import SqliteDatabase\nfrom vnpy_rqdata import RqdataDatafeed\n\ndef main():\n    qapp = create_qapp()\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    \n    # Add gateway\n    main_engine.add_gateway(CtpGateway)\n    \n    # Add apps\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n    \n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n    qapp.exec()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n---\n\n## Repository Structure\n\nAll extension packages follow a consistent structure:\n\n```\nvnpy_\u003cname\u003e/\n├── vnpy/\n│   └── \u003cname\u003e/\n│       ├── __init__.py\n│       ├── gateway.py      # For gateway extensions\n│       ├── engine.py       # For app extensions\n│       ├── ui/             # GUI components\n│       └── ...\n├── setup.py\n├── pyproject.toml\n└── README.md\n```\n\n---\n\n## Statistics\n\n| Category | Count |\n|----------|-------|\n| Gateway Extensions | 24 |\n| App Extensions | 16 |\n| Database Adapters | 6 |\n| Datafeed Adapters | 9 |\n| Core API Extensions | 2 |\n\n**Total Packages:** 57+\n\n---\n\n## Resources\n\n- **Main Repository:** https://github.com/vnpy/vnpy\n- **Documentation:** https://www.vnpy.com/docs\n- **Forum:** https://www.vnpy.com/forum\n- **PyPI:** https://pypi.org/user/vnpy/\n"
