py_spreadtrading](https://github.com/vnpy/vnpy_spreadtrading) | Spread Trading | 价差交易模块，支持自定义价差和自动价差策略 | :arrow_up: |\n| [vnpy_portfoliostrategy](https://github.com/vnpy/vnpy_portfoliostrategy) | Portfolio Strategy | 组合策略模块，面向多合约量化策略（Alpha、期权套利） | :arrow_up: |\n| [vnpy_algotrading](https://github.com/vnpy/vnpy_algotrading) | Algo Trading | 算法交易模块（TWAP、Sniper、Iceberg、BestLimit） | :arrow_up: |\n| [vnpy_scripttrader](https://github.com/vnpy/vnpy_scripttrader) | Script Trader | 脚本策略模块，支持多标的类量化策略和REPL交易 | :arrow_up: |\n\n### Backtesting (回测)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctabacktester](https://github.com/vnpy/vnpy_ctabacktester) | CTA Backtester | CTA策略回测模块，图形界面回测分析 | :arrow_up: |\n\n### Options Trading (期权交易)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_optionmaster](https://github.com/vnpy/vnpy_optionmaster) | Option Master | 期权交易模块，支持定价模型、隐含波动率曲面、希腊值跟踪 | :arrow_up: |\n\n### Simulation (仿真)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_paperaccount](https://github.com/vnpy/vnpy_paperaccount) | Paper Account | 本地仿真模块，基于实时行情的模拟交易 | :arrow_up: |\n\n### Portfolio Management (组合管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_portfoliomanager](https://github.com/vnpy/vnpy_portfoliomanager) | Portfolio Manager | 交易组合管理模块，子账户委托成交管理和盈亏统计 | :arrow_up: |\n\n### Data Management (数据管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_datamanager](https://github.com/vnpy/vnpy_datamanager) | Data Manager | 历史数据管理模块，树形目录查看和CSV导入导出 | :arrow_up: |\n| [vnpy_datarecorder](https://github.com/vnpy/vnpy_datarecorder) | Data Recorder | 行情记录模块，实时录制Tick/K线行情到数据库 | :arrow_up: |\n\n### Charting \u0026 Visualization (图表)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_chartwizard](https://github.com/vnpy/vnpy_chartwizard) | Chart Wizard | K线图表模块，历史数据+实时Tick推送显示 | :arrow_up: |\n\n### Risk Management (风险管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_riskmanager](https://github.com/vnpy/vnpy_riskmanager) | Risk Manager | 风险管理模块，交易流控、下单数量、活动委托限制 | :arrow_up: |\n\n### Web \u0026 Integration (Web与集成)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_webtrader](https://github.com/vnpy/vnpy_webtrader) | Web Trader | Web服务模块，REST API + Websocket推送的B-S架构 | :arrow_up: |\n| [vnpy_excelrtd](https://github.com/vnpy/vnpy_excelrtd) | Excel RTD | Excel实时数据服务，基于pyxll模块 | :arrow_up: |\n\n---\n\n## Database Extensions (数据库适配器)\n\nDatabase adapters provide persistence for market data, orders, positions, and trades.\n\n### SQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_sqlite](https://github.com/vnpy/vnpy_sqlite) | SQLite | 轻量级单文件数据库，默认选项，适合新手 | :arrow_up: |\n| [vnpy_mysql](https://github.com/vnpy/vnpy_mysql) | MySQL | 主流开源关系型数据库，支持TiDB等NewSQL兼容实现 | :arrow_up: |\n| [vnpy_postgresql](https://github.com/vnpy/vnpy_postgresql) | PostgreSQL | 特性丰富的开源关系型数据库，支持扩展插件 | :arrow_up: |\n\n### NoSQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_mongodb](https://github.com/vnpy/vnpy_mongodb) | MongoDB | 文档式数据库，bson格式，内置热数据内存缓存 | :arrow_up: |\n| [vnpy_taos](https://github.com/vnpy/vnpy_taos) | TDengine | 分布式时序数据库，内置缓存、流计算、数据订阅 | :arrow_up: |\n| [vnpy_dolphindb](https://github.com/vnpy/vnpy_dolphindb) | DolphinDB | 高性能分布式时序数据库，适合低延时实时任务 | - |\n\n---\n\n## Datafeed Extensions (数据服务适配器)\n\nDatafeed adapters provide historical market data for backtesting and research.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_xt](https://github.com/vnpy/vnpy_xt) | 迅投研 | 股票、期货、期权、基金、债券 | :arrow_up: |\n| [vnpy_rqdata](https://github.com/vnpy/vnpy_rqdata) | 米筐RQData | 股票、期货、期权、基金、债券、黄金TD | :arrow_up: |\n| [vnpy_mcdata](https://github.com/vnpy/vnpy_mcdata) | MultiCharts | 期货、期货期权 | :arrow_up: |\n| [vnpy_tushare](https://github.com/vnpy/vnpy_tushare) | TuShare | 股票、期货、期权、基金 | :arrow_up: |\n| [vnpy_wind](https://github.com/vnpy/vnpy_wind) | 万得Wind | 股票、期货、基金、债券 | :arrow_up: |\n| [vnpy_ifind](https://github.com/vnpy/vnpy_ifind) | 同花顺iFinD | 股票、期货、基金、债券 | :arrow_up: |\n| [vnpy_tqsdk](https://github.com/vnpy/vnpy_tqsdk) | 天勤TQSDK | 期货 | :arrow_up: |\n| [vnpy_gm](https://github.com/vnpy/vnpy_gm) | 掘金 | 股票 | :arrow_up: |\n| [vnpy_polygon](https://github.com/vnpy/vnpy_polygon) | polygon | 股票、期货、期权 (US markets) | :arrow_up: |\n\n---\n\n## Core API Extensions (核心组件)\n\nCore infrastructure components for building trading systems.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_rest](https://github.com/vnpy/vnpy_rest) | REST Client | 基于协程异步IO的高性能REST API客户端 | :arrow_up: |\n| [vnpy_websocket](https://github.com/vnpy/vnpy_websocket) | Websocket Client | 基于协程异步IO的高性能Websocket客户端 | :arrow_up: |\n\n---\n\n## AI/ML Module (AI量化模块)\n\nBuilt-in module for AI-powered quantitative strategies (included in main vnpy package since v4.0).\n\n| Module | Description |\n|--------|-------------|\n| `vnpy.alpha.dataset` | 因子特征工程，支持Alpha158等特征集合 |\n| `vnpy.alpha.model` | ML模型训练（Lasso、LightGBM、MLP） |\n| `vnpy.alpha.strategy` | 策略开发（截面多标的、时序单标的） |\n| `vnpy.alpha.lab` | 投研流程管理，可视化分析工具 |\n\n---\n\n## Installation\n\n### Install Main Framework\n```bash\npip install vnpy\n```\n\n### Install with AI/ML Features\n```bash\npip install \"vnpy[alpha]\"\n```\n\n### Install Extensions\n```bash\n# Example: Install CTP gateway and CTA strategy\npip install vnpy-ctp vnpy-ctastrategy vnpy-ctabacktester\n\n# Example: Install database adapter\npip install vnpy-sqlite\n\n# Example: Install datafeed\npip install vnpy-rqdata\n```\n\n### Install from Source\n```bash\ngit clone https://github.com/vnpy/vnpy_\u003cpackage\u003e.git\ncd vnpy_\u003cpackage\u003e\npip install .\n```\n\n---\n\n## Usage Example\n\n```python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\n# Import gateway and apps\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\nfrom vnpy_sqlite import SqliteDatabase\nfrom vnpy_rqdata import RqdataDatafeed\n\ndef main():\n    qapp = create_qapp()\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    \n    # Add gateway\n    main_engine.add_gateway(CtpGateway)\n    \n    # Add apps\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n    \n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n    qapp.exec()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n---\n\n## Repository Structure\n\nAll extension packages follow a consistent structure:\n\n```\nvnpy_\u003cname\u003e/\n├── vnpy/\n│   └── \u003cname\u003e/\n│       ├── __init__.py\n│       ├── gateway.py      # For gateway extensions\n│       ├── engine.py       # For app extensions\n│       ├── ui/             # GUI components\n│       └── ...\n├── setup.py\n├── pyproject.toml\n└── README.md\n```\n\n---\n\n## Statistics\n\n| Category | Count |\n|----------|-------|\n| Gateway Extensions | 24 |\n| App Extensions | 16 |\n| Database Adapters | 6 |\n| Datafeed Adapters | 9 |\n| Core API Extensions | 2 |\n\n**Total Packages:** 57+\n\n---\n\n## Resources\n\n- **Main Repository:** https://github.com/vnpy/vnpy\n- **Documentation:** https://www.vnpy.com/docs\n- **Forum:** https://www.vnpy.com/forum\n- **PyPI:** https://pypi.org/user/vnpy/\n"

              "content": "# VeighNa Extensions Catalog\n\nComplete catalog of official VeighNa extension packages. All extensions follow a plugin architecture and are distributed as separate PyPI packages.\n\n**Legend:** :arrow_up: = Upgraded to v4.0 compatible\n\n---\n\n## Gateway Extensions (Trading Interfaces)\n\nGateway extensions provide connectivity to trading venues and brokers.\n\n### Domestic Market (China)\n\n#### Futures \u0026 Options\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctp](https://github.com/vnpy/vnpy_ctp) | CTP | Domestic futures and options (SHFE, ZCE, DCE) | :arrow_up: |\n| [vnpy_mini](https://github.com/vnpy/vnpy_mini) | CTP Mini | Domestic futures and options (CTP Mini system) | :arrow_up: |\n| [vnpy_femas](https://github.com/vnpy/vnpy_femas) | Femas | Domestic futures (Pegasus system) | :arrow_up: |\n| [vnpy_uft](https://github.com/vnpy/vnpy_uft) | Hundsun UFT | Domestic futures, ETF options | :arrow_up: |\n| [vnpy_esunny](https://github.com/vnpy/vnpy_esunny) | Esunny | Domestic futures, Gold TD | :arrow_up: |\n| [vnpy_tts](https://github.com/vnpy/vnpy_tts) | TTS | Domestic futures (paper trading simulation) | :arrow_up: |\n| [vnpy_sgit](https://github.com/vnpy/vnpy_sgit) | Sgit | Gold TD, domestic futures | - |\n\n#### ETF Options\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_sopt](https://github.com/vnpy/vnpy_sopt) | CTP Securities | ETF options (CTP Securities system) | :arrow_up: |\n| [vnpy_hts](https://github.com/vnpy/vnpy_hts) | Hundsun HTS | ETF options | :arrow_up: |\n| [vnpy_sec](https://github.com/vnpy/vnpy_sec) | Hundsun Feichuang | ETF options | :arrow_up: |\n\n#### A-Shares (Stocks)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_xtp](https://github.com/vnpy/vnpy_xtp) | Zhongtai XTP | A-shares, ETF options | :arrow_up: |\n| [vnpy_tora](https://github.com/vnpy/vnpy_tora) | Tora | A-shares, ETF options | :arrow_up: |\n| [vnpy_ost](https://github.com/vnpy/vnpy_ost) | Orient Securities OST | A-shares | - |\n| [vnpy_emt](https://github.com/vnpy/vnpy_emt) | East Money EMT | A-shares | - |\n\n#### Gold\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ksgold](https://github.com/vnpy/vnpy_ksgold) | Kingstar Gold | Gold TD | :arrow_up: |\n\n#### Asset Management\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_lstar](https://github.com/vnpy/vnpy_lstar) | Lstar | Futures asset management | :arrow_up: |\n| [vnpy_rohon](https://github.com/vnpy/vnpy_rohon) | Rohon | Futures asset management | :arrow_up: |\n| [vnpy_jees](https://github.com/vnpy/vnpy_jees) | Jees | Futures asset management | :arrow_up: |\n\n#### Interbank Market\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_comstar](https://github.com/vnpy/vnpy_comstar) | Comstar | Interbank market | - |\n\n---\n\n### Overseas Market\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ib](https://github.com/vnpy/vnpy_ib) | Interactive Brokers | International securities, futures, options, metals | :arrow_up: |\n| [vnpy_tap](https://github.com/vnpy/vnpy_tap) | Esunny 9.0 | International futures | :arrow_up: |\n| [vnpy_da](https://github.com/vnpy/vnpy_da) | Direct Futures | International futures | :arrow_up: |\n\n---\n\n### Special Applications\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_rqdata](https://github.com/vnpy/vnpy_rqdata) | RQData | Cross-market real-time quotes (stocks, indices, ETFs, futures) | :arrow_up: |\n| [vnpy_xt](https://github.com/vnpy/vnpy_xt) | Xuntou | Cross-market real-time quotes (stocks, indices, convertibles, ETFs, futures, options) | :arrow_up: |\n| [vnpy_rpcservice](https://github.com/vnpy/vnpy_rpcservice) | RPC Service | Inter-process communication for distributed architecture | :arrow_up: |\n\n---\n\n## App Extensions (Trading Applications)\n\nApp extensions provide trading strategy engines, backtesting tools, and management utilities.\n\n### Strategy Engines\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctastrategy](https://github.com/vnpy/vnpy_ctastrategy) | CTA Strategy | CTA strategy engine with fine-grained order control | :arrow_up: |\n| [vnpy_spreadtrading](https://github.com/vnpy/vnpy_spreadtrading) | Spread Trading | Spread trading with custom spreads and auto-strategies | :arrow_up: |\n| [vnpy_portfoliostrategy](https://github.com/vnpy/vnpy_portfoliostrategy) | Portfolio Strategy | Multi-contract strategies (Alpha, options arbitrage) | :arrow_up: |\n| [vnpy_algotrading](https://github.com/vnpy/vnpy_algotrading) | Algo Trading | Smart trading algorithms (TWAP, Sniper, Iceberg, BestLimit) | :arrow_up: |\n| [vnpy_scripttrader](https://github.com/vnpy/vnpy_scripttrader) | Script Trader | Script-based strategies, multi-asset quant strategies, REPL trading | :arrow_up: |\n\n### Backtesting\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctabacktester](https://github.com/vnpy/vnpy_ctabacktester) | CTA Backtester | CTA strategy backtesting with GUI analysis tools | :arrow_up: |\n\n### Options Trading\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_optionmaster](https://github.com/vnpy/vnpy_optionmaster) | Option Master | Options trading with pricing models, IV surface, Greeks tracking | :arrow_up: |\n\n### Simulation\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_paperaccount](https://github.com/vnpy/vnpy_paperaccount) | Paper Account | Local simulation trading based on real-time quotes | :arrow_up: |\n\n### Portfolio Management\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_portfoliomanager](https://github.com/vnpy/vnpy_portfoliomanager) | Portfolio Manager | Sub-account management, trade tracking, PnL statistics | :arrow_up: |\n\n### Data Management\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_datamanager](https://github.com/vnpy/vnpy_datamanager) | Data Manager | Historical data management, tree view, CSV import/export | :arrow_up: |\n| [vnpy_datarecorder](https://github.com/vnpy/vnpy_datarecorder) | Data Recorder | Real-time Tick/K-line recording to database | :arrow_up: |\n\n### Charting \u0026 Visualization\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_chartwizard](https://github.com/vnpy/vnpy_chartwizard) | Chart Wizard | K-line charts with historical data + real-time updates | :arrow_up: |\n\n### Risk Management\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_riskmanager](https://github.com/vnpy/vnpy_riskmanager) | Risk Manager | Risk controls: flow limits, order size, active order limits | :arrow_up: |\n\n### Web \u0026 Integration\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_webtrader](https://github.com/vnpy/vnpy_webtrader) | Web Trader | Web server with REST API + Websocket push (B-S architecture) | :arrow_up: |\n| [vnpy_excelrtd](https://github.com/vnpy/vnpy_excelrtd) | Excel RTD | Excel real-time data service via PyXLL | :arrow_up: |\n\n---\n\n## Database Extensions\n\nDatabase adapters provide persistence for market data, orders, positions, and trades.\n\n### SQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_sqlite](https://github.com/vnpy/vnpy_sqlite) | SQLite | Lightweight single-file database, default option, beginner-friendly | :arrow_up: |\n| [vnpy_mysql](https://github.com/vnpy/vnpy_mysql) | MySQL | Mainstream RDBMS, compatible with TiDB and other NewSQL | :arrow_up: |\n| [vnpy_postgresql](https://github.com/vnpy/vnpy_postgresql) | PostgreSQL | Feature-rich RDBMS with extension support | :arrow_up: |\n\n### NoSQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_mongodb](https://github.com/vnpy/vnpy_mongodb) | MongoDB | Document database with BSON format, in-memory hot data cache | :arrow_up: |\n| [vnpy_taos](https://github.com/vnpy/vnpy_taos) | TDengine | Distributed time-series database with built-in cache and stream processing | :arrow_up: |\n| [vnpy_dolphindb](https://github.com/vnpy/vnpy_dolphindb) | DolphinDB | High-performance distributed time-series database for low-latency tasks | - |\n\n---\n\n## Datafeed Extensions (Historical Data Providers)\n\nDatafeed adapters provide historical market data for backtesting and research.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_xt](https://github.com/vnpy/vnpy_xt) | Xuntou | Stocks, futures, options, funds, bonds | :arrow_up: |\n| [vnpy_rqdata](https://github.com/vnpy/vnpy_rqdata) | RQData (Ricequant) | Stocks, futures, options, funds, bonds, Gold TD | :arrow_up: |\n| [vnpy_mcdata](https://github.com/vnpy/vnpy_mcdata) | MultiCharts | Futures, futures options | :arrow_up: |\n| [vnpy_tushare](https://github.com/vnpy/vnpy_tushare) | TuShare | Stocks, futures, options, funds | :arrow_up: |\n| [vnpy_wind](https://github.com/vnpy/vnpy_wind) | Wind | Stocks, futures, funds, bonds | :arrow_up: |\n| [vnpy_ifind](https://github.com/vnpy/vnpy_ifind) | iFinD (Homashare) | Stocks, futures, funds, bonds | :arrow_up: |\n| [vnpy_tqsdk](https://github.com/vnpy/vnpy_tqsdk) | TQSDK | Futures | :arrow_up: |\n| [vnpy_gm](https://github.com/vnpy/vnpy_gm) | Goldminer (MyQuant) | Stocks | :arrow_up: |\n| [vnpy_polygon](https://github.com/vnpy/vnpy_polygon) | Polygon | US stocks, futures, options | :arrow_up: |\n\n---\n\n## Core API Extensions\n\nCore infrastructure components for building trading systems.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_rest](https://github.com/vnpy/vnpy_rest) | REST Client | High-performance async REST API client based on coroutines | :arrow_up: |\n| [vnpy_websocket](https://github.com/vnpy/vnpy_websocket) | Websocket Client | High-performance async Websocket client | :arrow_up: |\n\n---\n\n## AI/ML Module (Built-in)\n\nAI-powered quantitative strategies module (included in main vnpy package since v4.0).\n\n| Module | Description |\n|--------|-------------|\n| `vnpy.alpha.dataset` | Factor feature engineering, includes Alpha158 factor set |\n| `vnpy.alpha.model` | ML model training (Lasso, LightGBM, MLP) |\n| `vnpy.alpha.strategy` | Strategy development (cross-sectional, time-series) |\n| `vnpy.alpha.lab` | Research workflow management with visualization tools |\n\n---\n\n## Installation\n\n### Install Main Framework\n```bash\npip install vnpy\n```\n\n### Install with AI/ML Features\n```bash\npip install \"vnpy[alpha]\"\n```\n\n### Install Extensions\n```bash\n# Example: Install CTP gateway and CTA strategy\npip install vnpy-ctp vnpy-ctastrategy vnpy-ctabacktester\n\n# Example: Install database adapter\npip install vnpy-sqlite\n\n# Example: Install datafeed\npip install vnpy-rqdata\n```\n\n### Install from Source\n```bash\ngit clone https://github.com/vnpy/vnpy_\u003cpackage\u003e.git\ncd vnpy_\u003cpackage\u003e\npip install .\n```\n\n---\n\n## Usage Example\n\n```python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\n# Import gateway and apps\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\nfrom vnpy_sqlite import SqliteDatabase\nfrom vnpy_rqdata import RqdataDatafeed\n\ndef main():\n    qapp = create_qapp()\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    \n    # Add gateway\n    main_engine.add_gateway(CtpGateway)\n    \n    # Add apps\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n    \n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n    qapp.exec()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n---\n\n## Repository Structure\n\nAll extension packages follow a consistent structure:\n\n```\nvnpy_\u003cname\u003e/\n├── vnpy/\n│   └── \u003cname\u003e/\n│       ├── __init__.py\n│       ├── gateway.py      # For gateway extensions\n│       ├── engine.py       # For app extensions\n│       ├── ui/             # GUI components\n│       └── ...\n├── setup.py\n├── pyproject.toml\n└── README.md\n```\n\n---\n\n## Statistics\n\n| Category | Count |\n|----------|-------|\n| Gateway Extensions | 24 |\n| App Extensions | 16 |\n| Database Adapters | 6 |\n| Datafeed Adapters | 9 |\n| Core API Extensions | 2 |\n\n**Total Packages:** 57+\n\n---\n\n## Resources\n\n- **Main Repository:** https://github.com/vnpy/vnpy\n- **Documentation:** https://www.vnpy.com/docs\n- **Forum:** https://www.vnpy.com/forum\n- **PyPI:** https://pypi.org/user/vnpy/\n",

tps://github.com/vnpy/vnpy_chartwizard) | Chart Wizard | K线图表模块，历史数据+实时Tick推送显示 | :arrow_up: |\n\n### Risk Management (风险管理)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_riskmanager](https://github.com/vnpy/vnpy_riskmanager) | Risk Manager | 风险管理模块，交易流控、下单数量、活动委托限制 | :arrow_up: |\n\n### Web \u0026 Integration (Web与集成)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_webtrader](https://github.com/vnpy/vnpy_webtrader) | Web Trader | Web服务模块，REST API + Websocket推送的B-S架构 | :arrow_up: |\n| [vnpy_excelrtd](https://github.com/vnpy/vnpy_excelrtd) | Excel RTD | Excel实时数据服务，基于pyxll模块 | :arrow_up: |\n\n---\n\n## Database Extensions (数据库适配器)\n\nDatabase adapters provide persistence for market data, orders, positions, and trades.\n\n### SQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_sqlite](https://github.com/vnpy/vnpy_sqlite) | SQLite | 轻量级单文件数据库，默认选项，适合新手 | :arrow_up: |\n| [vnpy_mysql](https://github.com/vnpy/vnpy_mysql) | MySQL | 主流开源关系型数据库，支持TiDB等NewSQL兼容实现 | :arrow_up: |\n| [vnpy_postgresql](https://github.com/vnpy/vnpy_postgresql) | PostgreSQL | 特性丰富的开源关系型数据库，支持扩展插件 | :arrow_up: |\n\n### NoSQL Databases\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_mongodb](https://github.com/vnpy/vnpy_mongodb) | MongoDB | 文档式数据库，bson格式，内置热数据内存缓存 | :arrow_up: |\n| [vnpy_taos](https://github.com/vnpy/vnpy_taos) | TDengine | 分布式时序数据库，内置缓存、流计算、数据订阅 | :arrow_up: |\n| [vnpy_dolphindb](https://github.com/vnpy/vnpy_dolphindb) | DolphinDB | 高性能分布式时序数据库，适合低延时实时任务 | - |\n\n---\n\n## Datafeed Extensions (数据服务适配器)\n\nDatafeed adapters provide historical market data for backtesting and research.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_xt](https://github.com/vnpy/vnpy_xt) | 迅投研 | 股票、期货、期权、基金、债券 | :arrow_up: |\n| [vnpy_rqdata](https://github.com/vnpy/vnpy_rqdata) | 米筐RQData | 股票、期货、期权、基金、债券、黄金TD | :arrow_up: |\n| [vnpy_mcdata](https://github.com/vnpy/vnpy_mcdata) | MultiCharts | 期货、期货期权 | :arrow_up: |\n| [vnpy_tushare](https://github.com/vnpy/vnpy_tushare) | TuShare | 股票、期货、期权、基金 | :arrow_up: |\n| [vnpy_wind](https://github.com/vnpy/vnpy_wind) | 万得Wind | 股票、期货、基金、债券 | :arrow_up: |\n| [vnpy_ifind](https://github.com/vnpy/vnpy_ifind) | 同花顺iFinD | 股票、期货、基金、债券 | :arrow_up: |\n| [vnpy_tqsdk](https://github.com/vnpy/vnpy_tqsdk) | 天勤TQSDK | 期货 | :arrow_up: |\n| [vnpy_gm](https://github.com/vnpy/vnpy_gm) | 掘金 | 股票 | :arrow_up: |\n| [vnpy_polygon](https://github.com/vnpy/vnpy_polygon) | polygon | 股票、期货、期权 (US markets) | :arrow_up: |\n\n---\n\n## Core API Extensions (核心组件)\n\nCore infrastructure components for building trading systems.\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_rest](https://github.com/vnpy/vnpy_rest) | REST Client | 基于协程异步IO的高性能REST API客户端 | :arrow_up: |\n| [vnpy_websocket](https://github.com/vnpy/vnpy_websocket) | Websocket Client | 基于协程异步IO的高性能Websocket客户端 | :arrow_up: |\n\n---\n\n## AI/ML Module (AI量化模块)\n\nBuilt-in module for AI-powered quantitative strategies (included in main vnpy package since v4.0).\n\n| Module | Description |\n|--------|-------------|\n| `vnpy.alpha.dataset` | 因子特征工程，支持Alpha158等特征集合 |\n| `vnpy.alpha.model` | ML模型训练（Lasso、LightGBM、MLP） |\n| `vnpy.alpha.strategy` | 策略开发（截面多标的、时序单标的） |\n| `vnpy.alpha.lab` | 投研流程管理，可视化分析工具 |\n\n---\n\n## Installation\n\n### Install Main Framework\n```bash\npip install vnpy\n```\n\n### Install with AI/ML Features\n```bash\npip install \"vnpy[alpha]\"\n```\n\n### Install Extensions\n```bash\n# Example: Install CTP gateway and CTA strategy\npip install vnpy-ctp vnpy-ctastrategy vnpy-ctabacktester\n\n# Example: Install database adapter\npip install vnpy-sqlite\n\n# Example: Install datafeed\npip install vnpy-rqdata\n```\n\n### Install from Source\n```bash\ngit clone https://github.com/vnpy/vnpy_\u003cpackage\u003e.git\ncd vnpy_\u003cpackage\u003e\npip install .\n```\n\n---\n\n## Usage Example\n\n```python\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\n# Import gateway and apps\nfrom vnpy_ctp import CtpGateway\nfrom vnpy_ctastrategy import CtaStrategyApp\nfrom vnpy_ctabacktester import CtaBacktesterApp\nfrom vnpy_sqlite import SqliteDatabase\nfrom vnpy_rqdata import RqdataDatafeed\n\ndef main():\n    qapp = create_qapp()\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    \n    # Add gateway\n    main_engine.add_gateway(CtpGateway)\n    \n    # Add apps\n    main_engine.add_app(CtaStrategyApp)\n    main_engine.add_app(CtaBacktesterApp)\n    \n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n    qapp.exec()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n---\n\n## Repository Structure\n\nAll extension packages follow a consistent structure:\n\n```\nvnpy_\u003cname\u003e/\n├── vnpy/\n│   └── \u003cname\u003e/\n│       ├── __init__.py\n│       ├── gateway.py      # For gateway extensions\n│       ├── engine.py       # For app extensions\n│       ├── ui/             # GUI components\n│       └── ...\n├── setup.py\n├── pyproject.toml\n└── README.md\n```\n\n---\n\n## Statistics\n\n| Category | Count |\n|----------|-------|\n| Gateway Extensions | 24 |\n| App Extensions | 16 |\n| Database Adapters | 6 |\n| Datafeed Adapters | 9 |\n| Core API Extensions | 2 |\n\n**Total Packages:** 57+\n\n---\n\n## Resources\n\n- **Main Repository:** https://github.com/vnpy/vnpy\n- **Documentation:** https://www.vnpy.com/docs\n- **Forum:** https://www.vnpy.com/forum\n- **PyPI:** https://pypi.org/user/vnpy/\n",
                "newText": "# VeighNa Extensions Catalog\n\nComplete catalog of official VeighNa extension packages. All extensions follow a plugin architecture and are distributed as separate PyPI packages.\n\n**Legend:** :arrow_up: = Upgraded to v4.0 compatible\n\n---\n\n## Gateway Extensions (Trading Interfaces)\n\nGateway extensions provide connectivity to trading venues and brokers.\n\n### Domestic Market (China)\n\n#### Futures \u0026 Options\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctp](https://github.com/vnpy/vnpy_ctp) | CTP | Domestic futures and options (SHFE, ZCE, DCE) | :arrow_up: |\n| [vnpy_mini](https://github.com/vnpy/vnpy_mini) | CTP Mini | Domestic futures and options (CTP Mini system) | :arrow_up: |\n| [vnpy_femas](https://github.com/vnpy/vnpy_femas) | Femas | Domestic futures (Pegasus system) | :arrow_up: |\n| [vnpy_uft](https://github.com/vnpy/vnpy_uft) | Hundsun UFT | Domestic futures, ETF options | :arrow_up: |\n| [vnpy_esunny](https://github.com/vnpy/vnpy_esunny) | Esunny | Domestic futures, Gold TD | :arrow_up: |\n| [vnpy_tts](https://github.com/vnpy/vnpy_tts) | TTS | Domestic futures (paper trading simulation) | :arrow_up: |\n| [vnpy_sgit](https://github.com/vnpy/vnpy_sgit) | Sgit | Gold TD, domestic futures | - |\n\n#### ETF Options\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_sopt](https://github.com/vnpy/vnpy_sopt) | CTP Securities | ETF options (CTP Securities system) | :arrow_up: |\n| [vnpy_hts](https://github.com/vnpy/vnpy_hts) | Hundsun HTS | ETF options | :arrow_up: |\n| [vnpy_sec](https://github.com/vnpy/vnpy_sec) | Hundsun Feichuang | ETF options | :arrow_up: |\n\n#### A-Shares (Stocks)\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_xtp](https://github.com/vnpy/vnpy_xtp) | Zhongtai XTP | A-shares, ETF options | :arrow_up: |\n| [vnpy_tora](https://github.com/vnpy/vnpy_tora) | T s communication for distributed architecture | :arrow_up: |\n\n---\n\n## App Extensions (Trading Applications)\n\nApp extensions provide trading strategy engines, backtesting tools, and management utilities.\n\n### Strategy Engines\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctastrategy](https://github.com/vnpy/vnpy_ctastrategy) | CTA Strategy | CTA strategy engine with fine-grained order control | :arrow_up: |\n| [vnpy_spreadtrading](https://github.com/vnpy/vnpy_spreadtrading) | Spread Trading | Spread trading with custom spreads and auto-strategies | :arrow_up: |\n| [vnpy_portfoliostrategy](https://github.com/vnpy/vnpy_portfoliostrategy) | Portfolio Strategy | Multi-contract strategies (Alpha, options arbitrage) | :arrow_up: |\n| [vnpy_algotrading](https://github.com/vnpy/vnpy_algotrading) | Algo Trading | Smart trading algorithms (TWAP, Sniper, Iceberg, BestLimit) | :arrow_up: |\n| [vnpy_scripttrader](https://github.com/vnpy/vnpy_scripttrader) | Script Trader | Script-based strategies, multi-asset quant strategies, REPL trading | :arrow_up: |\n\n### Backtesting\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_ctabacktester](https://github.com/vnpy/vnpy_ctabacktester) | CTA Backtester | CTA strategy backtesting with GUI analysis tools | :arrow_up: |\n\n### Options Trading\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_optionmaster](https://github.com/vnpy/vnpy_optionmaster) | Option Master | Options trading with pricing models, IV surface, Greeks tracking | :arrow_up: |\n\n### Simulation\n\n| Package | Name | Description | Status |\n|---------|------|-------------|--------|\n| [vnpy_paperaccount](https://github.com/vnpy/vnpy_paperaccount) | Paper Account | Local simulation trading based on real-time quotes | :arrow_up: |\n\n### Portfolio Management\n\n| Package | Name | Description | Status |\n|---------|------|----                   "type": "text",
                  "text": "Showing lines 1-803 of 1653 total lines.\n\n---\n\nimport hashlib\nimport hmac\nimport time\nimport urllib.parse\nfrom copy import copy\nfrom typing import cast, Any\nfrom collections.abc import Callable\nfrom time import sleep\nfrom datetime import datetime, timedelta\n\nfrom numpy import format_float_positional\n\nfrom vnpy.event import Event, EventEngine\nfrom vnpy.trader.constant import (\n    Direction,\n    Exchange,\n    Product,\n    Status,\n    OrderType,\n    Interval\n)\nfrom vnpy.trader.gateway import BaseGateway\nfrom vnpy.trader.object import (\n    TickData,\n    OrderData,\n    TradeData,\n    AccountData,\n    ContractData,\n    PositionData,\n    BarData,\n    OrderRequest,\n    CancelRequest,\n    SubscribeRequest,\n    HistoryRequest\n)\nfrom vnpy.trader.event import EVENT_TIMER\nfrom vnpy.trader.utility import round_to, ZoneInfo\nfrom vnpy_rest import Request, RestClient, Response\nfrom vnpy_websocket import WebsocketClient\n\n\n# Timezone constant\nUTC_TZ = ZoneInfo(\"UTC\")\n\n# Real server hosts\nREAL_REST_HOST: str = \"https://fapi.binance.com\"\nREAL_TRADE_HOST: str = \"wss://ws-fapi.binance.com/ws-fapi/v1\"\nREAL_USER_HOST: str = \"wss://fstream.binance.com/ws/\"\nREAL_DATA_HOST: str = \"wss://fstream.binance.com/stream\"\n\n# Testnet server hosts\nTESTNET_REST_HOST: str = \"https://testnet.binancefuture.com\"\nTESTNET_TRADE_HOST: str = \"wss://testnet.binancefuture.com/ws-fapi/v1\"\nTESTNET_USER_HOST: str = \"wss://stream.binancefuture.com/ws/\"\nTESTNET_DATA_HOST: str = \"wss://stream.binancefuture.com/stream\"\n\n# Order status map\nSTATUS_BINANCE2VT: dict[str, Status] = {\n    \"NEW\": Status.NOTTRADED,\n    \"PARTIALLY_FILLED\": Status.PARTTRADED,\n    \"FILLED\": Status.ALLTRADED,\n    \"CANCELED\": Status.CANCELLED,\n    \"REJECTED\": Status.REJECTED,\n    \"EXPIRED\": Status.CANCELLED\n}\n\n# Order type map\nORDERTYPE_VT2BINANCE: dict[OrderType, tuple[str, str]] = {\n    OrderType.LIMIT: (\"LIMIT\", \"GTC\"),\n    OrderType.MARKET: (\"MARKET\", \"GTC\"),\n    OrderType.FAK: (\"LIMIT\", \"IOC\"),\n    OrderType.FOK: (\"LIMIT\", \"FOK\"),\n}\nORDERTYPE_BINANCE2VT: dict[tuple[str, str], OrderType] = {v: k for k, v in ORDERTYPE_VT2BINANCE.items()}\n\n# Direction map\nDIRECTION_VT2BINANCE: dict[Direction, str] = {\n    Direction.LONG: \"BUY\",\n    Direction.SHORT: \"SELL\"\n}\nDIRECTION_BINANCE2VT: dict[str, Direction] = {v: k for k, v in DIRECTION_VT2BINANCE.items()}\n\n# Product map\nPRODUCT_BINANCE2VT: dict[str, Product] = {\n    \"PERPETUAL\": Product.SWAP,\n    \"PERPETUAL_DELIVERING\": Product.SWAP,\n    \"CURRENT_MONTH\": Product.FUTURES,\n    \"NEXT_MONTH\": Product.FUTURES,\n    \"CURRENT_QUARTER\": Product.FUTURES,\n    \"NEXT_QUARTER\": Product.FUTURES,\n}\n\n# Kline interval map\nINTERVAL_VT2BINANCE: dict[Interval, str] = {\n    Interval.MINUTE: \"1m\",\n    Interval.HOUR: \"1h\",\n    Interval.DAILY: \"1d\",\n}\n\n# Timedelta map\nTIMEDELTA_MAP: dict[Interval, timedelta] = {\n    Interval.MINUTE: timedelta(minutes=1),\n    Interval.HOUR: timedelta(hours=1),\n    Interval.DAILY: timedelta(days=1),\n}\n\n# Set weboscket timeout to 24 hour\nWEBSOCKET_TIMEOUT = 24 * 60 * 60\n\n\nclass BinanceLinearGateway(BaseGateway):\n    \"\"\"\n    The Binance linear trading gateway for VeighNa.\n\n    This gateway provides trading functionality for Binance USDT perpetual contracts\n    and delivery futures through their API.\n\n    Features:\n    1. Only support crossed position\n    2. Only support one-way mode\n    3. Provides market data, trading, and account management capabilities\n    \"\"\"\n\n    default_name: str = \"BINANCE_LINEAR\"\n\n    default_setting: dict = {\n        \"API Key\": \"\",\n        \"API Secret\": \"\",\n        \"Server\": [\"REAL\", \"TESTNET\"],\n        \"Kline Stream\": [\"False\", \"True\"],\n        \"Proxy Host\": \"\",\n        \"Proxy Port\": 0\n    }\n\n    exchanges: Exchange = [Exchange.GLOBAL]\n\n    def __init__(self, event_engine: EventEngine, gateway_name: str) -\u003e None:\n        \"\"\"\n        The init method of the gateway.\n\n        This method initializes the gateway components including REST API,\n        trading API, user data API, and market data API. It also sets up\n        the data structures for order and contract storage.\n\n        Parameters:\n            event_engine: the global event engine object of VeighNa\n            gateway_name: the unique name for identifying the gateway\n        \"\"\"\n        super().__init__(event_engine, gateway_name)\n\n        self.trade_api: TradeApi = TradeApi(self)\n        self.user_api: UserApi = UserApi(self)\n        self.md_api: MdApi = MdApi(self)\n        self.rest_api: RestApi = RestApi(self)\n\n        self.orders: dict[str, OrderData] = {}\n        self.symbol_contract_map: dict[str, ContractData] = {}\n        self.name_contract_map: dict[str, ContractData] = {}\n\n    def connect(self, setting: dict) -\u003e None:\n        \"\"\"\n        Start server connections.\n\n        This method establishes connections to Binance servers\n        using the provided settings.\n\n        Parameters:\n            setting: A dictionary containing connection parameters including\n                    API credentials, server selection, and proxy configuration\n        \"\"\"\n        key: str = setting[\"API Key\"]\n        secret: str = setting[\"API Secret\"]\n        server: str = setting[\"Server\"]\n        kline_stream: bool = setting[\"Kline Stream\"] == \"True\"\n        proxy_host: str = setting[\"Proxy Host\"]\n        proxy_port: int = setting[\"Proxy Port\"]\n\n        self.rest_api.connect(key, secret, server, proxy_host, proxy_port)\n        self.trade_api.connect(key, secret, server, proxy_host, proxy_port)\n        self.md_api.connect(server, kline_stream, proxy_host, proxy_port)\n\n        self.event_engine.register(EVENT_TIMER, self.process_timer_event)\n\n    def subscribe(self, req: SubscribeRequest) -\u003e None:\n        \"\"\"\n        Subscribe to market data.\n\n        This method forwards the subscription request to the market data API.\n\n        Parameters:\n            req: Subscription request object containing the symbol to subscribe\n        \"\"\"\n        self.md_api.subscribe(req)\n\n    def send_order(self, req: OrderRequest) -\u003e str:\n        \"\"\"\n        Send new order.\n\n        This method forwards the order request to the trading API.\n\n        Parameters:\n            req: Order request object containing order details\n\n        Returns:\n            str: The VeighNa order ID if successful, empty string if failed\n        \"\"\"\n        return self.trade_api.send_order(req)\n\n    def cancel_order(self, req: CancelRequest) -\u003e None:\n        \"\"\"\n        Cancel existing order.\n\n        This method forwards the cancellation request to the trading API.\n\n        Parameters:\n            req: Cancel request object containing order details\n        \"\"\"\n        self.trade_api.cancel_order(req)\n\n    def query_account(self) -\u003e None:\n        \"\"\"\n        Query account balance.\n\n        Not required since Binance provides websocket updates for account balances.\n        \"\"\"\n        pass\n\n    def query_position(self) -\u003e None:\n        \"\"\"\n        Query current positions.\n\n        Not required since Binance provides websocket updates for positions.\n        \"\"\"\n        pass\n\n    def query_history(self, req: HistoryRequest) -\u003e list[BarData]:\n        \"\"\"\n        Query historical kline data.\n\n        This method forwards the history request to the REST API.\n\n        Parameters:\n            req: History request object containing query parameters\n\n        Returns:\n            list[BarData]: List of historical kline data bars\n        \"\"\"\n        return self.rest_api.query_history(req)\n\n    def close(self) -\u003e None:\n        \"\"\"\n        Close server connections.\n\n        This method stops all API connections and releases resources.\n        \"\"\"\n        self.rest_api.stop()\n        self.user_api.stop()\n        self.md_api.stop()\n        self.trade_api.stop()\n\n    def process_timer_event(self, event: Event) -\u003e None:\n        \"\"\"\n        Process timer task.\n\n        This function is called regularly by the event engine to perform scheduled tasks,\n        such as keeping the user stream alive.\n\n        Parameters:\n            event: Timer event object\n        \"\"\"\n        self.rest_api.keep_user_stream()\n\n    def on_order(self, order: OrderData) -\u003e None:\n        \"\"\"\n        Save a copy of order and then push to event engine.\n\n        Parameters:\n            order: Order data object\n        \"\"\"\n        self.orders[order.orderid] = copy(order)\n        super().on_order(order)\n\n    def get_order(self, orderid: str) -\u003e OrderData:\n        \"\"\"\n        Get previously saved order by order id.\n\n        Parameters:\n            orderid: The ID of the order to retrieve\n\n        Returns:\n            Order data object if found, None otherwise\n        \"\"\"\n        return self.orders.get(orderid, None)\n\n    def on_contract(self, contract: ContractData) -\u003e None:\n        \"\"\"\n        Save contract data in mappings and push to event engine.\n\n        Parameters:\n            contract: Contract data object\n        \"\"\"\n        self.symbol_contract_map[contract.symbol] = contract\n        self.name_contract_map[contract.name] = contract\n        super().on_contract(contract)\n\n    def get_contract_by_symbol(self, symbol: str) -\u003e ContractData | None:\n        \"\"\"\n        Get contract data by VeighNa symbol.\n\n        Parameters:\n            symbol: VeighNa symbol (e.g. \"BTC_SWAP_BINANCE\")\n\n        Returns:\n            Contract data object if found, None otherwise\n        \"\"\"\n        return self.symbol_contract_map.get(symbol, None)\n\n    def get_contract_by_name(self, name: str) -\u003e ContractData | None:\n        \"\"\"\n        Get contract data by exchange symbol name.\n\n        Parameters:\n            name: Exchange symbol name (e.g. \"BTCUSDT\")\n\n        Returns:\n            Contract data object if found, None otherwise\n        \"\"\"\n        return self.name_contract_map.get(name, None)\n\n\nclass RestApi(RestClient):\n    \"\"\"\n    The REST API of BinanceLinearGateway.\n\n    This class handles HTTP requests to Binance API endpoints, including:\n    - Authentication and signature generation\n    - Contract information queries\n    - Account and position queries\n    - Order management\n    - Historical data queries\n    - User data stream management\n    \"\"\"\n\n    def __init__(self, gateway: BinanceLinearGateway) -\u003e None:\n        \"\"\"\n        The init method of the API.\n\n        This method initializes the REST API with a reference to the parent gateway.\n\n        Parameters:\n            gateway: the parent gateway object for pushing callback data\n        \"\"\"\n        super().__init__()\n\n        self.gateway: BinanceLinearGateway = gateway\n        self.gateway_name: str = gateway.gateway_name\n\n        self.user_api: UserApi = self.gateway.user_api\n\n        self.key: str = \"\"\n        self.secret: bytes = b\"\"\n\n        self.user_stream_key: str = \"\"\n        self.keep_alive_count: int = 0\n        self.time_offset: int = 0\n\n        self.order_count: int = 1_000_000\n        self.order_prefix: str = \"\"\n\n    def sign(self, request: Request) -\u003e Request:\n        \"\"\"\n        Standard callback for signing a request.\n\n        This method adds the necessary authentication parameters and signature\n        to requests that require API key authentication.\n\n        It handles:\n        1. Path construction with query parameters\n        2. Timestamp generation with server time offset adjustment\n        3. HMAC-SHA256 signature generation\n        4. Required authentication headers\n\n        Parameters:\n            request: Request object to be signed\n\n        Returns:\n            Request: Modified request with authentication parameters\n        \"\"\"\n        # Construct path with query parameters if they exist\n        if request.params:\n            path: str = request.path + \"?\" + urllib.parse.urlencode(request.params)\n        else:\n            request.params = {}\n            path = request.path\n\n        # Get current timestamp in milliseconds\n        timestamp: int = int(time.time() * 1000)\n\n        # Adjust timestamp based on time offset with server\n        if self.time_offset \u003e 0:\n            timestamp -= abs(self.time_offset)\n        elif self.time_offset \u003c 0:\n            timestamp += abs(self.time_offset)\n\n        # Add timestamp to request parameters\n        request.params[\"timestamp\"] = timestamp\n\n        # Generate signature using HMAC SHA256\n        query: str = urllib.parse.urlencode(sorted(request.params.items()))\n        signature: str = hmac.new(\n            self.secret,\n            query.encode(\"utf-8\"),\n            hashlib.sha256\n        ).hexdigest()\n\n        # Append signature to query string\n        query += f\"\u0026signature={signature}\"\n        path = request.path + \"?\" + query\n\n        # Update request with signed path and clear params/data\n        request.path = path\n        request.params = {}\n        request.data = {}\n\n        # Add required headers for API authentication\n        request.headers = {\n            \"Content-Type\": \"application/x-www-form-urlencoded\",\n            \"Accept\": \"application/json\",\n            \"X-MBX-APIKEY\": self.key,\n            \"Connection\": \"close\"\n        }\n\n        return request\n\n    def connect(\n        self,\n        key: str,\n        secret: str,\n        server: str,\n        proxy_host: str,\n        proxy_port: int\n    ) -\u003e None:\n        \"\"\"Start server connection\"\"\"\n        self.key = key\n        self.secret = secret.encode()\n        self.proxy_port = proxy_port\n        self.proxy_host = proxy_host\n        self.server = server\n\n        self.order_prefix = datetime.now().strftime(\"%y%m%d%H%M%S\")\n\n        if self.server == \"REAL\":\n            self.init(REAL_REST_HOST, proxy_host, proxy_port)\n        else:\n            self.init(TESTNET_REST_HOST, proxy_host, proxy_port)\n\n        self.start()\n\n        self.gateway.write_log(\"REST API started\")\n\n        self.query_time()\n\n    def query_time(self) -\u003e None:\n        \"\"\"\n        Query server time to calculate local time offset.\n\n        This function sends a request to get the exchange server time,\n        which is used to calculate the local time offset for timestamp synchronization.\n        \"\"\"\n        path: str = \"/fapi/v1/time\"\n\n        self.add_request(\n            \"GET\",\n            path,\n            callback=self.on_query_time\n        )\n\n    def query_account(self) -\u003e None:\n        \"\"\"\n        Query account balance.\n\n        This function sends a request to get the account balance information,\n        including wallet balance, available balance, and margin.\n        \"\"\"\n        path: str = \"/fapi/v3/account\"\n\n        self.add_request(\n            method=\"GET\",\n            path=path,\n            callback=self.on_query_account,\n        )\n\n    def query_position(self) -\u003e None:\n        \"\"\"\n        Query holding positions.\n\n        This function sends a request to get current position data,\n        including position amount, entry price, and unrealized profit/loss.\n        \"\"\"\n        path: str = \"/fapi/v3/positionRisk\"\n\n        self.add_request(\n            method=\"GET\",\n            path=path,\n            callback=self.on_query_position,\n        )\n\n    def query_order(self) -\u003e None:\n        \"\"\"\n        Query open orders.\n\n        This function sends a request to get all active orders\n        that have not been fully filled or cancelled.\n        \"\"\"\n        path: str = \"/fapi/v1/openOrders\"\n\n        self.add_request(\n            method=\"GET\",\n            path=path,\n            callback=self.on_query_order,\n        )\n\n    def query_contract(self) -\u003e None:\n        \"\"\"\n        Query available contracts.\n\n        This function sends a request to get exchange information,\n        including all available trading instruments, their precision,\n        and trading rules.\n        \"\"\"\n        path: str = \"/fapi/v1/exchangeInfo\"\n\n        self.add_request(\n            method=\"GET\",\n            path=path,\n            callback=self.on_query_contract,\n        )\n\n    def start_user_stream(self) -\u003e None:\n        \"\"\"\n        Create listen key for user stream.\n\n        This function sends a request to create a listen key which is\n        required to establish a user data websocket connection.\n        \"\"\"\n        path: str = \"/fapi/v1/listenKey\"\n\n        self.add_request(\n            method=\"POST\",\n            path=path,\n            callback=self.on_start_user_stream,\n        )\n\n    def keep_user_stream(self) -\u003e None:\n        \"\"\"\n        Extend listen key validity.\n\n        This function sends a request to keep the listen key active,\n        which is required to maintain the user data websocket connection.\n        The listen key will expire after 60 minutes if not refreshed.\n        \"\"\"\n        if not self.user_stream_key:\n            return\n\n        self.keep_alive_count += 1\n        if self.keep_alive_count \u003c 600:\n            return\n        self.keep_alive_count = 0\n\n        params: dict = {\"listenKey\": self.user_stream_key}\n\n        path: str = \"/fapi/v1/listenKey\"\n\n        self.add_request(\n            method=\"PUT\",\n            path=path,\n            callback=self.on_keep_user_stream,\n            params=params,\n            on_error=self.on_keep_user_stream_error\n        )\n\n    def on_query_time(self, data: dict, request: Request) -\u003e None:\n        \"\"\"\n        Callback of server time query.\n\n        This function processes the server time response and calculates\n        the time offset between local and server time, which is used for\n        request timestamp synchronization.\n\n        Parameters:\n            data: Response data from the server\n            request: Original request object\n        \"\"\"\n        local_time: int = int(time.time() * 1000)\n        server_time: int = int(data[\"serverTime\"])\n        self.time_offset = local_time - server_time\n\n        self.gateway.write_log(f\"Server time updated, local offset: {self.time_offset}ms\")\n\n        self.query_contract()\n\n    def on_query_account(self, data: dict, request: Request) -\u003e None:\n        \"\"\"\n        Callback of account balance query.\n\n        This function processes the account balance response and\n        creates AccountData objects for each asset in the account.\n\n        Parameters:\n            data: Response data from the server\n            request: Original request object\n        \"\"\"\n        for asset in data[\"assets\"]:\n            account: AccountData = AccountData(\n                accountid=asset[\"asset\"],\n                balance=float(asset[\"walletBalance\"]),\n                frozen=float(asset[\"maintMargin\"]),\n                gateway_name=self.gateway_name\n            )\n\n            self.gateway.on_account(account)\n\n        self.gateway.write_log(\"Account data received\")\n\n    def on_query_position(self, data: list, request: Request) -\u003e None:\n        \"\"\"\n        Callback of holding positions query.\n\n        This function processes the position data response and\n        creates PositionData objects for each position held.\n\n        Parameters:\n            data: Response data from the server\n            request: Original request object\n        \"\"\"\n        for d in data:\n            name: str = d[\"symbol\"]\n            contract: ContractData | None = self.gateway.get_contract_by_name(name)\n            if not contract:\n                continue\n\n            position: PositionData = PositionData(\n                symbol=contract.symbol,\n                exchange=Exchange.GLOBAL,\n                direction=Direction.NET,\n                volume=float(d[\"positionAmt\"]),\n                price=float(d[\"entryPrice\"]),\n                pnl=float(d[\"unRealizedProfit\"]),\n                gateway_name=self.gateway_name,\n            )\n\n            self.gateway.on_position(position)\n\n        self.gateway.write_log(\"Position data received\")\n\n    def on_query_order(self, data: list, request: Request) -\u003e None:\n        \"\"\"\n        Callback of open orders query.\n\n        This function processes the open orders response and\n        creates OrderData objects for each active order.\n\n        Parameters:\n            data: Response data from the server\n            request: Original request object\n        \"\"\"\n        for d in data:\n            key: tuple[str, str] = (d[\"type\"], d[\"timeInForce\"])\n            order_type: OrderType | None = ORDERTYPE_BINANCE2VT.get(key, None)\n            if not order_type:\n                continue\n\n            contract: ContractData | None = self.gateway.get_contract_by_symbol(d[\"symbol\"])\n            if not contract:\n                continue\n\n            order: OrderData = OrderData(\n                orderid=d[\"clientOrderId\"],\n                symbol=contract.symbol,\n                exchange=Exchange.GLOBAL,\n                price=float(d[\"price\"]),\n                volume=float(d[\"origQty\"]),\n                type=order_type,\n                direction=DIRECTION_BINANCE2VT[d[\"side\"]],\n                traded=float(d[\"executedQty\"]),\n                status=STATUS_BINANCE2VT.get(d[\"status\"], None),\n                datetime=generate_datetime(d[\"time\"]),\n                gateway_name=self.gateway_name,\n            )\n            self.gateway.on_order(order)\n\n        self.gateway.write_log(\"Order data received\")\n\n    def on_query_contract(self, data: dict, request: Request) -\u003e None:\n        \"\"\"\n        Callback of available contracts query.\n\n        This function processes the exchange info response and\n        creates ContractData objects for each trading instrument.\n        It handles different contract types and extracts trading rules\n        like price tick, minimum/maximum volumes from filters.\n\n        Parameters:\n            data: Response data from the server\n            request: Original request object\n        \"\"\"\n        for d in data[\"symbols\"]:\n            pricetick: float = 1\n            min_volume: float = 1\n            max_volume: float = 1\n\n            for f in d[\"filters\"]:\n                if f[\"filterType\"] == \"PRICE_FILTER\":\n                    pricetick = float(f[\"tickSize\"])\n                elif f[\"filterType\"] == \"LOT_SIZE\":\n                    min_volume = float(f[\"minQty\"])\n                    max_volume = float(f[\"maxQty\"])\n\n            product: Product = PRODUCT_BINANCE2VT.get(d[\"contractType\"], Product.SWAP)\n            if product == Product.SWAP:\n                symbol: str = d[\"symbol\"] + \"_SWAP_BINANCE\"\n            else:\n                symbol = d[\"symbol\"] + \"_BINANCE\"\n\n            contract: ContractData = ContractData(\n                symbol=symbol,\n                exchange=Exchange.GLOBAL,\n                name=d[\"symbol\"],\n                pricetick=pricetick,\n                size=1,\n                min_volume=min_volume,\n                max_volume=max_volume,\n                product=PRODUCT_BINANCE2VT.get(d[\"contractType\"], Product.SWAP),\n                net_position=True,\n                history_data=True,\n                gateway_name=self.gateway_name,\n                stop_supported=True\n            )\n            self.gateway.on_contract(contract)\n\n        self.gateway.write_log(\"Contract data received\")\n\n        # Query private data after time offset is calculated\n        if self.key and self.secret:\n            self.query_order()\n            self.query_account()\n            self.query_position()\n            self.start_user_stream()\n\n    def on_start_user_stream(self, data: dict, request: Request) -\u003e None:\n        \"\"\"\n        Successful callback of start_user_stream.\n\n        This function processes the listen key response and initializes\n        the user data websocket connection with the provided key.\n\n        Parameters:\n            data: Response data from the server containing the listen key\n            request: Original request object\n        \"\"\"\n        self.user_stream_key = data[\"listenKey\"]\n        self.keep_alive_count = 0\n\n        if self.server == \"REAL\":\n            url = REAL_USER_HOST + self.user_stream_key\n        else:\n            url = TESTNET_USER_HOST + self.user_stream_key\n\n        self.user_api.connect(url, self.proxy_host, self.proxy_port)\n\n    def on_keep_user_stream(self, data: dict, request: Request) -\u003e None:\n        \"\"\"\n        Successful callback of keep_user_stream.\n\n        This function handles the successful response of the listen key\n        refresh request. No action is needed on success.\n\n        Parameters:\n            data: Response data from the server\n            request: Original request object\n        \"\"\"\n        pass\n\n    def on_keep_user_stream_error(self, exception_type: type, exception_value: Exception, tb: Any, request: Request) -\u003e None:\n        \"\"\"\n        Error callback of keep_user_stream.\n\n        This function handles errors from the listen key refresh request.\n        Timeout exceptions are ignored as they are common and non-critical.\n\n        Parameters:\n            exception_type: Type of the exception\n            exception_value: Exception instance\n            tb: Traceback object\n            request: Original request object\n        \"\"\"\n        if not issubclass(exception_type, TimeoutError):        # Ignore timeout exception\n            self.on_error(exception_type, exception_value, tb, request)\n\n    def query_history(self, req: HistoryRequest) -\u003e list[BarData]:\n        \"\"\"Query kline history data\"\"\"\n        # Check if the contract exists\n        contra... [truncated]"

                  "text": "Showing lines 1-150 of 1219 total lines.\n\n---\n\n\"\"\"\nIB Symbol Rules\n\nSPY-USD-STK   SMART\nEUR-USD-CASH  IDEALPRO\nXAUUSD-USD-CMDTY  SMART\nES-202002-USD-FUT  GLOBEX\nSI-202006-1000-USD-FUT  NYMEX\nES-2020006-C-2430-50-USD-FOP  GLOBEX\n\nConId is also supported for symbol.\n\"\"\"\n\n\nfrom copy import copy\nfrom datetime import datetime, timedelta\nfrom threading import Thread, Condition, Lock\nfrom decimal import Decimal\nimport shelve\nfrom tzlocal import get_localzone_name\n\nfrom vnpy.event import EventEngine\nfrom ibapi.client import EClient\nfrom ibapi.common import OrderId, TickAttrib, TickerId\nfrom ibapi.contract import Contract, ContractDetails\nfrom ibapi.execution import Execution\nfrom ibapi.order import Order\nfrom ibapi.order_state import OrderState\nfrom ibapi.ticktype import TickType, TickTypeEnum\nfrom ibapi.wrapper import EWrapper\nfrom ibapi.common import BarData as IbBarData\nfrom ibapi.order_cancel import OrderCancel\n\nfrom vnpy.trader.gateway import BaseGateway\nfrom vnpy.trader.object import (\n    TickData,\n    OrderData,\n    TradeData,\n    PositionData,\n    AccountData,\n    ContractData,\n    BarData,\n    OrderRequest,\n    CancelRequest,\n    SubscribeRequest,\n    HistoryRequest\n)\nfrom vnpy.trader.constant import (\n    Product,\n    OrderType,\n    Direction,\n    Exchange,\n    Currency,\n    Status,\n    OptionType,\n    Interval\n)\nfrom vnpy.trader.utility import get_file_path, ZoneInfo\nfrom vnpy.trader.event import EVENT_TIMER\nfrom vnpy.event import Event\n\n# 委托状态映射\nSTATUS_IB2VT: dict[str, Status] = {\n    \"ApiPending\": Status.SUBMITTING,\n    \"PendingSubmit\": Status.SUBMITTING,\n    \"PreSubmitted\": Status.NOTTRADED,\n    \"Submitted\": Status.NOTTRADED,\n    \"ApiCancelled\": Status.CANCELLED,\n    \"Cancelled\": Status.CANCELLED,\n    \"Filled\": Status.ALLTRADED,\n    \"Inactive\": Status.REJECTED,\n}\n\n# 多空方向映射\nDIRECTION_VT2IB: dict[Direction, str] = {Direction.LONG: \"BUY lf.api.close()\n\n    def subscribe(self, req: SubscribeRequest) -\u003e None:\n        \"\"\"订阅行情\"\"\"\n        self.api.subscribe(req)\n\n    def send_order(self, req: OrderRequest) -\u003e str:\n        \"\"\"委托下单\"\"\"\n        return self.api.send_order(req)\n\n    def cancel_order(self, req: CancelRequest) -\u003e None:\n        \"\"\"委托撤单\"\"\"\n        self.api.cancel_order(req)\n\n    def query_account(self) -\u003e None:\n        \"\"\"查询资金\"\"\"\n        pass\n\n    def query_position(self) -\u003e None:\n        \"\"\"查询持仓\"\"\"\n        pass\n\n    def query_history(self, req: HistoryRequest) -\u003e list[BarData]:\n        \"\"\"查询历史数据\"\"\"\n        return self.api.query_history(req)\n\n    def process_timer_event(self, event: Event) -\u003e None:\n        \"\"\"定时事件处理\"\"\"\n        self.count += 1\n        if self.count \u003c 10:\n            return\n        self.count = 0\n\n        self.api.check_connection()\n\n\nclass IbApi(EWrapper):\n    \"\"\"IB的API接口\"\"\"\n\n    data_filename: str = \"ib_contract_data.db\"\n    data_filepath: str = str(get_file_path(data_filename))\n\n    def __init__(self, gateway: IbGateway) -\u003e None:\n        \"\"\"构造函数\"\"\"\n        super().__init__()\n\n        self.gateway: IbGateway = gateway\n        self.gateway_name: str = gateway.gateway_name\n\n        self.status: bool = False\n\n        self.reqid: int = 0\n        self.orderid: int = 0\n        self.clientid: int = 0\n        self.history_reqid: int = 0\n        self.account: str = \"\"\n\n        self.ticks: dict[int, TickData] = {}\n        self.orders: dict[str, OrderData] = {}\n        self.accounts: dict[str, AccountData] = {}\n        self.contracts: dict[str, ContractData] = {}\n\n        self.subscribed: dict[str, SubscribeRequest] = {}\n        self.data_ready: bool = False\n\n        self.history_req: HistoryRequest | None = None\n        self.history_condition: Condition = Condition()\n        self.history_buf: list[BarData] = []\n        self.history_lock: Lock = Lock()\n\n        self.reqid_symbol_map: dict[int, str] = {}              # reqid: subscribe tick symbol\n        self.reqid_underlying_map: dict[int, Contract] = {}     # reqid: query option underlying\n\n        self.client: EClient = EClient(self)\n\n        self.ib_contracts: dict[str, Contract] = {}\n\n    def connectAck(self) -\u003e None:\n        \"\"\"连接成功回报\"\"\"\n        self.status = True\n        self.gateway.write_log(\"IB TWS连接成功\")\n\n        self.load_contract_data()\n\n        self.data_ready = False\n\n    def connectionClosed(self) -\u003e None:\n        \"\"\"连接断开回报\"\"\"\n        self.status = False\n        self.gateway.write_log(\"IB TWS连接断开\")\n\n    def nextValidId(self, orderId: int) -\u003e None:\n        \"\"\"下一个有效订单号回报\"\"\"\n        super().nextValidId(orderId)\n\n        if not self.orderid:\n            self.orderid = orderId\n\n    def currentTime(self, time: int) -\u003e None:\n        \"\"\"IB当前服务器时间回报\"\"\"\n        super().currentTime(time)\n\n        dt: datetime = datetime.fromtimestamp(time)\n        time_string: str = dt.strftime(\"%Y-%m-%d %H:%M:%S.%f\")\n\n        msg: str = f\"服务器时间: {time_string}\"\n        self.gateway.write_log(msg)\n\n    def error(\n        self,\n        reqId: TickerId,\n        errorTime: int,\n        errorCode: int,\n        errorString: str,\n        advancedOrderRejectJson: str = \"\"\n    ) -\u003e None:\n        \"\"\"具体错误请求回报\"\"\"\n        super().error(reqId, errorTime, errorCode, errorString)\n\n        # 2000-2999信息通知不属于报错信息\n        if reqId == self.history_reqid and errorCode not in range(2000, 3000):\n            self.history_condition.acquire()\n            self.history_condition.notify()\n            self.history_condition.release()"

                  "text": "# Binance trading gateway for VeighNa\n\n\u003cp align=\"center\"\u003e\n  \u003cimg src =\"https://github.com/veighna-global/vnpy_evo/blob/dev/logo.png\" width=\"300\" height=\"300\"/\u003e\n\u003c/p\u003e\n\n\u003cp align=\"center\"\u003e\n    \u003cimg src =\"https://img.shields.io/badge/version-2025.1.25-blueviolet.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/badge/platform-windows|linux|macos-yellow.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/badge/python-3.10|3.11|3.12-blue.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/github/license/veighna-global/vnpy_binance.svg?color=orange\"/\u003e\n\u003c/p\u003e\n\n\n## Introduction\n\nThis gateway is developed based on Binance's REST and Websocket API, and supports spot, linear contract and inverse contract trading.\n\n**For derivatives contract trading, please notice:**\n\n1. Only supports cross margin mode.\n2. Only supports one-way position mode.\n\n## Install\n\nUsers can easily install ``vnpy_binance`` by pip according to the following command.\n\n```\npip install vnpy_binance\n```\n\nAlso, users can install ``vnpy_binance`` using the source code. Clone the repository and install as follows:\n\n```\ngit clone https://github.com/veighna-global/vnpy_binance.git \u0026\u0026 cd vnpy_binance\n\npython setup.py install\n```\n\n## A Simple Example\n\nSave this as run.py.\n\n```\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\nfrom vnpy_binance import (\n    BinanceLinearGateway,\n)\n\n\ndef main() -\u003e None:\n    \"\"\"main entry\"\"\"\n    qapp = create_qapp()\n\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    main_engine.add_gateway(BinanceLinearGateway)\n\n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n\n    qapp.exec()\n\n\nif __name__ == \"__main__\":\n    main()\n```\n"

                  "text": "# VeighNa框架的InteractiveBrokers交易接口\n\n\u003cp align=\"center\"\u003e\n  \u003cimg src =\"https://vnpy.oss-cn-shanghai.aliyuncs.com/vnpy-logo.png\"/\u003e\n\u003c/p\u003e\n\n\u003cp align=\"center\"\u003e\n    \u003cimg src =\"https://img.shields.io/badge/version-10.40.1.2-blueviolet.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/badge/platform-windows|linux|macos-yellow.svg\"/\u003e\n    \u003cimg src =\"https://img.shields.io/badge/python-3.10|3.11|3.12|3.13-blue.svg\" /\u003e\n    \u003cimg src =\"https://img.shields.io/github/license/vnpy/vnpy.svg?color=orange\"/\u003e\n\u003c/p\u003e\n\n## 说明\n\n基于ibapi的10.40.1版本开发的InteractiveBrokers交易接口。\n\nIbGateway中的合约代码支持两种风格：数字代码和字符串代码。\n\n数字代码基于IB平台的ConId，查询方式：在TWS软件中【右键点击任意合约】-\u003e【金融产品信息】-\u003e【详情】，然后在弹出的网页上即可找到合约的ConId。\n\n字符串代码基于合约的具体描述信息，命名规则和举例：\n\n|合约类型|代码规则|代码（symbol）|交易所（exchange）|\n|---|---|---|---|\n|股票|名称-货币-类别|SPY-USD-STK|SMART|\n|外汇|名称-货币-类别|EUR-USD-CASH|IDEALPRO|\n|贵金属|名称-货币-类别|XAUUSD-USD-CMDTY|SMART|\n|期货|名称-到期年月-货币-类别|ES-202002-USD-FUT|GLOBEX|\n|期货（指定乘数）|名称-到期年月-合约乘数-类别|SI-202006-1000-USD-FUT|NYMEX|\n|期货期权|名称-到期年月-期权类型-行权价-合约乘数-货币-类别|ES-2020006-C-2430-50-USD-FOP|GLOBEX|\n\n委托、成交、持仓信息中的合约代码，默认采用数字代码。如果用户使用字符串代码订阅过行情，则使用字符串代码。\n\n## 安装\n\n安装环境推荐基于4.0.0版本以上的【[**VeighNa Studio**](https://www.vnpy.com)】。\n\n### 安装ibapi\n\n在[IB官网](https://interactivebrokers.github.io/#)下载TWS API的msi安装文件，并运行安装。\n\n找到安装目录下的source\\pythonclient文件夹，在cmd中运行下述命令安装：\n\n```\npython setup.py install\n```\n\n### 安装vnpy_ib\n\n直接使用pip命令：\n\n```\npip install vnpy_ib\n```\n\n或者下载源代码后，解压后在cmd中运行：\n\n```\npip install .\n```\n\n## 使用\n\n以脚本方式启动（script/run.py）：\n\n```\nfrom vnpy.event import EventEngine\nfrom vnpy.trader.engine import MainEngine\nfrom vnpy.trader.ui import MainWindow, create_qapp\n\nfrom vnpy_ib import IbGateway\n\n\ndef main():\n    \"\"\"主入口函数\"\"\"\n    qapp = create_qapp()\n\n    event_engine = EventEngine()\n    main_engine = MainEngine(event_engine)\n    main_engine.add_gateway(IbGateway)\n\n    main_window = MainWindow(main_engine, event_engine)\n    main_window.showMaximized()\n\n    qapp.exec()\n\n\nif __name__ == \"__main__\":\n    main()\n```\n"

              "content": "# VeighNa Gateway Architecture Analysis\n\nThis document analyzes the architecture of VeighNa gateway extensions using **Binance** and **Interactive Brokers (IB)** gateways as examples.\n\n---\n\n## Repository Structure\n\nBoth gateways follow the same standard structure:\n\n```\nvnpy_\u003cname\u003e/\n├── vnpy_\u003cname\u003e/\n│   ├── __init__.py          # Package exports\n│   └── \u003cname\u003e_gateway.py    # Main gateway implementation\n├── script/                   # Example startup scripts\n├── pyproject.toml           # Package configuration\n├── README.md                # Documentation\n└── LICENSE                  # MIT License\n```\n\n---\n\n## Core Architecture Pattern\n\nAll gateways inherit from `BaseGateway` and follow this pattern:\n\n```\n┌─────────────────────────────────────────────────────┐\n│                   BaseGateway                        │\n│  (vnpy.trader.gateway - defines interface contract) │\n└─────────────────────────────────────────────────────┘\n                          ↑\n        ┌─────────────────┴─────────────────┐\n        │                                   │\n┌───────────────────┐              ┌───────────────────┐\n│ BinanceLinearGateway │              │     IbGateway      │\n│  (vnpy_binance)    │              │    (vnpy_ib)      │\n└───────────────────┘              └───────────────────┘\n```\n\n---\n\n## Gateway Components\n\n### 1. Main Gateway Class\n\n**Purpose:** Acts as the bridge between external API and VeighNa framework\n\n**Common Interface (required methods):**\n\n| Method | Purpose |\n|--------|---------|\n| `connect(setting)` | Establish connection with credentials |\n| `subscribe(req)` | Subscribe to market data |\n| `send_order(req)` | Send new order |\n| `cancel_order(req)` | Cancel existing order |\n| `query_account()` | Query account balance |\n| `query_position()` | Query positions |\n| `query_history(req)` | Query historical data |\n| `close()` | Close connection |\n\n**Binance Example:**\n```python\nclass BinanceLinearGateway(BaseGateway):\n    default_name: str = \"BINANCE_LINEAR\"\n    \n    default_setting: dict = {\n        \"API Key\": \"\",\n        \"API Secret\": \"\",\n        \"Server\": [\"REAL\", \"TESTNET\"],\n        \"Proxy Host\": \"\",\n        \"Proxy Port\": 0\n    }\n    \n    def __init__(self, event_engine: EventEngine, gateway_name: str):\n        super().__init__(event_engine, gateway_name)\n        \n        # Compose multiple API clients\n        self.trade_api = TradeApi(self)      # Order execution\n        self.user_api = UserApi(self)        # User data stream\n        self.md_api = MdApi(self)            # Market data\n        self.rest_api = RestApi(self)        # REST queries\n        \n        self.orders = {}\n        self.symbol_contract_map = {}\n```\n\n**IB Example:**\n```python\nclass IbGateway(BaseGateway):\n    default_name: str = \"IB\"\n    \n    default_setting: dict = {\n        \"TWS Address\": \"127.0.0.1\",\n        \"TWS Port\": 7497,\n        \"Client ID\": 1,\n        \"Trading Account\": \"\"\n    }\n    \n    def __init__(self, event_engine: EventEngine, gateway_name: str):\n        super().__init__(event_engine, gateway_name)\n        \n        # Single API wrapper (IB provides unified SDK)\n        self.api = IbApi(self)\n```\n\n---\n\n### 2. API Client Layers\n\nGateways decompose into multiple API clients based on functionality:\n\n#### Binance Architecture (4 components)\n\n```\n┌──────────────────────────────────────────────────────────┐\n│               BinanceLinearGateway                        │\n├──────────────────────────────────────────────────────────┤\n│  RestApi    │  TradeApi    │  UserApi    │  MdApi        │\n│  (REST)     │  (Websocket) │  (Websocket)│  (Websocket)  │\n│  - Query    │  - Orders    │  - Account  │  - Ticks      │\n│  - History  │  - Cancel    │  - Position │  - K-lines    │\n└──────────────────────────────────────────────────────────┘\n```\n\n| Component | Base Class | Purpose |\n|-----------|-----------|---------|\n| `RestApi` | `RestClient` | HTTP requests (queries, signed requests) |\n| `TradeApi` | `WebsocketClient` | Order execution via websocket |\n| `UserApi` | `WebsocketClient` | Account/position updates via websocket |\n| `MdApi` | `WebsocketClient` | Market data streaming |\n\n**Key Implementation - RestApi:**\n```python\nclass RestApi(RestClient):\n    def sign(self, request: Request) -\u003e Request:\n        \"\"\"Sign REST requests with HMAC-SHA256\"\"\"\n        timestamp = int(time.time() * 1000)\n        query = urllib.parse.urlencode(sorted(request.params.items()))\n        signature = hmac.new(\n            self.secret,\n            query.encode(\"utf-8\"),\n            hashlib.sha256\n        ).hexdigest()\n        \n        request.headers = {\"X-MBX-APIKEY\": self.key}\n        return request\n```\n\n#### IB Architecture (1 unified component)\n\n```\n┌──────────────────────────────────────────────────────────┐\n│                   IbGateway                               │\n├──────────────────────────────────────────────────────────┤\n│                    IbApi                                  │\n│         (wraps ibapi.EClient + ibapi.EWrapper)           │\n│  - Market Data  - Orders  - Accounts  - History          │\n└──────────────────────────────────────────────────────────┘\n```\n\n**Key Implementation - IbApi:**\n```python\nclass IbApi(EWrapper):\n    \"\"\"Wraps IB's EClient and EWrapper\"\"\"\n    \n    def __init__(self, gateway: IbGateway):\n        super().__init__()\n        self.client = EClient(self)  # IB's REST-like client\n        \n    def connect(self, host: str, port: int, clientid: int, account: str):\n        \"\"\"Connect to TWS/Gateway\"\"\"\n        self.client.eConnect(host, port, clientid)\n```\n\n---\n\n### 3. Data Mapping Tables\n\nBoth gateways define constant mappings for data conversion:\n\n**Binance:**\n```python\nSTATUS_BINANCE2VT = {\n    \"NEW\": Status.NOTTRADED,\n    \"PARTIALLY_FILLED\": Status.PARTTRADED,\n    \"FILLED\": Status.ALLTRADED,\n    \"CANCELED\": Status.CANCELLED,\n}\n\nDIRECTION_VT2BINANCE = {\n    Direction.LONG: \"BUY\",\n    Direction.SHORT: \"SELL\"\n}\n\nORDERTYPE_VT2BINANCE = {\n    OrderType.LIMIT: (\"LIMIT\", \"GTC\"),\n    OrderType.MARKET: (\"MARKET\", \"GTC\"),\n}\n```\n\n**IB:**\n```python\nSTATUS_IB2VT = {\n    \"ApiPending\": Status.SUBMITTING,\n    \"Submitted\": Status.NOTTRADED,\n    \"Filled\": Status.ALLTRADED,\n    \"Cancelled\": Status.CANCELLED,\n}\n\nPRODUCT_IB2VT = {\n    \"STK\": Product.EQUITY,\n    \"CASH\": Product.FOREX,\n    \"FUT\": Product.FUTURES,\n    \"OPT\": Product.OPTION,\n}\n```\n\n---\n\n### 4. Data Object Conversion\n\n**Binance - Tick Data:**\n```python\ndef on_tick_message(self, data: dict):\n    tick = TickData(\n        symbol=contract.symbol,\n        exchange=Exchange.GLOBAL,\n        datetime=datetime.now(UTC_TZ),\n        name=contract.name,\n        last_price=float(data[\"p\"]),\n        volume=float(data[\"v\"]),\n        bid_price_1=float(data[\"b\"]),\n        ask_price_1=float(data[\"a\"]),\n        bid_volume_1=float(data[\"B\"]),\n        ask_volume_1=float(data[\"A\"]),\n        gateway_name=self.gateway_name\n    )\n    self.gateway.on_tick(tick)\n```\n\n**IB - Tick Data:**\n```python\ndef tickPrice(self, reqId: TickerId, tickType: TickType, price: float, attrib: TickAttrib):\n    tick = self.ticks.get(reqId)\n    if not tick:\n        return\n    \n    field = TICKFIELD_IB2VT.get(tickType)\n    if field:\n        setattr(tick, field, price)\n    \n    self.gateway.on_tick(copy(tick))\n```\n\n---\n\n### 5. Event Engine Integration\n\nGateways push data to VeighNa via event engine:\n\n```python\n# In BaseGateway (parent class)\ndef on_tick(self, tick: TickData):\n    \"\"\"Push tick data to event engine\"\"\"\n    event = Event(EVENT_TICK, tick)\n    self.event_engine.put(event)\n\ndef on_order(self, order: OrderData):\n    \"\"\"Push order update to event engine\"\"\"\n    event = Event(EVENT_ORDER, order)\n    self.event_engine.put(event)\n\ndef on_trade(self, trade: TradeData):\n    \"\"\"Push trade data to event engine\"\"\"\n    event = Event(EVENT_TRADE, trade)\n    self.event_engine.put(event)\n```\n\n---\n\n## Key Differences\n\n| Aspect | Binance Gateway | IB Gateway |\n|--------|----------------|------------|\n| **API Type** | REST + Websocket | TWS SDK (EClient/EWrapper) |\n| **Authentication** | HMAC-SHA256 signature | TWS/Gateway login |\n| **Connection** | Multiple websocket streams | Single TCP connection |\n| **Contract Format** | Simple symbol (BTCUSDT) | Complex string format or ConId |\n| **Asset Classes** | Crypto (spot, futures) | Stocks, Forex, Futures, Options |\n| **Complexity** | ~1,650 lines | ~1,220 lines |\n\n---\n\n## Common Patterns\n\n### 1. Request-Response Pattern (REST)\n```python\ndef query_account(self):\n    path = \"/fapi/v3/account\"\n    self.add_request(\n        method=\"GET\",\n        path=path,\n        callback=self.on_query_account\n    )\n\ndef on_query_account(self, data: dict, request: Request):\n    # Process response\n    account = AccountData(...)\n    self.gateway.on_account(account)\n```\n\n### 2. Subscription Pattern (Websocket)\n```python\ndef subscribe(self, req: SubscribeRequest):\n    self.subscribed[req.vt_symbol] = req\n    \n    # Send subscription message\n    params = {\"method\": \"SUBSCRIBE\", \"params\": [\"btcusdt@trade\"]}\n    self.send_packet(params)\n```\n\n### 3. Order Management Pattern\n```python\ndef send_order(self, req: OrderRequest):\n    # Generate unique order ID\n    orderid = f\"{self.order_prefix}_{self.orderid}\"\n    self.orderid += 1\n    \n    # Send to exchange\n    self._send_order(req, orderid)\n    \n    return orderid  # Return to caller\n```\n\n---\n\n## Extension Development Checklist\n\nTo create a new gateway:\n\n1. **Inherit BaseGateway**\n   - Implement all required methods\n   - Define `default_name` and `default_setting`\n\n2. **Create API Clients**\n   - REST client for queries (if needed)\n   - Websocket/TCP client for real-time data\n   - Handle authentication\n\n3. **Define Mappings**\n   - Status, Direction, OrderType, Product, Exchange\n\n4. **Implement Data Conversion**\n   - TickData, BarData, OrderData, TradeData, PositionData, AccountData, ContractData\n\n5. **Event Publishing**\n   - Use `self.gateway.on_tick()`, `on_order()`, etc.\n\n6. **Error Handling**\n   - Connection errors\n   - API errors\n   - Reconnection logic\n\n---\n\n## Files to Study\n\nFor deep understanding, read in this order:\n\n### Binance Gateway\n1. `vnpy_binance/__init__.py` - Package exports\n2. `vnpy_binance/linear_gateway.py` - Lines 1-300 (BinanceLinearGateway class)\n3. `vnpy_binance/linear_gateway.py` - Lines 300-600 (RestApi class)\n4. `vnpy_binance/linear_gateway.py` - Lines 600+ (Websocket APIs)\n\n### IB Gateway\n1. `vnpy_ib/__init__.py` - Package exports\n2. `vnpy_ib/ib_gateway.py` - Lines 1-250 (IbGateway + IbApi init)\n3. `vnpy_ib/ib_gateway.py` - Lines 250-600 (Market data callbacks)\n4. `vnpy_ib/ib_gateway.py` - Lines 600+ (Order/account callbacks)\n\n---\n\n## Resources\n\n- **BaseGateway:** `/Users/apurv/Desktop/algo-trading/vnpy/vnpy/trader/gateway.py`\n- **Data Objects:** `/Users/apurv/Desktop/algo-trading/vnpy/vnpy/trader/object.py`\n- **Event Engine:** `/Users/apurv/Desktop/algo-trading/vnpy/vnpy/event/engine.py`\n- **REST Client:** `/Users/apurv/Desktop/algo-trading/vnpy/vnpy_rest/`\n- **Websocket Client:** `/Users/apurv/Desktop/algo-trading/vnpy/vnpy_websocket/`\n",
