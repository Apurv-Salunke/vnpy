            "title": "WriteFile: Writing to STRATEGY_ENGINES.md",
            "status": "completed",
            "rawInput": {
              "content": "# VeighNa Strategy Engines Overview\n\nVeighNa provides **5 different strategy engines**, each designed for specific trading scenarios and use cases.\n\n---\n\n## 1. CTA Strategy Engine (`vnpy_ctastrategy`)\n\n**Purpose:** Single-contract trend-following and mean-reversion strategies\n\n**Version:** 1.4.1\n\n**Key Features:**\n- Single asset trading (futures, crypto perpetuals)\n- Bar-based (K-line) strategy execution\n- Built-in backtesting engine\n- Stop order support (for reducing slippage)\n- Real-time strategy monitoring and control\n\n**Core Components:**\n```\nvnpy_ctastrategy/\n├── template.py         # CtaTemplate, CtaSignal, TargetPosTemplate\n├── engine.py           # CtaEngine (strategy management)\n├── backtesting.py      # BacktestingEngine\n├── base.py             # APP_NAME, StopOrder\n└── strategies/         # Built-in strategy examples\n```\n\n**Built-in Strategies (9):**\n| Strategy | Description |\n|----------|-------------|\n| `AtrRsiStrategy` | ATR + RSI combined signal strategy |\n| `BollChannelStrategy` | Bollinger Bands channel breakout |\n| `DoubleMaStrategy` | Dual moving average crossover |\n| `DualThrustStrategy` | Dual Thrust range breakout |\n| `KingKeltnerStrategy` | Keltner Channel trend following |\n| `MultiSignalStrategy` | Multiple signal combination |\n| `MultiTimeframeStrategy` | Multi-timeframe analysis |\n| `TurtleSignalStrategy` | Turtle Trading rules |\n| `TestStrategy` | Template for testing |\n\n**Strategy Template API:**\n```python\nclass CtaTemplate:\n    # Callbacks\n    def on_init(self): pass         # Strategy initialization\n    def on_start(self): pass        # Strategy start\n    def on_stop(self): pass         # Strategy stop\n    def on_tick(self, tick: TickData): pass    # Tick update\n    def on_bar(self, bar: BarData): pass       # Bar update (main entry point)\n    def on_trade(self, trade: TradeData): pass # Trade fill\n    def on_order(self, order: OrderData): pass # Order update\n    def on_stop_order(self, stop_order: StopOrder): pass\n    \n    # Action methods\n    def buy(self, price, volume, stop=False): pass    # Open long\n    def sell(self, price, volume, stop=False): pass   # Close long\n    def short(self, price, volume, stop=False): pass  # Open short\n    def cover(self, price, volume, stop=False): pass  # Close short\n    def cancel_order(self, orderid): pass\n    def cancel_all(self): pass\n```\n\n**Use Cases:**\n- Trend following on single futures contract\n- Mean reversion on crypto perpetuals\n- Any single-asset directional strategy\n\n---\n\n## 2. Spread Trading Engine (`vnpy_spreadtrading`)\n\n**Purpose:** Multi-leg spread arbitrage and pairs trading\n\n**Version:** 1.3.1\n\n**Key Features:**\n- Custom spread definition (multiple legs)\n- Real-time spread pricing calculation\n- Spread chart visualization\n- Algorithmic spread trading\n- Statistical arbitrage support\n\n**Core Components:**\n```\nvnpy_spreadtrading/\n├── template.py         # SpreadStrategyTemplate, SpreadAlgoTemplate\n├── engine.py           # SpreadEngine\n├── backtesting.py      # Spread backtesting\n├── algo.py             # Spread execution algorithms\n├── base.py             # SpreadData, LegData\n└── strategies/         # Built-in spread strategies\n```\n\n**Built-in Strategies (2):**\n| Strategy | Description |\n|----------|-------------|\n| `BasicSpreadStrategy` | Manual spread trading with limits |\n| `StatisticalArbitrageStrategy` | Stat arb based on spread mean reversion |\n\n**Key Concepts:**\n- **Leg:** Individual contract (e.g., RB2401, RB2405)\n- **Spread:** Combination of legs (e.g., Long RB2401 - Short RB2405)\n- **Spread Price:** Calculated from leg prices using formula\n- **Net Position:** Spread position = leg positions combined\n\n**Strategy Template API:**\n```python\nclass SpreadStrategyTemplate:\n    # Callbacks\n    def on_init(self): pass\n    def on_start(self): pass\n    def on_stop(self): pass\n    def on_tick(self, tick: TickData): pass    # Leg tick update\n    def on_bar(self, bar: BarData): pass       # Spread bar update\n    def on_trade(self, trade: TradeData): pass\n    \n    # Action methods\n    def buy_spread(self, price, volume): pass   # Long spread\n    def sell_spread(self, price, volume): pass  # Short spread\n    def set_spread_price(self, price): pass     # Update reference price\n```\n\n**Use Cases:**\n- Calendar spread arbitrage (same commodity, different months)\n- Cross-commodity spread (e.g., Rebar vs Hot Rolled Coil)\n- Pairs trading (statistically correlated assets)\n\n---\n\n## 3. Portfolio Strategy Engine (`vnpy_portfoliostrategy`)\n\n**Purpose:** Multi-asset portfolio strategies (Alpha, options arbitrage)\n\n**Version:** 1.2.2\n\n**Key Features:**\n- Trade multiple contracts simultaneously\n- Portfolio-level backtesting\n- Support for Alpha strategies (long-short equity)\n- Options arbitrage strategies\n- Daily PnL calculation\n\n**Core Components:**\n```\nvnpy_portfoliostrategy/\n├── template.py         # StrategyTemplate\n├── engine.py           # StrategyEngine (live + backtest)\n├── backtesting.py      # BacktestingEngine\n├── base.py             # APP_NAME, utility functions\n└── strategies/         # Built-in portfolio strategies\n```\n\n**Built-in Strategies (4):**\n| Strategy | Description |\n|----------|-------------|\n| `PairTradingStrategy` | Pairs trading with cointegration |\n| `PcpArbitrageStrategy` | Period conversion arbitrage |\n| `PortfolioBollChannelStrategy` | Multi-asset Bollinger strategy |\n| `TrendFollowingStrategy` | Multi-asset trend following |\n\n**Strategy Template API:**\n```python\nclass StrategyTemplate:\n    # Callbacks\n    def on_init(self): pass\n    def on_start(self): pass\n    def on_stop(self): pass\n    def on_tick(self, tick: TickData): pass    # Any leg tick\n    def on_bar(self, bar: BarData): pass       # Any leg bar\n    def on_trade(self, trade: TradeData): pass\n    def on_order(self, order: OrderData): pass\n    \n    # Action methods\n    def buy(self, vt_symbol, price, volume): pass\n    def sell(self, vt_symbol, price, volume): pass\n    def short(self, vt_symbol, price, volume): pass\n    def cover(self, vt_symbol, price, volume): pass\n```\n\n**Key Difference from CTA:**\n- CTA: Single contract, one `on_bar()` per contract\n- Portfolio: Multiple contracts, `on_bar()` for any contract in portfolio\n\n**Use Cases:**\n- Alpha strategies (long-short equity portfolio)\n- Options arbitrage (convertible bond arbitrage)\n- Multi-asset trend following\n- Statistical arbitrage across multiple assets\n\n---\n\n## 4. Algorithmic Trading Engine (`vnpy_algotrading`)\n\n**Purpose:** Smart order execution algorithms (reduce market impact)\n\n**Version:** 1.1.0\n\n**Key Features:**\n- Pre-built execution algorithms\n- Algorithm monitoring and control\n- Real-time algorithm status tracking\n- No backtesting (execution-focused)\n\n**Core Components:**\n```\nvnpy_algotrading/\n├── template.py         # AlgoTemplate\n├── engine.py           # AlgoEngine\n├── base.py             # AlgoOrder, APP_NAME\n└── algos/              # Built-in algorithms\n```\n\n**Built-in Algorithms (5):**\n| Algorithm | Description |\n|-----------|-------------|\n| `TwapAlgo` | Time-Weighted Average Price - slice order over time |\n| `IcebergAlgo` | Iceberg order - hide true order size |\n| `SniperAlgo` | Sniper - execute when price condition met |\n| `BestLimitAlgo` | Best Limit - queue at best bid/ask |\n| `StopAlgo` | Stop loss - trigger order when price breached |\n\n**Algorithm Template API:**\n```python\nclass AlgoTemplate:\n    # Parameters\n    vt_symbol: str      # Trading symbol\n    direction: Direction  # LONG or SHORT\n    offset: Offset      # OPEN or CLOSE\n    volume: float       # Total volume to execute\n    price: float        # Price limit (if applicable)\n    \n    # Callbacks\n    def on_tick(self, tick: TickData): pass\n    def on_order(self, order: OrderData): pass\n    def on_trade(self, e\n    def on_stop_order(self, stop_order: StopOrder): pass\n    \n    # Action methods\n    def buy(self, price, volume, stop=False): pass    # Open long\n    def sell(self, price, volume, stop=False): pass   # Close long\n    def short(self, price, volume, stop=False): pass  # Open short\n    def cover(self, price, volume, stop=False): pass  # Close short\n    def cancel_order(self, orderid): pass\n    def cancel_all(self): pass\n```\n\n**Use Cases:**\n- Trend following on single futures contract\n- Mean reversion on crypto perpetuals\n- Any single-asset directional strategy\n\n---\n\n## 2. Spread Trading Engine (`vnpy_spreadtrading`)\n\n**Purpose:** Multi-leg spread arbitrage and pairs trading\n\n**Version:** 1.3.1\n\n**Key Features:**\n- Custom spread definition (multiple legs)\n- Real-time spread pricing calculation\n- Spread chart visualization\n- Algorithmic spread trading\n- Statistical arbitrage support\n\n**Core Components:**\n```\nvnpy_spreadtrading/\n├── template.py         # SpreadStrategyTemplate, SpreadAlgoTemplate\n├── engine.py           # SpreadEngine\n├── backtesting.py      # Spread backtesting\n├── algo.py             # Spread execution algorithms\n├── base.py             # SpreadData, LegData\n└── strategies/         # Built-in spread strategies\n```\n\n**Built-in Strategies (2):**\n| Strategy | Description |\n|----------|-------------|\n| `BasicSpreadStrategy` | Manual spread trading with limits |\n| `StatisticalArbitrageStrategy` | Stat arb based on spread mean reversion |\n\n**Key Concepts:**\n- **Leg:** Individual contract (e.g., RB2401, RB2405)\n- **Spread:** Combination of legs (e.g., Long RB2401 - Short RB2405)\n- **Spread Price:** Calculated from leg prices using formula\n- **Net Position:** Spread position = leg positions combined\n\n**Strategy Template API:**\n```python\nclass SpreadStrategyTemplate:\n    # Callbacks\n    def on_init(self): pass\n    def on_start(self): pass\n    def on_stop(self): pass\n    def on_tick(self, tick: TickData): pass    # Leg tick update\n    def on_bar(self, bar: BarData): pass       # Spread bar update\n    def on_trade(self, trade: TradeData): pass\n    \n    # Action methods\n    def buy_spread(self, price, volume): pass   # Long spread\n    def sell_spread(self, price, volume): pass  # Short spread\n    def set_spread_price(self, price): pass     # Update reference price\n```\n\n**Use Cases:**\n- Calendar spread arbitrage (same commodity, different months)\n- Cross-commodity spread (e.g., Rebar vs Hot Rolled Coil)\n- Pairs trading (statistically correlated assets)\n\n---\n\n## 3. Portfolio Strategy Engine (`vnpy_portfoliostrategy`)\n\n**Purpose:** Multi-asset portfolio strategies (Alpha, options arbitrage)\n\n**Version:** 1.2.2\n\n**Key Features:**\n- Trade multiple contracts simultaneously\n- Portfolio-level backtesting\n- Support for Alpha strategies (long-short equity)\n- Options arbitrage strategies\n- Daily PnL calculation\n\n**Core Components:**\n```\nvnpy_portfoliostrategy/\n├── template.py         # StrategyTemplate\n├── engine.py           # StrategyEngine (live + backtest)\n├── backtesting.py      # BacktestingEngine\n├── base.py             # APP_NAME, utility functions\n└── strategies/         # Built-in portfolio strategies\n```\n\n**Built-in Strategies (4):**\n| Strategy | Description |\n|----------|-------------|\n| `PairTradingStrategy` | Pairs trading with cointegration |\n| `PcpArbitrageStrategy` | Period conversion arbitrage |\n| `PortfolioBollChannelStrategy` | Multi-asset Bollinger strategy |\n| `TrendFollowingStrategy` | Multi-asset trend following |\n\n**Strategy Template API:**\n```python\nclass StrategyTemplate:\n    # Callbacks\n    def on_init(self): pass\n    def on_start(self): pass\n    def on_stop(self): pass\n    def on_tick(self, tick: TickData): pass    # Any leg tick\n    def on_bar(self, bar: BarData): pass       # Any leg bar\n    def on_trade(self, trade: TradeData): pass\n    def on_order(self, order: OrderData): pass\n akout_strategy.py\nfrom vnpy_portfoliostrategy import StrategyTemplate\nfrom vnpy.trader.constant import Direction, Offset\nfrom vnpy.trader.object import TickData, BarData\nfrom vnpy.trader.utility import BarGenerator, ArrayManager\n\nclass Nifty500BreakoutStrategy(StrategyTemplate):\n    \"\"\"\n    Multiple timeframe breakout strategy on NIFTY500 stocks\n    - 15min timeframe for entry signal\n    - 1hr timeframe for trend filter\n    - 500 stocks universe\n    \"\"\"\n    \n    author = \"Your Name\"\n    \n    # Parameters\n    breakout_period = 20          # Donchian channel period\n    trend_ma_period = 50          # Trend filter MA\n    max_positions = 50            # Max concurrent positions\n    position_size_pct = 0.02      # 2% per position\n    \n    parameters = [\n        \"breakout_period\",\n        \"trend_ma_period\",\n        \"max_positions\",\n        \"position_size_pct\"\n    ]\n    \n    def __init__(self, cta_engine, strategy_name, vt_symbols, setting):\n        super().__init__(cta_engine, strategy_name, vt_symbols, setting)\n        \n        # Multiple timeframes\n        self.bg_15min = BarGenerator(self.on_bar, 15, self.on_15min_bar)\n        self.bg_1hr = BarGenerator(self.on_bar, 60, self.on_1hr_bar)\n        \n        # ArrayManager per stock\n        self.am_15min = {}  # 15min AM for each stock\n        self.am_1hr = {}    # 1hr AM for each stock\n        \n        # Signal tracking\n        self.breakout_signals = {}  # {vt_symbol: signal}\n        self.trend_direction = {}   # {vt_symbol: +1/-1/0}\n        \n    def on_init(self):\n        \"\"\"Initialize\"\"\"\n        self.write_log(\"Strategy initialized\")\n        self.load_bar(10)\n        \n        # Initialize ArrayManagers for all stocks\n        for vt_symbol in self.vt_symbols:\n            self.am_15min[vt_symbol] = ArrayManager(size=100)\n            self.am_1hr[vt_symbol] = ArrayManager(size=100)\n        \n    def on_start(self):\n        self.write_log(\"Strategy started\")\n        \n    def on_stop(self):\n        self.write_log(\"Strategy stopped\")\n        \n    def on_bar(self, bar: BarData):\n        \"\"\"Update all timeframe bars\"\"\"\n        self.bg_15min.update(bar)\n        self.bg_1hr.update(bar)\n        \n    def on_15min_bar(self, bar: BarData):\n        \"\"\"15min bar update - entry signal timeframe\"\"\"\n        vt_symbol = bar.vt_symbol\n        am = self.am_15min[vt_symbol]\n        am.update_bar(bar)\n        \n        if not am.inited:\n            return\n        \n        # Calculate breakout signal (Donchian channel)\n        upper = am.highest(self.breakout_period)\n        lower = am.lowest(self.breakout_period)\n        \n        if bar.close_price \u003e upper:\n            self.breakout_signals[vt_symbol] = 1  # Bullish breakout\n        elif bar.close_price \u003c lower:\n            self.breakout_signals[vt_symbol] = -1  # Bearish breakout\n        \n        self.put_event()\n        \n    def on_1hr_bar(self, bar: BarData):\n        \"\"\"1hr bar update - trend filter timeframe\"\"\"\n        vt_symbol = bar.vt_symbol\n        am = self.am_1hr[vt_symbol]\n        am.update_bar(bar)\n        \n        if not am.inited:\n            return\n        \n        # Calculate trend direction\n        ma = am.sma(self.trend_ma_period)\n        \n        if bar.close_price \u003e ma * 1.02:  # 2% above MA\n            self.trend_direction[vt_symbol] = 1  # Uptrend\n        elif bar.close_price \u003c ma * 0.98:  # 2% below MA\n            self.trend_direction[vt_symbol] = -1  # Downtrend\n        else:\n            self.trend_direction[vt_symbol] = 0  # No clear trend\n        \n        # Rebalance portfolio after trend update\n        self.rebalance_portfolio()\n        \n        self.put_event()\n        \n    def rebalance_portfolio(self):\n        \"\"\"\n        Rebalance portfolio based on signals\n        Called when 1hr bars complete (trend filter updates)\n        \"\"\"\n        # Get all stocks with aligned signals\n        long_candidates = []\n        short_candidates = []\n        \n        for vt_symbol in self.vt_symbols:\n            breakout = self.breakout_signals.get(vt_symbol, 0)\n            trend = self.trend_direction.get(vt_symbol, 0)\n            \n            # Long: Bullish breakout + Uptrend\n            if breakout == 1 and trend == 1:\n                long_candidates.append(vt_symbol)\n            # Short: Bearish breakout + Downtrend\n            elif breakout == -1 and trend == -1:\n                short_candidates.append(vt_symbol)\n        \n        # Get current positions\n        current_positions = self.get_all_positions()\n        \n        # Close positions that no longer meet criteria\n        for vt_symbol, pos in current_positions.items():\n            if pos.direction == Direction.LONG:\n                if vt_symbol not in long_candidates:\n                    self.sell(0, pos.volume, vt_symbol)  # Close long\n            elif pos.direction == Direction.SHORT:\n                if vt_symbol not in short_candidates:\n                    self.cover(0, pos.volume, vt_symbol)  # Close short\n        \n        # Open new positions (up to max_positions)\n        total_positions = len(current_positions)\n        available_slots = self.max_positions - total_positions\n        \n        # Rank candidates by breakout strength (could add more sophisticated ranking)\n        for vt_symbol in long_candidates[:available_slots]:\n            if not self.get_pos(vt_symbol):\n                price = self.get_tick(vt_symbol).last_price\n                volume = self.calculate_volume(price, self.position_size_pct)\n                self.buy(price, volume, vt_symbol)\n        \n        for vt_symbol in short_candidates[:available_slots]:\n            if not self.get_pos(vt_symbol):\n                price = self.get_tick(vt_symbol).last_price\n                volume = self.calculate_volume(price, self.position_size_pct)\n                self.short(price, volume, vt_symbol)\n        \n        self.write_log(f\"Rebalanced: {len(long_candidates)} long, {len(short_candidates)} short\")\n        \n    def calculate_volume(self, price: float, value_pct: float) -\u003e int:\n        \"\"\"Calculate volume based on portfolio value\"\"\"\n        portfolio_value = self.get_account().balance\n        target_value = portfolio_value * value_pct\n        volume = int(target_value / price)\n        return max(1, volume)\n        \n    def on_trade(self, trade):\n        self.write_log(f\"Trade: {trade.vt_symbol} {trade.direction} {trade.volume} @ {trade.price}\")\n        self.put_event()\n        \n    def on_order(self, order):\n        self.put_event()\n```\n\n---\n\n## Backtesting Example\n\n```python\n# backtest_nifty500.py\nfrom vnpy_portfoliostrategy import BacktestingEngine\nfrom datetime import datetime\nfrom strategies.nifty500_breakout_strategy import Nifty500BreakoutStrategy\n\nengine = BacktestingEngine()\n\n# Set parameters\nengine.set_parameters(\n    vt_symbols=[\"RELIANCE.NSE\", \"TCS.NSE\", \"INFY.NSE\", ...],  # NIFTY500 list\n    interval=\"1m\",                    # 1-minute bars\n    start=datetime(2024, 1, 1),\n    end=datetime(2024, 12, 31),\n    rate=0.0003,                      # 0.03% slippage\n    slippage=0.2,                     # Slippage in points\n    size=1,                           # Lot size (varies per stock)\n    pricetick=0.05,                   # Tick size\n    capital=10_000_000,               # 10 million INR\n)\n\n# Add strategy\nengine.add_strategy(Nifty500BreakoutStrategy, {})\n\n# Run backtest\nengine.run_backtesting()\ndf = engine.calculate_result()\nengine.calculate_statistics()\nengine.show_chart()\n```\n\n---\n\n## Data Requirements\n\nFor NIFTY500 stocks with multiple timeframes:\n\n| Data Type | Source | Notes |\n|-----------|--------|-------|\n| **1-minute bars** | IB, local data provider | Base timeframe |\n| **15-minute bars** | Synthesized from 1min | Bar               "content": "# Dynamic Option Chain Strategy Guide\n\nFor strategies requiring **dynamic option chain support** (strike selection, expiry selection, multi-leg strategies based on signals).\n\n---\n\n## Recommended Architecture\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│              Your Custom Option Strategy                         │\n│  (extends Portfolio Strategy Template)                           │\n├─────────────────────────────────────────────────────────────────┤\n│  Signal Generation → Option Chain Analytics → Order Execution   │\n│  - Underlying signal  - IV rank calculation  - Multi-leg orders │\n│  - Volatility view    - Strike selection     - Risk management  │\n│  - Expiry view        - Greeks targeting                          │\n├─────────────────────────────────────────────────────────────────┤\n│              vnpy_portfoliostrategy                              │\n│  (Strategy lifecycle + Backtesting)                              │\n├─────────────────────────────────────────────────────────────────┤\n│              vnpy_optionmaster (Utilities)                       │\n│  - OptionData, ChainData, PortfolioData                          │\n│  - Black-Scholes, Black-76, Binomial pricing                     │\n│  - Greeks calculation, IV calculation                            │\n└─────────────────────────────────────────────────────────────────┘\n```\n\n---\n\n## Why Not Pure OptionMaster?\n\n| Feature | OptionMaster | Portfolio Strategy | Your Need |\n|---------|--------------|-------------------|-----------|\n| **Option chain mgmt** | ✅ Excellent | ⚠️ Manual | Need this |\n| **Greeks/IV calc** | ✅ Excellent | ❌ None | Need this |\n| **Strategy template** | ❌ Algo-based only | ✅ Flexible | Need this |\n| **Backtesting** | ❌ Limited | ✅ Full support | Need this |\n| **Dynamic selection** | ⚠️ Manual setup | ✅ Code-based | Need this |\n| **Multi-leg** | ✅ Yes | ✅ Yes | Need this |\n\n**Solution:** Use **Portfolio Strategy** as the base + **OptionMaster utilities** for pricing/Greeks.\n\n---\n\n## OptionMaster Key Classes to Reuse\n\n### 1. OptionData (from vnpy_optionmaster/base.py)\n\n```python\nclass OptionData(InstrumentData):\n    \"\"\"Option contract data with Greeks and IV\"\"\"\n    \n    # Contract features\n    self.strike_price: float\n    self.chain_index: str\n    self.option_type: int  # 1=CALL, -1=PUT\n    self.option_expiry: datetime\n    self.days_to_expiry: int\n    self.time_to_expiry: float\n    \n    # Pricing\n    self.calculate_price: Callable      # Pricing model\n    self.calculate_greeks: Callable     # Greeks calculation\n    self.calculate_impv: Callable       # IV calculation\n    \n    # Implied volatility\n    self.bid_impv: float\n    self.ask_impv: float\n    self.mid_impv: float\n    self.pricing_impv: float\n    \n    # Greeks\n    self.theo_delta: float\n    self.theo_gamma: float\n    self.theo_theta: float\n    self.theo_vega: float\n    \n    # Position Greeks\n    self.pos_delta: float\n    self.pos_gamma: float\n    self.pos_theta: float\n    self.pos_vega: float\n```\n\n### 2. Pricing Models (from vnpy_optionmaster/pricing/)\n\n```python\n# Black-Scholes for European stock options\nfrom vnpy_optionmaster.pricing import black_scholes\n\nprice, delta, gamma, theta, vega = black_scholes.calculate_greeks(\n    underlying_price=18000,\n    strike_price=18000,\n    interest_rate=0.065,\n    time_to_expiry=30/365,\n    volatility=0.18,\n    option_type=1  # CALL\n)\n\n# Black-76 for European futures options (like NIFTY/BANKNIFTY)\nfrom vnpy_optionmaster.pricing import black_76\n\nprice, delta, gamma, theta, vega = black_76.calculate_greeks(\n    underlying_price=47500,\n    strike_price=47500,\n    interest_rate=0.065,\n    time_to_expiry=30/365,\n    volatility=0.15,\n    option_type=1  # CALL\n)\n\n# Implied volatility calculation\nimpv = black_76.calculate_impv(\n    option_price=350,\n    underlying_price=47500,\n    strike_price=47500,\n    interest_rate=0.065,\n    time_to_expiry=30/365,\n    option_type=1\n)\n```\n\n---\n\n## Strategy Example: Dynamic Straddle/Strangle\n\n```python\n# strategies/dynamic_option_strategy.py\nfrom datetime import datetime, timedelta\nfrom vnpy_portfoliostrategy import StrategyTemplate\nfrom vnpy.trader.constant import Direction, Offset, OptionType\nfrom vnpy.trader.object import BarData, TickData, ContractData\nfrom vnpy.trader.utility import BarGenerator, ArrayManager\n\n# Import OptionMaster pricing utilities\nfrom vnpy_optionmaster.pricing import black_76\nfrom vnpy_optionmaster.time import calculate_days_to_expiry, ANNUAL_DAYS\n\n\nclass DynamicOptionStrategy(StrategyTemplate):\n    \"\"\"\n    Dynamic option strategy with automatic strike/expiry selection\n    \n    Features:\n    - Selects expiry based on days-to-expiry target\n    - Selects strikes based on moneyness (ATM/OTM/ITM)\n    - Calculates IV and Greeks in real-time\n    - Supports straddle, strangle, iron condor, etc.\n    \"\"\"\n    \n    author = \"Your Name\"\n    \n    # Strategy parameters\n    strategy_type: str = \"straddle\"  # straddle, strangle, iron_condor\n    expiry_days_target: int = 30     # Target days to expiry\n    strike_distance: str = \"ATM\"     # ATM, OTM_1, OTM_2, ITM_1\n    leg_ratio: int = 1               # Ratio for legs\n    \n    # Underlying parameters\n    underlying_symbol: str = \"BANKNIFTY.NSE\"\n    iv_rank_lookback: int = 252      # 1 year for IV rank\n    \n    # Risk management\n    max_portfolio_delta: float = 0.3   # Max net delta\n    stop_loss_pct: float = 0.5         # 50% stop loss\n    take_profit_pct: float = 1.0       # 100% take profit\n    \n    parameters = [\n        \"strategy_type\",\n        \"expiry_days_target\",\n        \"strike_distance\",\n        \"leg_ratio\",\n        \"underlying_symbol\",\n        \"max_portfolio_delta\",\n        \"stop_loss_pct\",\n        \"take_profit_pct\"\n    ]\n    \n    def __init__(self, cta_engine, strategy_name, vt_symbols, setting):\n        super().__init__(cta_engine, strategy_name, vt_symbols, setting)\n        \n        self.bg = BarGenerator(self.on_bar)\n        self.am = ArrayManager(size=252)  # For IV rank calculation\n        \n        # Option chain data\n        self.option_chain = {}  # {vt_symbol: OptionData}\n        self.selected_options = {}  # {leg_name: vt_symbol}\n        \n        # Position tracking\n        self.entry_premium = {}  # {vt_symbol: entry_price}\n        self.position_greeks = {\n            \"delta\": 0,\n            \"gamma\": 0,\n            \"theta\": 0,\n            \"vega\": 0\n        }\n        \n        # State\n        self.position_open = False\n        self.legs_opened = set()\n        \n    def on_init(self):\n        \"\"\"Initialize strategy\"\"\"\n        self.write_log(\"Strategy initialized\")\n        self.load_bar(60)  # Load 60 days for IV calculation\n        \n    def on_start(self):\n        self.write_log(\"Strategy started\")\n        self.refresh_option_chain()\n        \n    def on_stop(self):\n        self.write_log(\"Strategy stopped\")\n        self.close_all_positions()\n        \n    def on_bar(self, bar: BarData):\n        \"\"\"Main bar handler\"\"\"\n        self.cancel_all()\n        \n        # Update underlying data\n        self.am.update_bar(bar)\n        \n        # Refresh option chain periodically\n        self.refresh_option_chain()\n        \n        # Check if we should open position\n        if not self.position_open:\n            self.check_entry_signal()\n        else:\n            self.check_exit_signal()\n        \n        self.put_event()\n        \n    def refresh_option_chain(self):\n        \"\"\"\n        Refresh option chain data\n        Select appropriate strikes and expiries\n        \"\"\"\n        # Get all option contracts for underlying\n        all_contracts = self.get_all_contracts()\n        \n        option_contracts = [\n            c for c in all_contracts \n            if c.product == Product.OPTION \n            and self.underlying_symbol in c.option_underlying\n        ]\n        \n        # Group by expiry\n        expiry_groups = {}  # {expiry_date: [contracts]}\n        for contract in option_contracts:\n            expiry = contract.option_expiry\n            if expiry not in expiry_groups:\n                expiry_groups[expiry] = []\n            expiry_groups[expiry].append(contract)\n        \n        # Select expiry closest to target\n        selected_expiry = self.select_expiry(expiry_groups)\n        if not selected_expiry:\n            return\n        \n        # Get underlying price\n        underlying_tick = self.get_tick(self.underlying_symbol)\n        if not underlying_tick:\n            return\n        underlying_price = underlying_tick.last_price\n        \n        # Select strikes based on moneyness\n        selected_strikes = self.select_strikes(\n            expiry_groups[selected_expiry],\n            underlying_price,\n            self.strike_distance\n        )\n        \n        # Build OptionData objects\n        for contract in selected_strikes:\n            option_data = self.create_option_data(contract, underlying_price)\n            self.option_chain[contract.vt_symbol] = option_data\n        \n        # Select legs based on strategy type\n        self.select_legs(selected_expiry, underlying_price)\n        \n        self.write_log(f\"Option chain refreshed: {len(self.option_chain)} options\")\n        \n    def select_expiry(self, expiry_groups: dict) -\u003e datetime:\n        \"\"\"Select expiry closest to target days\"\"\"\n        if not expiry_groups:\n            return None\n            \n        today = datetime.now()\n        best_expiry = None\n        min_diff = float('inf')\n        \n        for expiry in expiry_groups.keys():\n            days_diff = abs((expiry - today).days - self.expiry_days_target)\n            if days_diff \u003c min_diff:\n                min_diff = days_diff\n                best_expiry = expiry\n        \n        return best_expiry\n        \n    def select_strikes(\n        self, \n        contracts: list[ContractData], \n        underlying_price: float,\n        distance: str\n    ) -\u003e list[ContractData]:\n        \"\"\"Select strikes based on moneyness\"\"\"\n        \n        # Separate calls and puts\n        calls = [c for c in contracts if c.option_type == OptionType.CALL]\n        puts = [c for c in contracts if c.option_type == OptionType.PUT]\n        \n        # Sort by strike\n        calls.sort(key=lambda x: x.option_strike)\n        puts.sort(key=lambda x: x.option_strike)\n        \n        # Find ATM strike (closest to underlying price)\n        atm_call = min(calls, key=lambda x: abs(x.option_strike - underlying_price))\n        atm_strike = atm_call.option_strike\n        \n        selected = []\n        \n        if distance == \"ATM\":\n            # Select ATM call and put\n            atm_put = min(puts, key=lambda x: abs(x.option_strike - underlying_price))\n            selected = [atm_call, atm_put]\n            \n        elif distance == \"OTM_1\":\n            # Select 1 strike OTM\n            call_otm = [c for c in calls if c.option_strike \u003e atm_strike]\n            put_otm = [p for p in puts if p.option_strike \u003c atm_strike]\n            if call_otm and put_otm:\n                selected = [call_otm[0], put_otm[0]]\n                \n        elif distance == \"OTM_2\":\n            # Select 2 strikes OTM\n            call_otm = [c for c in calls if c.option_strike \u003e atm_strike]\n            put_otm = [p for p in puts if p.option_strike \u003c atm_strike]\n            if len(call_otm) \u003e 1 and len(put_otm) \u003e 1:\n                selected = [call_otm[1], put_otm[1]]\n        \n        return selected\n        \n    def create_option_data(\n        self, \n        contract: ContractData, \n        underlying_price: float\n    ) -\u003e 'OptionData':\n        \"\"\"Create OptionData with Greeks and IV\"\"\"\n        \n        # Calculate days to expiry\n        days_to_expiry = calculate_days_to_expiry(contract.option_expiry)\n        time_to_expiry = days_to_expiry / ANNUAL_DAYS\n        \n        # Get option tick\n        tick = self.get_tick(contract.vt_symbol)\n        if not tick:\n            return None\n            \n        mid_price = (tick.bid_price_1 + tick.ask_price_1) / 2\n        \n        # Calculate IV\n        impv = black_76.calculate_impv(\n            option_price=mid_price,\n            underlying_price=underlying_price,\n            strike_price=contract.option_strike,\n            interest_rate=0.065,\n            time_to_expiry=time_to_expiry,\n            option_type=1 if contract.option_type == OptionType.CALL else -1\n        )\n        \n        # Calculate Greeks\n        _, delta, gamma, theta, vega = black_76.calculate_greeks(\n            underlying_price=underlying_price,\n            strike_price=contract.option_strike,\n            interest_rate=0.065,\n            time_to_expiry=time_to_expiry,\n            volatility=impv,\n            option_type=1 if contract.option_type == OptionType.CALL else -1\n        )\n        \n        # Store in custom dict (simplified OptionData)\n        option_data = {\n            \"vt_symbol\": contract.vt_symbol,\n            \"strike\": contract.option_strike,\n            \"expiry\": contract.option_expiry,\n            \"type\": contract.option_type,\n            \"bid\": tick.bid_price_1,\n            \"ask\": tick.ask_price_1,\n            \"mid\": mid_price,\n            \"impv\": impv,\n            \"delta\": delta,\n            \"gamma\": gamma,\n            \"theta\": theta,\n            \"vega\": vega,\n            \"days_to_expiry\": days_to_expiry\n        }\n        \n        return option_data\n        \n    def select_legs(self, expiry: datetime, underlying_price: float):\n        \"\"\"Select legs based on strategy type\"\"\"\n        \n        self.selected_options = {}\n        \n        if self.strategy_type == \"straddle\":\n            # Find ATM strike\n            atm_options = [\n                o for o in self.option_chain.values()\n                if o[\"expiry\"] == expiry\n            ]\n            \n            if len(atm_options) \u003e= 2:\n                # Group by strike\n                strike_groups = {}\n                for opt in atm_options:\n                    if opt[\"strike\"] not in strike_groups:\n                        strike_groups[opt[\"strike\"]] = []\n                    strike_groups[opt[\"strike\"]].append(opt)\n                \n                # Find ATM (closest to underlying)\n                atm_strike = min(strike_groups.keys(), key=lambda x: abs(x - underlying_price))\n                atm_legs = strike_groups[atm_strike]\n                \n                # Select call and put\n                call = next(o for o in atm_legs if o[\"type\"] == OptionType.CALL)\n                put = next(o for o in atm_legs if o[\"type\"] == OptionType.PUT)\n                \n                self.selected_options = {\n                    \"call\": call[\"vt_symbol\"],\n                    \"put\": put[\"vt_symbol\"]\n                }\n                \n        elif self.strategy_type == \"strangle\":\n            # Similar but select OTM strikes\n            pass\n            \n        elif self.strategy_type == \"iron_condor\":\n            # Select 4 legs: OTM put spread + OTM call spread\n            pass\n            \n        self.write_log(f\"Selected legs: {list(self.selected_options.keys())}\")\n        \n    def check_entry_signal(self):\n        \"\"\"Check if entry conditions are met\"\"\"\n        \n        # Example: Enter when IV rank is low (for long straddle)\n        if not self.am.inited:\n            return\n            \n        # Calculate IV rank (simplified - use historical IV)\n        current_iv = self.get_current_iv()\n        if not current_iv:\n            return\n            \n        iv_rank = self.calculate_iv_rank(current_iv)\n        \n        # Entry logic\n        if self.strategy_type == \"straddle\":\n            # Long straddle when IV rank is low (expecting expansion)\n            if iv_rank \u003c 0.3:  # IV rank below 30%\n                self.open_position()\n                \n        elif self.strategy_type == \"strangle\":\n            # Short strangle when IV rank is high (expecting contraction)\n            if iv_rank \u003e 0.7:  # IV rank above 70%\n                self.open_position()\n                \n    def open_position(self):\n        \"\"\"Open option position\"\"\"\n        \n        if not self.selected_options:\n            self.write_log(\"No legs selected\")\n            return\n            \n        for leg_name, vt_symbol in self.selected_options.items():\n            option = self.option_chain.get(vt_symbol)\n            if not option:\n                continue\n                \n            # Get current price\n            tick = self.get_tick(vt_symbol)\n            if not tick:\n                continue\n                \n            # Determine direction based on strategy and leg type\n            if self.strategy_type in [\"straddle\", \"strangle\"]:\n                # Long strategy: BUY both legs\n                direction = Direction.LONG\n                volume = self.leg_ratio\n            else:\n                # Short strategy: SELL both legs\n                direction = Direction.SHORT\n                volume = self.leg_ratio\n            \n            # Send order\n            vt_orderid = self.send_order(\n                vt_symbol=vt_symbol,\n                direction=direction,\n                offset=Offset.OPEN,\n                price=tick.ask_price_1 if direction == Direction.LONG else tick.bid_price_1,\n                volume=volume\n            )\n            \n            self.legs_opened.add(leg_name)\n            self.entry_premium[vt_symbol] = tick.ask_price_1 if direction == Direction.LONG else tick.bid_price_1\n            \n            self.write_log(f\"Opened {leg_name}: {vt_symbol} {direction.value} {volume} @ {tick.ask_price_1}\")\n        \n        self.position_open = True\n        \n    def check_exit_signal(self):\n        \"\"\"Check if exit conditions are met\"\"\"\n        \n        # Calculate current PnL\n        total_pnl = 0\n        for vt_symbol, entry_price in self.entry_premium.items():\n            tick = self.get_tick(vt_symbol)\n            if not tick:\n                continue\n                \n            current_price = tick.last_price\n            pnl_pct = (current_price - entry_price) / entry_price\n            total_pnl += pnl_pct\n        \n        avg_pnl_pct = total_pnl / len(self.entry_premium) if self.entry_premium else 0\n        \n        # Check stop loss\n        if avg_pnl_pct \u003c= -self.stop_loss_pct:\n            self.write_log(f\"Stop loss triggered: {avg_pnl_pct:.2%}\")\n            self.close_all_positions()\n            return\n            \n        # Check take profit\n        if avg_pnl_pct \u003e= self.take_profit_pct:\n            self.write_log(f\"Take profit triggered: {avg_pnl_pct:.2%}\")\n            self.close_all_positions()\n            return\n            \n        # Check delta risk\n        self.update_position_greeks()\n        if abs(self.position_greeks[\"delta\"]) \u003e self.max_portfolio_delta:\n            self.write_log(f\"Delta limit breached: {self.position_greeks['delta']}\")\n            self.adjust_delta()\n            \n    def update_position_greeks(self):\n        \"\"\"Update portfolio Greeks\"\"\"\n        \n        self.position_greeks = {\"delta\": 0, \"gamma\": 0, \"theta\": 0, \"vega\": 0}\n        \n        for vt_symbol in self.selected_options.values():\n            option = self.option_chain.get(vt_symbol)\n            if not option:\n                continue\n                \n            pos = self.get_pos(vt_symbol)\n            if not pos or pos.volume == 0:\n                continue\n                \n            # Add to portfolio Greeks\n            self.position_greeks[\"delta\"] += option[\"delta\"] * pos.volume\n            self.position_greeks[\"gamma\"] += option[\"gamma\"] * pos.volume\n            self.position_greeks[\"theta\"] += option[\"theta\"] * pos.volume\n            self.position_greeks[\"vega\"] += option[\"vega\"] * pos.volume\n            \n    def adjust_delta(self):\n        \"\"\"Delta hedge by adjusting underlying\"\"\"\n        \n        # Calculate hedge quantity\n        underlying_tick = self.get_tick(self.underlying_symbol)\n        if not underlying_tick:\n            return\n            \n        # Buy/sell underlying to neutralize delta\n        hedge_delta = -self.position_greeks[\"delta\"]\n        hedge_volume = abs(int(hedge_delta))\n        \n        if hedge_volume \u003e 0:\n            if hedge_delta \u003e 0:\n                self.buy(underlying_tick.last_price, hedge_volume, self.underlying_symbol)\n            else:\n                self.sell(underlying_tick.last_price, hedge_volume, self.underlying_symbol)\n                \n            self.write_log(f\"Delta hedge: {hedge_volume} {self.underlying_symbol}\")\n            \n    def close_all_positions(self):\n        \"\"\"Close all option positions\"\"\"\n        \n        for vt_symbol in list(self.selected_options.values()):\n            pos = self.get_pos(vt_symbol)\n            if pos and pos.volume \u003e 0:\n                if pos.direction == Direction.LONG:\n                    self.sell(0, pos.volume, vt_symbol)  # Market order\n                else:\n                    self.cover(0, pos.volume, vt_symbol)\n                    \n        self.position_open = False\n        self.legs_opened.clear()\n        self.entry_premium.clear()\n        \n    def get_current_iv(self) -\u003e float:\n        \"\"\"Get current implied volatility\"\"\"\n        # Simplified: average IV of selected options\n        if not self.option_chain:\n            return None\n            \n        ivs = [o[\"impv\"] for o in self.option_chain.values() if o.get(\"impv\")]\n        return sum(ivs) / len(ivs) if ivs else None\n        \n    def calculate_iv_rank(self, current_iv: float) -\u003e float:\n        \"\"\"Calculate IV rank\"\"\"\n        # Simplified: use historical IV percentile\n        # In production, use actual IV history from database\n        return 0.5  # Placeholder\n        \n    def on_trade(self, trade):\n        self.write_log(f\"Trade: {trade.vt_symbol} {trade.direction} {trade.volume} @ {trade.price}\")\n        self.update_position_greeks()\n        self.put_event()\n        \n    def on_order(self, order):\n        self.put_event()\n```\n\n---\n\n## Backtesting\n\n```python\n# backtest_option_strategy.py\nfrom vnpy_portfoliostrategy import BacktestingEngine\nfrom datetime import datetime\nfrom strategies.dynamic_option_strategy import DynamicOptionStrategy\n\nengine = BacktestingEngine()\n\nengine.set_parameters(\n    vt_symbols=[\n        \"BANKNIFTY.NSE\",           # Underlying\n        \"BANKNIFTY-24DEC-47000-CE.NSE\",  # Example options\n        \"BANKNIFTY-24DEC-47000-PE.NSE\",\n        # ... more options\n    ],\n    interval=\"1m\",\n    start=datetime(2024, 1, 1),\n    end=datetime(2024, 12, 15),\n    rate=0.0003,\n    slippage=0.5,\n    size=15,                      # BANKNIFTY lot size\n    pricetick=0.05,\n    capital=5_000_000,            # 5 million INR\n)\n\nengine.add_strategy(DynamicOptionStrategy, {\n    \"strategy_type\": \"straddle\",\n    \"expiry_days_target\": 30,\n    \"strike_distance\": \"ATM\",\n    \"leg_ratio\": 1,\n    \"underlying_symbol\": \"BANKNIFTY.NSE\",\n})\n\nengine.run_backtesting()\ndf = engine.calculate_result()\nengine.calculate_statistics()\nengine.show_chart()\n```\n\n---\n\n## Data Requirements\n\n| Data | Source | Storage |\n|------|--------|---------|\n| Underlying (BANKNIFTY) | IB, local provider | Database |\n| Option chain (all strikes/expiries) | IB, local provider | Database |\n| Historical IV | Calculated or purchased | Database |\n\n**Challenge:** Need complete option chain history for backtesting. Solutions:\n1. Record live data with `vnpy_datarecorder`\n2. Purchase historical option data\n3. Use IB's historical data API (limited)\n\n---\n\n## Summary\n\n| Component | Solution |\n|-----------|----------|\n| **Base Engine** | `vnpy_portfoliostrategy` |\n| **Option Pricing** | `vnpy_optionmaster.pricing` (black_76) |\n| **Greeks/IV** | Custom calculation using OptionMaster formulas |\n| **Chain Management** | Custom code (select expiry, strikes) |\n| **Backtesting** | Portfolio strategy backtester |\n| **Live Trading** | Portfolio strategy engine |\n\n**Key Files to Study:**\n1. `vnpy_optionmaster/base.py` - OptionData, ChainData classes\n2. `vnpy_optionmaster/pricing/black_76.py` - Pricing formulas\n3. `vnpy_portfoliostrategy/template.py` - Strategy base\n4. `vnpy_portfoliostrategy/backtesting.py` - Backtest engine\n",

                "newText": "# Dynamic Option Chain Strategy Guide\n\nFor strategies requiring **dynamic option chain support** (strike selection, expiry selection, multi-leg strategies based on signals).\n\n---\n\n## Recommended Architecture\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│              Your Custom Option Strategy                         │\n│  (extends Portfolio Strategy Template)                           │\n├─────────────────────────────────────────────────────────────────┤\n│  Signal Generation → Option Chain Analytics → Order Execution   │\n│  - Underlying signal  - IV rank calculation  - Multi-leg orders │\n│  - Volatility view    - Strike selection     - Risk management  │\n│  - Expiry view        - Greeks targeting                          │\n├─────────────────────────────────────────────────────────────────┤\n│              vnpy_portfoliostrategy                              │\n│  (Strategy lifecycle + Backtesting)                              │\n├─────────────────────────────────────────────────────────────────┤\n│              vnpy_optionmaster (Utilities)                       │\n│  - OptionData, ChainData, PortfolioData                          │\n│  - Black-Scholes, Black-76, Binomial pricing                     │\n│  - Greeks calculation, IV calculation                            │\n└─────────────────────────────────────────────────────────────────┘\n```\n\n---\n\n## Why Not Pure OptionMaster?\n\n| Feature | OptionMaster | Portfolio Strategy | Your Need |\n|---------|--------------|-------------------|-----------|\n| **Option chain mgmt** | ✅ Excellent | ⚠️ Manual | Need this |\n| **Greeks/IV calc** | ✅ Excellent | ❌ None | Need this |\n| **Strategy template** | ❌ Algo-based only | ✅ Flexible | Need this |\n| **Backtesting** | ❌ Limited | ✅ Full support | Need this |\n| **Dynamic selection** | ⚠️ Manual setup | ✅ Code-based | Need this |\n| **Multi-leg** | ✅ Yes | ✅ Yes | Need this |\n\n**Solution:** Use **Portfolio Strategy** as the base + **OptionMaster utilities** for pricing/Greeks.\n\n---\n\n## OptionMaster Key Classes to Reuse\n\n### 1. OptionData (from vnpy_optionmaster/base.py)\n\n```python\nclass OptionData(InstrumentData):\n    \"\"\"Option contract data with Greeks and IV\"\"\"\n    \n    # Contract features\n    self.strike_price: float\n    self.chain_index: str\n    self.option_type: int  # 1=CALL, -1=PUT\n    self.option_expiry: datetime\n    self.days_to_expiry: int\n    self.time_to_expiry: float\n    \n    # Pricing\n    self.calculate_price: Callable      # Pricing model\n    self.calculate_greeks: Callable     # Greeks calculation\n    self.calculate_impv: Callable       # IV calculation\n    \n    # Implied volatility\n    self.bid_impv: float\n    self.ask_impv: float\n    self.mid_impv: float\n    self.pricing_impv: float\n    \n    # Greeks\n    self.theo_delta: float\n    self.theo_gamma: float\n    self.theo_theta: float\n    self.theo_vega: float\n    \n    # Position Greeks\n    self.pos_delta: float\n    self.pos_gamma: float\n    self.pos_theta: float\n    self.pos_vega: float\n```\n\n### 2. Pricing Models (from vnpy_optionmaster/pricing/)\n\n```python\n# Black-Scholes for European stock options\nfrom vnpy_optionmaster.pricing import black_scholes\n\nprice, delta, gamma, theta, vega = black_scholes.calculate_greeks(\n    underlying_price=18000,\n    strike_price=18000,\n    interest_rate=0.065,\n    time_to_expiry=30/365,\n    volatility=0.18,\n    option_type=1  # CALL\n)\n\n# Black-76 for European futures options (like NIFTY/BANKNIFTY)\nfrom vnpy_optionmaster.pricing import black_76\n\nprice, delta, gamma, theta, vega = black_76.calculate_greeks(\n    underlying_price=47500,\n    strike_price=47500,\n    interest_rate=0.065,\n    time_to_expiry=30/365,\n    volatility=0.15,\n    option_type=1  # CALL\n)\n\n# Implied volatility calculation\nimpv = black_76.calculate_impv(\n    option_price=350,\n    underlying_price=47500,\n    strike_price=47500,\n    interest_rate=0.065,\n    time_to_expiry=30/365,\n    option_type=1\n)\n```\n\n---\n\n## Strategy Example: Dynamic Straddle/Strangle\n\n```python\n# strategies/dynamic_option_strategy.py\nfrom datetime import datetime, timedelta\nfrom vnpy_portfoliostrategy import StrategyTemplate\nfrom vnpy.trader.constant import Direction, Offset, OptionType\nfrom vnpy.trader.object import BarData, TickData, ContractData\nfrom vnpy.trader.utility import BarGenerator, ArrayManager\n\n# Import OptionMaster pricing utilities\nfrom vnpy_optionmaster.pricing import black_76\nfrom vnpy_optionmaster.time import calculate_days_to_expiry, ANNUAL_DAYS\n\n\nclass DynamicOptionStrategy(StrategyTemplate):\n    \"\"\"\n    Dynamic option strategy with automatic strike/expiry selection\n    \n    Features:\n    - Selects expiry based on days-to-expiry target\n    - Selects strikes based on moneyness (ATM/OTM/ITM)\n    - Calculates IV and Greeks in real-time\n    - Supports straddle, strangle, iron condor, etc.\n    \"\"\"\n    \n    author = \"Your Name\"\n    \n    # Strategy parameters\n    strategy_type: str = \"straddle\"  # straddle, strangle, iron_condor\n    expiry_days_target: int = 30     # Target days to expiry\n    strike_distance: str = \"ATM\"     # ATM, OTM_1, OTM_2, ITM_1\n    leg_ratio: int = 1               # Ratio for legs\n    \n    # Underlying parameters\n    underlying_symbol: str = \"BANKNIFTY.NSE\"\n    iv_rank_lookback: int = 252      # 1 year for IV rank\n    \n    # Risk management\n    max_portfolio_delta: float = 0.3   # Max net delta\n    stop_loss_pct: float = 0.5         # 50% stop loss\n    take_profit_pct: float = 1.0       # 100% take profit\n    \n    parameters = [\n        \"strategy_type\",\n        \"expiry_days_target\",\n        \"strike_distance\",\n        \"leg_ratio\",\n        \"underlying_symbol\",\n        \"max_portfolio_delta\",\n        \"stop_loss_pct\",\n        \"take_profit_pct\"\n    ]\n    \n    def __init__(self, cta_engine, strategy_name, vt_symbols, setting):\n        super().__init__(cta_engine, strategy_name, vt_symbols, setting)\n        \n        self.bg = BarGenerator(self.on_bar)\n        self.am = ArrayManager(size=252)  # For IV rank calculation\n        \n        # Option chain data\n        self.option_chain = {}  # {vt_symbol: OptionData}\n        self.selected_options = {}  # {leg_name: vt_symbol}\n        \n        # Position tracking\n        self.entry_premium = {}  # {vt_symbol: entry_price}\n        self.position_greeks = {\n            \"delta\": 0,\n            \"gamma\": 0,\n            \"theta\": 0,\n            \"vega\": 0\n        }\n        \n        # State\n        self.position_open = False\n        self.legs_opened = set()\n        \n    def on_init(self):\n        \"\"\"Initialize strategy\"\"\"\n        self.write_log(\"Strategy initialized\")\n        self.load_bar(60)  # Load 60 days for IV calculation\n        \n    def on_start(self):\n        self.write_log(\"Strategy started\")\n        self.refresh_option_chain()\n        \n    def on_stop(self):\n        self.write_log(\"Strategy stopped\")\n        self.close_all_positions()\n        \n    def on_bar(self, bar: BarData):\n        \"\"\"Main bar handler\"\"\"\n        self.cancel_all()\n        \n        # Update underlying data\n        self.am.update_bar(bar)\n        \n        # Refresh option chain periodically\n        self.refresh_option_chain()\n        \n        # Check if we should open position\n        if not self.position_open:\n            self.check_entry_signal()\n        else:\n            self.check_exit_signal()\n        \n        self.put_event()\n        \n    def refresh_option_chain(self):\n        \"\"\"\n        Refresh option chain data\n        Select appropriate strikes and expiries\n        \"\"\"\n        # Get all option contracts for underlying\n        all_contracts = self.get_all_contracts()\n        \n        option_contracts = [\n            c for c in all_contracts \n            if c.product == Product.OPTION \n            and self.underlying_symbol in c.option_underlying\n        ]\n        \n        # Group by expiry\n        expiry_groups = {}  # {expiry_date: [contracts]}\n        for contract in option_contracts:\n            expiry = contract.option_expiry\n            if expiry not in expiry_groups:\n                expiry_groups[expiry] = []\n            expiry_groups[expiry].append(contract)\n        \n        # Select expiry closest to target\n        selected_expiry = self.select_expiry(expiry_groups)\n        if not selected_expiry:\n            return\n        \n        # Get underlying price\n        underlying_tick = self.get_tick(self.underlying_symbol)\n        if not underlying_tick:\n            return\n        underlying_price = underlying_tick.last_price\n        \n        # Select strikes based on moneyness\n        selected_strikes = self.select_strikes(\n            expiry_groups[selected_expiry],\n            underlying_price,\n            self.strike_distance\n        )\n        \n        # Build OptionData objects\n        for contract in selected_strikes:\n            option_data = self.create_option_data(contract, underlying_price)\n            self.option_chain[contract.vt_symbol] = option_data\n        \n        # Select legs based on strategy type\n        self.select_legs(selected_expiry, underlying_price)\n        \n        self.write_log(f\"Option chain refreshed: {len(self.option_chain)} options\")\n        \n    def select_expiry(self, expiry_groups: dict) -\u003e datetime:\n        \"\"\"Select expiry closest to target days\"\"\"\n        if not expiry_groups:\n            return None\n            \n        today = datetime.now()\n        best_expiry = None\n        min_diff = float('inf')\n        \n        for expiry in expiry_groups.keys():\n            days_diff = abs((expiry - today).days - self.expiry_days_target)\n            if days_diff \u003c min_diff:\n                min_diff = days_diff\n                best_expiry = expiry\n        \n        return best_expiry\n        \n    def select_strikes(\n        self, \n        contracts: list[ContractData], \n        underlying_price: float,\n        distance: str\n    ) -\u003e list[ContractData]:\n        \"\"\"Select strikes based on moneyness\"\"\"\n        \n        # Separate calls and puts\n        calls = [c for c in contracts if c.option_type == OptionType.CALL]\n        puts = [c for c in contracts if c.option_type == OptionType.PUT]\n        \n        # Sort by strike\n        calls.sort(key=lambda x: x.option_strike)\n        puts.sort(key=lambda x: x.option_strike)\n        \n        # Find ATM strike (closest to underlying price)\n        atm_call = min(calls, key=lambda x: abs(x.option_strike - underlying_price))\n        atm_strike = atm_call.option_strike\n        \n        selected = []\n        \n        if distance == \"ATM\":\n            # Select ATM call and put\n            atm_put = min(puts, key=lambda x: abs(x.option_strike - underlying_price))\n            selected = [atm_call, atm_put]\n            \n        elif distance == \"OTM_1\":\n            # Select 1 strike OTM\n            call_otm = [c for c in calls if c.option_strike \u003e atm_strike]\n            put_otm = [p for p in puts if p.option_strike \u003c atm_strike]\n            if call_otm and put_otm:\n                selected = [call_otm[0], put_otm[0]]\n                \n        elif distance == \"OTM_2\":\n            # Select 2 strikes OTM\n            call_otm = [c for c in calls if c.option_strike \u003e atm_strike]\n            put_otm = [p for p in puts if p.option_strike \u003c atm_strike]\n            if len(call_otm) \u003e 1 and len(put_otm) \u003e 1:\n                selected = [call_otm[1], put_otm[1]]\n        \n        return selected\n        \n    def create_option_data(\n        self, \n        contract: ContractData, \n        underlying_price: float\n    ) -\u003e 'OptionData':\n        \"\"\"Create OptionData with Greeks and IV\"\"\"\n        \n        # Calculate days to expiry\n        days_to_expiry = calculate_days_to_expiry(contract.option_expiry)\n        time_to_expiry = days_to_expiry / ANNUAL_DAYS\n        \n        # Get option tick\n        tick = self.get_tick(contract.vt_symbol)\n        if not tick:\n            return None\n            \n        mid_price = (tick.bid_price_1 + tick.ask_price_1) / 2\n        \n        # Calculate IV\n        impv = black_76.calculate_impv(\n            option_price=mid_price,\n            underlying_price=underlying_price,\n            strike_price=contract.option_strike,\n            interest_rate=0.065,\n            time_to_expiry=time_to_expiry,\n            option_type=1 if contract.option_type == OptionType.CALL else -1\n        )\n        \n        # Calculate Greeks\n        _, delta, gamma, theta, vega = black_76.calculate_greeks(\n            underlying_price=underlying_price,\n            strike_price=contract.option_strike,\n            interest_rate=0.065,\n            time_to_expiry=time_to_expiry,\n            volatility=impv,\n            option_type=1 if contract.option_type == OptionType.CALL else -1\n        )\n        \n        # Store in custom dict (simplified OptionData)\n        option_data = {\n            \"vt_symbol\": contract.vt_symbol,\n            \"strike\": contract.option_strike,\n            \"expiry\": contract.option_expiry,\n            \"type\": contract.option_type,\n            \"bid\": tick.bid_price_1,\n            \"ask\": tick.ask_price_1,\n            \"mid\": mid_price,\n            \"impv\": impv,\n            \"delta\": delta,\n            \"gamma\": gamma,\n            \"theta\": theta,\n            \"vega\": vega,\n            \"days_to_expiry\": days_to_expiry\n        }\n        \n        return option_data\n        \n    def select_legs(self, expiry: datetime, underlying_price: float):\n        \"\"\"Select legs based on strategy type\"\"\"\n        \n        self.selected_options = {}\n        \n        if self.strategy_type == \"straddle\":\n            # Find ATM strike\n            atm_options = [\n                o for o in self.option_chain.values()\n                if o[\"expiry\"] == expiry\n            ]\n            \n            if len(atm_options) \u003e= 2:\n                # Group by strike\n                strike_groups = {}\n                for opt in atm_options:\n                    if opt[\"strike\"] not in strike_groups:\n                        strike_groups[opt[\"strike\"]] = []\n                    strike_groups[opt[\"strike\"]].append(opt)\n                \n                # Find ATM (closest to underlying)\n                atm_strike = min(strike_groups.keys(), key=lambda x: abs(x - underlying_price))\n                atm_legs = strike_groups[atm_strike]\n                \n                # Select call and put\n                call = next(o for o in atm_legs if o[\"type\"] == OptionType.CALL)\n                put = next(o for o in atm_legs if o[\"type\"] == OptionType.PUT)\n                \n                self.selected_options = {\n                    \"call\": call[\"vt_symbol\"],\n                    \"put\": put[\"vt_symbol\"]\n                }\n                \n        elif self.strategy_type == \"strangle\":\n            # Similar but select OTM strikes\n            pass\n            \n        elif self.strategy_type == \"iron_condor\":\n            # Select 4 legs: OTM put spread + OTM call spread\n            pass\n            \n        self.write_log(f\"Selected legs: {list(self.selected_options.keys())}\")\n        \n    def check_entry_signal(self):\n        \"\"\"Check if entry conditions are met\"\"\"\n        \n        # Example: Enter when IV rank is low (for long straddle)\n        if not self.am.inited:\n            return\n            \n        # Calculate IV rank (simplified - use historical IV)\n        current_iv = self.get_current_iv()\n        if not current_iv:\n            return\n            \n        iv_rank = self.calculate_iv_rank(current_iv)\n        \n        # Entry logic\n        if self.strategy_type == \"straddle\":\n            # Long straddle when IV rank is low (expecting expansion)\n            if iv_rank \u003c 0.3:  # IV rank below 30%\n                self.open_position()\n                \n        elif self.strategy_type == \"strangle\":\n            # Short strangle when IV rank is high (expecting contraction)\n            if iv_rank \u003e 0.7:  # IV rank above 70%\n                self.open_position()\n                \n    def open_position(self):\n        \"\"\"Open option position\"\"\"\n        \n        if not self.selected_options:\n            self.write_log(\"No legs selected\")\n            return\n            \n        for leg_name, vt_symbol in self.selected_options.items():\n            option = self.option_chain.get(vt_symbol)\n            if not option:\n                continue\n                \n            # Get current price\n            tick = self.get_tick(vt_symbol)\n            if not tick:\n                continue\n                \n            # Determine direction based on strategy and leg type\n            if self.strategy_type in [\"straddle\", \"strangle\"]:\n                # Long strategy: BUY both legs\n                direction = Direction.LONG\n                volume = self.leg_ratio\n            else:\n                # Short strategy: SELL both legs\n                direction = Direction.SHORT\n                volume = self.leg_ratio\n            \n            # Send order\n            vt_orderid = self.send_order(\n                vt_symbol=vt_symbol,\n                direction=direction,\n                offset=Offset.OPEN,\n                price=tick.ask_price_1 if direction == Direction.LONG else tick.bid_price_1,\n                volume=volume\n            )\n            \n            self.legs_opened.add(leg_name)\n            self.entry_premium[vt_symbol] = tick.ask_price_1 if direction == Direction.LONG else tick.bid_price_1\n            \n            self.write_log(f\"Opened {leg_name}: {vt_symbol} {direction.value} {volume} @ {tick.ask_price_1}\")\n        \n        self.position_open = True\n        \n    def check_exit_signal(self):\n        \"\"\"Check if exit conditions are met\"\"\"\n        \n        # Calculate current PnL\n        total_pnl = 0\n        for vt_symbol, entry_price in self.entry_premium.items():\n            tick = self.get_tick(vt_symbol)\n            if not tick:\n                continue\n                \n            current_price = tick.last_price\n            pnl_pct = (current_price - entry_price) / entry_price\n            total_pnl += pnl_pct\n        \n        avg_pnl_pct = total_pnl / len(self.entry_premium) if self.entry_premium else 0\n        \n        # Check stop loss\n        if avg_pnl_pct \u003c= -self.stop_loss_pct:\n            self.write_log(f\"Stop loss triggered: {avg_pnl_pct:.2%}\")\n            self.close_all_positions()\n            return\n            \n        # Check take profit\n        if avg_pnl_pct \u003e= self.take_profit_pct:\n            self.write_log(f\"Take profit triggered: {avg_pnl_pct:.2%}\")\n            self.close_all_positions()\n            return\n            \n        # Check delta risk\n        self.update_position_greeks()\n        if abs(self.position_greeks[\"delta\"]) \u003e self.max_portfolio_delta:\n            self.write_log(f\"Delta limit breached: {self.position_greeks['delta']}\")\n            self.adjust_delta()\n            \n    def update_position_greeks(self):\n        \"\"\"Update portfolio Greeks\"\"\"\n        \n        self.position_greeks = {\"delta\": 0, \"gamma\": 0, \"theta\": 0, \"vega\": 0}\n        \n        for vt_symbol in self.selected_options.values():\n            option = self.option_chain.get(vt_symbol)\n            if not option:\n                continue\n                \n            pos = self.get_pos(vt_symbol)\n            if not pos or pos.volume == 0:\n                continue\n                \n            # Add to portfolio Greeks\n            self.position_greeks[\"delta\"] += option[\"delta\"] * pos.volume\n            self.position_greeks[\"gamma\"] += option[\"gamma\"] * pos.volume\n            self.position_greeks[\"theta\"] += option[\"theta\"] * pos.volume\n            self.position_greeks[\"vega\"] += option[\"vega\"] * pos.volume\n            \n    def adjust_delta(self):\n        \"\"\"Delta hedge by adjusting underlying\"\"\"\n        \n        # Calculate hedge quantity\n        underlying_tick = self.get_tick(self.underlying_symbol)\n        if not underlying_tick:\n            return\n            \n        # Buy/sell underlying to neutralize delta\n        hedge_delta = -self.position_greeks[\"delta\"]\n        hedge_volume = abs(int(hedge_delta))\n        \n        if hedge_volume \u003e 0:\n            if hedge_delta \u003e 0:\n                self.buy(underlying_tick.last_price, hedge_volume, self.underlying_symbol)\n            else:\n                self.sell(underlying_tick.last_price, hedge_volume, self.underlying_symbol)\n                \n            self.write_log(f\"Delta hedge: {hedge_volume} {self.underlying_symbol}\")\n            \n    def close_all_positions(self):\n        \"\"\"Close all option positions\"\"\"\n        \n        for vt_symbol in list(self.selected_options.values()):\n            pos = self.get_pos(vt_symbol)\n            if pos and pos.volume \u003e 0:\n                if pos.direction == Direction.LONG:\n                    self.sell(0, pos.volume, vt_symbol)  # Market order\n                else:\n                    self.cover(0, pos.volume, vt_symbol)\n                    \n        self.position_open = False\n        self.legs_opened.clear()\n        self.entry_premium.clear()\n        \n    def get_current_iv(self) -\u003e float:\n        \"\"\"Get current implied volatility\"\"\"\n        # Simplified: average IV of selected options\n        if not self.option_chain:\n            return None\n            \n        ivs = [o[\"impv\"] for o in self.option_chain.values() if o.get(\"impv\")]\n        return sum(ivs) / len(ivs) if ivs else None\n        \n    def calculate_iv_rank(self, current_iv: float) -\u003e float:\n        \"\"\"Calculate IV rank\"\"\"\n        # Simplified: use historical IV percentile\n        # In production, use actual IV history from database\n        return 0.5  # Placeholder\n        \n    def on_trade(self, trade):\n        self.write_log(f\"Trade: {trade.vt_symbol} {trade.direction} {trade.volume} @ {trade.price}\")\n        self.update_position_greeks()\n        self.put_event()\n        \n    def on_order(self, order):\n        self.put_event()\n```\n\n---\n\n## Backtesting\n\n```python\n# backtest_option_strategy.py\nfrom vnpy_portfoliostrategy import BacktestingEngine\nfrom datetime import datetime\nfrom strategies.dynamic_option_strategy import DynamicOptionStrategy\n\nengine = BacktestingEngine()\n\nengine.set_parameters(\n    vt_symbols=[\n        \"BANKNIFTY.NSE\",           # Underlying\n        \"BANKNIFTY-24DEC-47000-CE.NSE\",  # Example options\n        \"BANKNIFTY-24DEC-47000-PE.NSE\",\n        # ... more options\n    ],\n    interval=\"1m\",\n    start=datetime(2024, 1, 1),\n    end=datetime(2024, 12, 15),\n    rate=0.0003,\n    slippage=0.5,\n    size=15,                      # BANKNIFTY lot size\n    pricetick=0.05,\n    capital=5_000_000,            # 5 million INR\n)\n\nengine.add_strategy(DynamicOptionStrategy, {\n    \"strategy_type\": \"straddle\",\n    \"expiry_days_target\": 30,\n    \"strike_distance\": \"ATM\",\n    \"leg_ratio\": 1,\n    \"underlying_symbol\": \"BANKNIFTY.NSE\",\n})\n\nengine.run_backtesting()\ndf = engine.calculate_result()\nengine.calculate_statistics()\nengine.show_chart()\n```\n\n---\n\n## Data Requirements\n\n| Data | Source | Storage |\n|------|--------|---------|\n| Underlying (BANKNIFTY) | IB, local provider | Database |\n| Option chain (all strikes/expiries) | IB, local provider | Database |\n| Historical IV | Calculated or purchased | Database |\n\n**Challenge:** Need complete option chain history for backtesting. Solutions:\n1. Record live data with `vnpy_datarecorder`\n2. Purchase historical option data\n3. Use IB's historical data API (limited)\n\n---\n\n## Summary\n\n| Component | Solution |\n|-----------|----------|\n| **Base Engine** | `vnpy_portfoliostrategy` |\n| **Option Pricing** | `vnpy_optionmaster.pricing` (black_76) |\n| **Greeks/IV** | Custom calculation using OptionMaster formulas |\n| **Chain Management** | Custom code (select expiry, strikes) |\n| **Backtesting** | Portfolio strategy backtester |\n| **Live Trading** | Portfolio strategy engine |\n\n**Key Files to Study:**\n1. `vnpy_optionmaster/base.py` - OptionData, ChainData classes\n2. `vnpy_optionmaster/pricing/black_76.py` - Pricing formulas\n3. `vnpy_portfoliostrategy/template.py` - Strategy base\n4. `vnpy_portfoliostrategy/backtesting.py` - Backtest engine\n"
